<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinTin Pro | 淺藍色協作版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .tab-active { background-color: #f0f9ff; color: #0284c7; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-white font-sans pb-32 text-slate-900 leading-relaxed">
    <div class="max-w-md mx-auto space-y-6 pt-6 px-5">
        
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-black text-sky-600 italic leading-none">LinTin</h1>
                <p class="text-[9px] font-bold text-slate-300 mt-1.5 uppercase tracking-widest tracking-tight">Cloud System v2.0</p>
            </div>
            <div class="flex items-center gap-2">
                <span class="bg-green-100 text-green-600 px-3 py-1 rounded-full text-[10px] font-bold shadow-sm">已連結雲端</span>
                <button class="text-slate-200"><i class="fas fa-ellipsis-h text-sm"></i></button>
            </div>
        </div>

        <div class="flex bg-slate-100 rounded-[2rem] p-4 gap-4 border border-slate-100">
            <div class="flex-1 space-y-1">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 ml-1">購物金餘額</p>
                <div class="bg-white p-3.5 rounded-2xl flex justify-between items-center shadow-inner border border-sky-50">
                    <span class="text-xs font-bold text-sky-400">NTD</span>
                    <span class="text-lg font-black text-sky-600">32,123</span>
                    <i class="fas fa-sync text-sky-100 text-[10px]"></i>
                </div>
            </div>
            <div class="flex-1 space-y-1">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 ml-1">預估利潤</p>
                <div class="bg-emerald-50 p-3.5 rounded-2xl flex justify-between items-center border border-emerald-100">
                    <span class="text-xs font-bold text-emerald-400">TWD</span>
                    <span class="text-lg font-black text-emerald-500">1,980</span>
                    <i class="fas fa-trending-up text-emerald-100 text-xs"></i>
                </div>
            </div>
        </div>

        <div class="flex bg-slate-100/70 p-1.5 rounded-2xl">
            <button onclick="switchTab('purchase')" id="btn-purchase" class="flex-1 py-3 text-xs font-black rounded-xl transition-all tab-active shadow-sm flex items-center justify-center gap-2"><i class="fas fa-search"></i> 採購清單</button>
            <button onclick="switchTab('order')" id="btn-order" class="flex-1 py-3 text-xs font-black rounded-xl transition-all text-slate-400 flex items-center justify-center gap-2"><i class="fas fa-box"></i> 訂單管理</button>
        </div>

        <div class="relative mb-5">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-200 text-sm"></i>
            <input type="text" placeholder="快速搜尋..." class="w-full bg-white border border-slate-100 p-4 pl-12 rounded-2xl text-xs font-medium outline-none focus:ring-1 ring-sky-200 shadow-inner">
        </div>

        <div id="content-list" class="space-y-4">
            </div>

        <div class="fixed bottom-6 left-0 right-0 px-6 max-w-md mx-auto">
            <button onclick="openModal()" class="w-full bg-sky-600 text-white py-5 rounded-[2.5rem] font-black shadow-2xl shadow-sky-200 flex items-center justify-center gap-2.5 active:scale-95 transition-all">
                <i class="fas fa-plus-circle text-lg"></i> 新增代購項目
            </button>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-6">
        <div class="bg-white w-full rounded-[3rem] p-9 shadow-2xl space-y-6 animate-in zoom-in-95 duration-200 overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-black text-sky-900 flex items-center gap-2"><i class="fas fa-tag text-sky-500"></i> 新增項目</h2>
                <button onclick="closeModal()" class="text-slate-200 hover:text-rose-400"><i class="fas fa-times-circle text-2xl"></i></button>
            </div>
            <div class="space-y-5">
                <input id="input-customer" type="text" placeholder="客戶名稱" class="w-full bg-slate-50 p-4.5 rounded-2xl outline-none font-bold text-sm border-none">
                <input id="input-product" type="text" placeholder="商品名稱" class="w-full bg-slate-50 p-4.5 rounded-2xl outline-none font-bold text-sm border-none">
                <div class="grid grid-cols-2 gap-4">
                    <input id="input-price" type="number" placeholder="台幣成本" class="w-full bg-sky-50 p-4.5 rounded-2xl outline-none font-black text-sm text-sky-600">
                    <input id="input-fee" type="number" placeholder="預期利潤" class="w-full bg-emerald-50 p-4.5 rounded-2xl outline-none font-black text-sm text-emerald-600">
                </div>
                <button onclick="addItem()" class="w-full bg-sky-600 text-white py-5 rounded-3xl font-black shadow-lg shadow-sky-100 active:scale-95 transition-all">同步上傳</button>
            </div>
        </div>
    </div>

    <script>
        // 為了展示介面，使用範例資料
        let items = JSON.parse(localStorage.getItem('lintin_items_v2')) || [
            { id: 1, customer: 'AMY LIN', product: '美少女戰士周邊 (日圓 1.2w)', price: 2600, fee: 390, stage: 'purchase', status: '待採購', payer: '璇' },
            { id: 2, customer: 'AMY LIN', product: '代購保濕精華液', price: 1200, fee: 180, stage: 'order', status: '待付款', payer: '琳' }
        ];
        let currentTab = 'purchase';

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('btn-purchase').className = tab === 'purchase' ? 'flex-1 py-3 text-xs font-black rounded-xl tab-active shadow-sm flex items-center justify-center gap-2' : 'flex-1 py-3 text-xs font-black rounded-xl text-slate-400 flex items-center justify-center gap-2';
            document.getElementById('btn-order').className = tab === 'order' ? 'flex-1 py-3 text-xs font-black rounded-xl tab-active shadow-sm flex items-center justify-center gap-2' : 'flex-1 py-3 text-xs font-black rounded-xl text-slate-400 flex items-center justify-center gap-2';
            render();
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function addItem() {
            const customer = document.getElementById('input-customer').value;
            const product = document.getElementById('input-product').value;
            const price = Number(document.getElementById('input-price').value);
            const fee = Number(document.getElementById('input-fee').value);
            if(!customer || !product) return;
            items.push({ id: Date.now(), customer, product, price, fee, stage: 'purchase', status: '待採購', payer: '待定' });
            localStorage.setItem('lintin_items_v2', JSON.stringify(items));
            closeModal();
            render();
        }

        function render() {
            const list = document.getElementById('content-list');
            const filtered = items.filter(i => i.stage === currentTab);
            list.innerHTML = '';
            
            filtered.forEach(item => {
                const card = document.createElement('div');
                // 恢復淺藍色漸層卡片與大圓角
                card.className = "bg-sky-50 rounded-[32px] p-7 shadow-sm border border-sky-100 relative overflow-hidden space-y-4";
                
                card.innerHTML = `
                    <div class="absolute top-0 right-0 px-5 py-1 text-[9px] font-black text-white ${!item.payer || item.payer === '待定' ? 'bg-slate-300' : item.payer === '琳' ? 'bg-fuchsia-400' : 'bg-orange-400'}">${item.payer || '待定'}</div>
                    
                    <div class="flex justify-between items-start">
                        <h3 class="font-black text-sky-800 text-sm flex items-center gap-2.5"><i class="fas fa-id-card text-sky-300 text-base"></i>${item.customer} ✨</h3>
                        <div class="text-right">
                            <p class="text-xs font-bold text-slate-300 uppercase leading-none">應收 NT$</p>
                            <p class="text-xl font-black text-sky-600 italic tracking-tight">${(item.price + item.fee).toLocaleString()}</p>
                        </div>
                    </div>
                    
                    <div class="bg-white p-4 rounded-xl text-[11px] font-bold text-slate-500 border border-sky-50 shadow-inner">${item.product}</div>
                    
                    <div class="flex justify-end gap-2 pt-1">
                        ${item.stage === 'purchase' 
                            ? `<button class="text-[10px] font-bold text-slate-300">刪除</button><button class="bg-white text-sky-600 px-5 py-2.5 rounded-xl text-[10px] font-black shadow-inner border border-sky-50">完成採購</button>`
                            : `<span class="bg-sky-100 text-sky-600 px-4 py-1.5 rounded-lg text-[10px] font-bold border border-sky-50">待收款</span>`
                        }
                    </div>
                `;
                list.appendChild(card);
            });
        }
        render();
    </script>
</body>
</html>
