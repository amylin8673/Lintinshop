<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinTin 協作系統 v8.4</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; user-select: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-scale:active { transform: scale(0.95); }
        input { user-select: text; }
        select { -webkit-appearance: none; } /* 讓 iPad 上的 select 樣式更統一 */
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const Icon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                box: <path d="M21 8l-2-2H5L3 8v11a2 2 0 002 2h14a2 2 0 002-2V8zM5 8l1.5-1.5h11L19 8H5zm14 11H5V10h14v9zM9 12h6v2H9v-2z" />,
                edit: <path d="M14.06 3.02l.92.92L5.92 13H5v-.92l9.06-9.06M17.66 1c-.25 0-.51.1-.7.29l-1.83 1.83 3.75 3.75 1.83-1.83c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.2-.2-.45-.29-.71-.29zm-3.6 3.19L3 15.25V21h5.75L19.81 9.94l-3.75-3.75z" />,
                trash: <path d="M16 9v10H8V9h8m-1.5-6h-5l-1 1H5v2h14V4h-3.5l-1-1zM18 7H6v12c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7z" />,
                plus: <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
            };
            return <svg className={className} viewBox="0 0 24 24" fill="currentColor">{icons[name]}</svg>;
        };

        const App = () => {
            const [viewMode, setViewMode] = React.useState('purchase'); 
            const [items, setItems] = React.useState([]);
            const [showModal, setShowModal] = React.useState(false);
            const [showCheckModal, setShowCheckModal] = React.useState(false);
            const [showTagModal, setShowTagModal] = React.useState(false);
            const [showCreditModal, setShowCreditModal] = React.useState(false);
            const [isEditing, setIsEditing] = React.useState(null);
            const [checkingItem, setCheckingItem] = React.useState(null);
            const [lastFive, setLastFive] = React.useState('');
            
            const [categories, setCategories] = React.useState(() => JSON.parse(localStorage.getItem('lintin_cats')) || ['預設', '服飾', '美妝']);
            const orderStatuses = ['全部狀態', '待付款', '已匯款', '待查帳', '已出貨', '完成'];
            const [activeCategory, setActiveCategory] = React.useState('全部');
            const [activeStatus, setActiveStatus] = React.useState('全部狀態');
            
            const rates = { KRW: 0.024, JPY: 0.21, HKD: 4.1, THB: 0.9, AUD: 21.2, NTD: 1 };
            const currencies = ['KRW', 'JPY', 'THB', 'HKD', 'AUD', 'NTD'];

            const [creditData, setCreditData] = React.useState(() => JSON.parse(localStorage.getItem('lintin_credit')) || { ntdAmount: 0, currency: 'KRW', foreignAmount: 0 });

            const initialForm = { customerName: '', productName: '', price: '', fee: '', payer: '無', currency: 'KRW', foreignPrice: '', category: categories[0], orderStatus: '待付款', accountDigits: '' };
            const [formData, setFormData] = React.useState(initialForm);

            const stats = React.useMemo(() => {
                const pending = items.filter(i => i.stage === 'order' && i.orderStatus !== '完成').reduce((sum, i) => sum + Number(i.price || 0), 0);
                const profit = items.reduce((sum, i) => sum + Number(i.fee || 0), 0);
                return { collection: pending, profit: profit };
            }, [items]);

            React.useEffect(() => { localStorage.setItem('lintin_cats', JSON.stringify(categories)); }, [categories]);
            React.useEffect(() => { localStorage.setItem('lintin_credit', JSON.stringify(creditData)); }, [creditData]);

            const handleStatusClick = (item) => {
                const flow = ['待付款', '已匯款', '待查帳', '已出貨', '完成'];
                if (item.orderStatus === '已匯款') {
                    setCheckingItem(item); setLastFive(''); setShowCheckModal(true);
                } else {
                    const idx = flow.indexOf(item.orderStatus);
                    if (idx < flow.length - 1) setItems(items.map(i => i.id === item.id ? {...i, orderStatus: flow[idx + 1]} : i));
                }
            };

            const getPayerColor = (payer) => {
                if (payer === '璇') return 'bg-sky-400';
                if (payer === '琳') return 'bg-fuchsia-400';
                return 'bg-slate-400';
            };

            return (
                <div className="min-h-screen pb-10 text-left text-slate-900">
                    <header className="bg-white/90 backdrop-blur-md border-b border-sky-50 sticky top-0 z-30 shadow-sm">
                        <div className="px-5 pt-4">
                            <div className="flex justify-between items-center mb-4">
                                <div className="flex items-center gap-2">
                                    <div className="bg-sky-500 p-2.5 rounded-xl text-white shadow-md"><Icon name="box" /></div>
                                    <h1 className="text-xl font-black text-sky-900 italic">LinTin</h1>
                                </div>
                                <button onClick={() => { 
                                    setIsEditing(null); 
                                    setFormData({ ...initialForm, category: categories[0] }); 
                                    setShowModal(true); 
                                }} className="bg-sky-600 text-white p-2.5 rounded-xl shadow-lg active-scale">＋</button>
                            </div>

                            <div className="grid grid-cols-3 gap-3 mb-5">
                                <div onClick={() => setShowCreditModal(true)} className="bg-slate-50 p-3 rounded-2xl border border-slate-100 active-scale cursor-pointer">
                                    <p className="text-[9px] font-black text-slate-400 uppercase mb-1">共同基金 ✎</p>
                                    <p className="text-[10px] font-black text-amber-600 truncate leading-tight">{Number(creditData.foreignAmount).toLocaleString()} {creditData.currency}</p>
                                    <p className="text-[10px] font-black text-slate-700 truncate leading-tight">NT$ {Number(creditData.ntdAmount).toLocaleString()}</p>
                                </div>
                                <div className="bg-amber-50 p-3 rounded-2xl border border-amber-100">
                                    <p className="text-[9px] font-black text-amber-600/70 uppercase mb-1">待收訂單</p>
                                    <p className="text-sm font-black text-amber-700 leading-none mt-1">NT$ {stats.collection.toLocaleString()}</p>
                                </div>
                                <div className="bg-emerald-50 p-3 rounded-2xl border border-emerald-100">
                                    <p className="text-[9px] font-black text-emerald-600/70 uppercase mb-1">累計利潤</p>
                                    <p className="text-sm font-black text-emerald-700 leading-none mt-1">NT$ {stats.profit.toLocaleString()}</p>
                                </div>
                            </div>

                            <div className="flex mb-2">
                                {['purchase', 'order'].map(m => (
                                    <button key={m} onClick={() => { setViewMode(m); setActiveCategory('全部'); setActiveStatus('全部狀態'); }} className={`flex-1 pb-3 text-xs font-black relative ${viewMode === m ? 'text-sky-600' : 'text-slate-400'}`}>
                                        {m === 'purchase' ? '採購清單' : '訂單管理'}
                                        {viewMode === m && <div className="absolute bottom-0 left-0 right-0 h-1 bg-sky-500 rounded-t-full mx-8" />}
                                    </button>
                                ))}
                            </div>
                        </div>
                        
                        <div className="px-5 pb-3 overflow-x-auto no-scrollbar flex items-center gap-2 border-t border-slate-50 pt-3">
                            {viewMode === 'purchase' ? (
                                <>
                                    <button onClick={() => setActiveCategory('全部')} className={`px-4 py-1.5 rounded-full text-[10px] font-black whitespace-nowrap ${activeCategory === '全部' ? 'bg-sky-500 text-white shadow-md' : 'bg-slate-100 text-slate-400'}`}>全部種類</button>
                                    {categories.map(cat => <button key={cat} onClick={() => setActiveCategory(cat)} className={`px-4 py-1.5 rounded-full text-[10px] font-black whitespace-nowrap ${activeCategory === cat ? 'bg-sky-500 text-white shadow-md' : 'bg-slate-100 text-slate-400'}`}>{cat}</button>)}
                                    <button onClick={() => setShowTagModal(true)} className="p-1.5 bg-slate-100 text-slate-400 rounded-full active-scale min-w-[28px]"><Icon name="plus" className="w-3 h-3" /></button>
                                </>
                            ) : (
                                <>
                                    {orderStatuses.map(status => (
                                        <button key={status} onClick={() => setActiveStatus(status)} className={`px-4 py-1.5 rounded-full text-[10px] font-black whitespace-nowrap ${activeStatus === status ? 'bg-indigo-500 text-white shadow-md' : 'bg-slate-100 text-slate-400'}`}>
                                            {status}
                                        </button>
                                    ))}
                                </>
                            )}
                        </div>
                    </header>

                    <div className="p-4 space-y-4">
                        {items.filter(i => {
                            const matchStage = (viewMode === 'purchase') ? (i.stage === 'purchase' || !i.stage) : (i.stage === 'order');
                            const matchFilter = (viewMode === 'purchase') 
                                ? (activeCategory === '全部' || i.category === activeCategory)
                                : (activeStatus === '全部狀態' || i.orderStatus === activeStatus);
                            return matchStage && matchFilter;
                        }).map(item => (
                            <div key={item.id} className="bg-white rounded-[24px] p-5 shadow-sm border border-slate-50 relative overflow-hidden">
                                <div className={`absolute top-0 right-0 px-4 py-1 text-[9px] font-black text-white rounded-bl-xl ${getPayerColor(item.payer)}`}>{item.payer}</div>
                                <div className="flex justify-between items-start">
                                    <div className="flex-1 pr-2">
                                        <div className="flex items-center gap-2 mb-1">
                                            <h3 className="text-base font-black text-slate-900">{item.customerName}</h3>
                                            <span className="text-[8px] bg-slate-100 text-slate-400 px-2 py-0.5 rounded-md font-bold uppercase">{item.category}</span>
                                        </div>
                                        <p className="text-[11px] text-amber-700 font-bold mb-3">{item.productName} {item.accountDigits && <span className="text-indigo-500 font-black ml-1">(帳: {item.accountDigits})</span>}</p>
                                        <div className="flex gap-2">
                                            <button onClick={() => {setIsEditing(item.id); setFormData(item); setShowModal(true);}} className="bg-slate-50 text-slate-400 p-2.5 rounded-xl active-scale"><Icon name="edit" /></button>
                                            <button onClick={() => setItems(items.filter(i => i.id !== item.id))} className="bg-slate-50 text-slate-400 p-2.5 rounded-xl active-scale"><Icon name="trash" /></button>
                                        </div>
                                    </div>
                                    <div className="text-right mt-6">
                                        <p className="text-[9px] text-slate-300 font-black uppercase mb-1">{item.foreignPrice} {item.currency}</p>
                                        <p className="font-black text-sky-700 text-sm font-mono leading-none mb-4">NT$ {Number(item.price).toLocaleString()}</p>
                                        {viewMode === 'purchase' ? (
                                            <button onClick={() => { setItems(items.map(i => i.id === item.id ? {...i, stage: 'order', orderStatus: '待付款'} : i)); setViewMode('order'); }} className="bg-sky-600 text-white text-[10px] font-black px-4 py-2.5 rounded-xl active-scale shadow-lg">已買到</button>
                                        ) : (
                                            <button onClick={() => handleStatusClick(item)} className={`text-[10px] font-black px-4 py-2.5 rounded-xl shadow-lg text-white ${item.orderStatus === '完成' ? 'bg-emerald-500' : 'bg-indigo-500'}`}>{item.orderStatus}</button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Modal: 新增/編輯項目 - 修正分類標籤選單 */}
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4 text-left">
                            <div className="bg-white w-full max-w-md rounded-[40px] p-8 shadow-2xl overflow-y-auto max-h-[90vh] no-scrollbar">
                                <div className="flex justify-between items-center mb-6"><h2 className="text-xl font-black italic text-sky-900">{isEditing ? '編輯項目' : '新增項目'}</h2><button onClick={() => setShowModal(false)} className="text-slate-300 text-3xl leading-none">&times;</button></div>
                                <div className="space-y-5">
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1.5"><p className="text-[10px] font-black text-slate-400 px-1">分類標籤</p>
                                            <div className="relative">
                                                <select className="w-full bg-slate-50 py-4 px-4 rounded-2xl font-bold text-sm outline-none border-2 border-transparent focus:border-sky-100" 
                                                    value={formData.category} 
                                                    onChange={e => setFormData({...formData, category: e.target.value})}
                                                >
                                                    {/* 這裡會動態抓取所有自定義標籤 */}
                                                    {categories.map(c => <option key={c} value={c}>{c}</option>)}
                                                </select>
                                                <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-300 text-[10px]">▼</div>
                                            </div>
                                        </div>
                                        <div className="space-y-1.5"><p className="text-[10px] font-black text-slate-400 px-1">代墊人</p>
                                            <div className="flex gap-2 h-[52px]">
                                                {['琳', '璇', '無'].map(p => <button key={p} onClick={() => setFormData({...formData, payer: p})} className={`flex-1 rounded-2xl text-[10px] font-black ${formData.payer === p ? 'bg-slate-800 text-white shadow-md' : 'bg-slate-50 text-slate-400'}`}>{p}</button>)}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <input placeholder="客戶名稱" className="bg-slate-50 py-4 px-4 rounded-2xl font-bold text-sm outline-none" value={formData.customerName} onChange={e => setFormData({...formData, customerName: e.target.value})} />
                                        <input placeholder="商品名稱" className="bg-slate-50 py-4 px-4 rounded-2xl font-bold text-sm outline-none" value={formData.productName} onChange={e => setFormData({...formData, productName: e.target.value})} />
                                    </div>
                                    <div className="bg-slate-50 p-5 rounded-[32px] space-y-4">
                                        <div className="flex gap-2">
                                            <select className="bg-white py-3 px-2 rounded-xl text-[10px] font-black outline-none border border-amber-100" value={formData.currency} onChange={e => setFormData({...formData, currency: e.target.value})}>{currencies.map(c => <option key={c} value={c}>{c}</option>)}</select>
                                            <input type="number" placeholder="外幣" className="flex-1 bg-white py-4 px-4 rounded-2xl outline-none font-black text-sm border border-amber-100 text-amber-600" value={formData.foreignPrice} onChange={e => {
                                                const f = e.target.value; setFormData({...formData, foreignPrice: f, price: Math.round(f * rates[formData.currency])});
                                            }} />
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <input type="number" placeholder="台幣成本" className="bg-white py-4 px-4 rounded-2xl font-black text-sm outline-none border border-sky-100 text-sky-600" value={formData.price} onChange={e => setFormData({...formData, price: e.target.value})} />
                                            <input type="number" placeholder="預期利潤" className="bg-white py-4 px-4 rounded-2xl font-black text-sm outline-none border border-emerald-100 text-emerald-600" value={formData.fee} onChange={e => setFormData({...formData, fee: e.target.value})} />
                                        </div>
                                    </div>
                                    <button onClick={() => {
                                        if (isEditing) setItems(items.map(i => i.id === isEditing ? {...formData, id: isEditing} : i));
                                        else setItems([{ id: Date.now(), ...formData, stage: 'purchase' }, ...items]);
                                        setShowModal(false);
                                    }} className="w-full bg-sky-600 text-white py-5 rounded-3xl font-black shadow-xl active-scale">儲存項目</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* 其他功能邏輯不變 */}
                    {showCreditModal && (
                        <div className="fixed inset-0 z-[80] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-6 text-left">
                            <div className="bg-white w-full max-w-xs rounded-[32px] p-8 shadow-2xl">
                                <h3 className="text-lg font-black text-sky-900 mb-6 italic border-b pb-2">共同基金紀錄</h3>
                                <div className="space-y-5">
                                    <div className="space-y-1.5"><p className="text-[10px] font-black text-amber-600 uppercase px-1">外幣庫存</p>
                                        <div className="flex gap-2">
                                            <select className="bg-slate-50 py-3 px-2 rounded-xl text-[10px] font-black outline-none border border-slate-100" value={creditData.currency} onChange={e => setCreditData({...creditData, currency: e.target.value})}>{currencies.map(c => <option key={c} value={c}>{c}</option>)}</select>
                                            <input type="number" className="flex-1 bg-slate-50 py-3 px-4 rounded-xl outline-none font-black text-sm border border-slate-100 text-amber-700" value={creditData.foreignAmount} onChange={e => setCreditData({...creditData, foreignAmount: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="space-y-1.5"><p className="text-[10px] font-black text-sky-600 uppercase px-1">台幣現鈔</p>
                                        <input type="number" className="w-full bg-slate-50 py-4 px-4 rounded-xl font-black text-lg text-sky-700 outline-none border border-slate-100" value={creditData.ntdAmount} onChange={e => setCreditData({...creditData, ntdAmount: e.target.value})} />
                                    </div>
                                    <button onClick={() => setShowCreditModal(false)} className="w-full bg-sky-600 text-white py-4 rounded-2xl font-black active-scale shadow-lg mt-2">儲存</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {showTagModal && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-6 text-left">
                            <div className="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl">
                                <div className="flex justify-between items-center mb-6"><h2 className="text-xl font-black text-sky-900 italic">管理採購標籤</h2><button onClick={() => setShowTagModal(false)} className="text-slate-300 text-3xl leading-none">&times;</button></div>
                                <div className="flex gap-2 mb-6">
                                    <input placeholder="新標籤" className="flex-1 bg-slate-50 py-3 px-4 rounded-xl font-bold outline-none border-2 border-transparent focus:border-sky-100" value={lastFive} onChange={e => setLastFive(e.target.value)} />
                                    <button onClick={() => { if(lastFive && !categories.includes(lastFive)) { setCategories([...categories, lastFive]); setLastFive(''); } }} className="bg-sky-500 text-white px-4 rounded-xl font-black shadow-md">新增</button>
                                </div>
                                <div className="space-y-2 max-h-48 overflow-y-auto no-scrollbar">
                                    {categories.map(tag => (
                                        <div key={tag} className="flex justify-between items-center bg-slate-50 p-3 rounded-xl text-sm font-black text-slate-700">{tag}{tag !== '預設' && <button onClick={() => setCategories(categories.filter(c => c !== tag))} className="text-rose-400 p-1"><Icon name="trash" className="w-3.5 h-3.5" /></button>}</div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                    {showCheckModal && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-6 text-slate-900">
                            <div className="bg-white w-full max-w-xs rounded-[32px] p-8 shadow-2xl text-center text-slate-900">
                                <h3 className="text-lg font-black mb-6">輸入帳號後五碼</h3>
                                <input type="text" maxLength="5" placeholder="00000" className="w-full bg-slate-50 py-4 px-4 rounded-2xl font-black text-3xl text-center text-indigo-600 outline-none mb-6" value={lastFive} onChange={e => setLastFive(e.target.value)} autoFocus />
                                <div className="flex gap-3">
                                    <button onClick={() => setShowCheckModal(false)} className="flex-1 py-4 text-slate-400 font-black">取消</button>
                                    <button onClick={() => { setItems(items.map(i => i.id === checkingItem.id ? {...i, orderStatus: '待查帳', accountDigits: lastFive} : i)); setShowCheckModal(false); }} className="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-black active-scale shadow-lg">確認</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
