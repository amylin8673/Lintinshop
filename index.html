<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinTin 協作系統 v2.1</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const Icon = ({ name }) => {
            const icons = { plus: '＋', user: '👤', box: '📦', refresh: '🔄' };
            return <span style={{fontSize: '14px'}}>{icons[name]}</span>;
        };

        const App = () => {
            const [inviteCode, setInviteCode] = React.useState(localStorage.getItem('lintin_invite_code') || '');
            const [tempCode, setTempCode] = React.useState('');
            const [viewMode, setViewMode] = React.useState('purchase'); 
            const [showModal, setShowModal] = React.useState(false);
            const [items, setItems] = React.useState([]);
            
            // 購物金狀態
            const [fundSettings, setFundSettings] = React.useState({ amount: 1000000, currency: 'KRW' });

            const exchangeRates = { KRW: 0.024, JPY: 0.21, HKD: 4.1, THB: 0.9, AUD: 21.2, NTD: 1 };
            const currencies = ['KRW', 'JPY', 'THB', 'HKD', 'AUD', 'NTD'];

            const initialForm = { customerName: '', productName: '', price: '', fee: '', payer: '琳', currency: 'KRW', foreignPrice: '' };
            const [formData, setFormData] = React.useState(initialForm);

            // --- 核心功能：切換購物金幣別 ---
            const toggleFundCurrency = (e) => {
                e.stopPropagation();
                const currentIndex = currencies.indexOf(fundSettings.currency);
                const nextIndex = (currentIndex + 1) % currencies.length;
                const nextCurrency = currencies[nextIndex];
                
                // 計算邏輯：先換回台幣，再換成目標幣別
                const amountInTWD = fundSettings.amount * exchangeRates[fundSettings.currency];
                const nextAmount = Math.round(amountInTWD / exchangeRates[nextCurrency]);

                setFundSettings({
                    amount: nextAmount,
                    currency: nextCurrency
                });
            };

            const saveItem = () => {
                if (!formData.customerName || !formData.productName) {
                    alert("請填寫必要資訊");
                    return;
                }
                const newItem = { id: Date.now(), ...formData, stage: viewMode, status: '預購中' };
                setItems([newItem, ...items]);
                alert("新增成功"); 
                setShowModal(false);
                setFormData(initialForm);
            };

            const handleJoin = () => {
                if (tempCode.length >= 2) {
                    setInviteCode(tempCode.toUpperCase());
                    localStorage.setItem('lintin_invite_code', tempCode.toUpperCase());
                }
            };

            if (!inviteCode) {
                return (
                    <div className="min-h-screen bg-sky-50 flex items-center justify-center p-6">
                        <div className="w-full max-w-sm bg-white rounded-[40px] p-10 shadow-xl text-center">
                            <h1 className="text-2xl font-black text-sky-900 mb-6 italic">LinTin Login</h1>
                            <input 
                                type="text" placeholder="輸入代碼" 
                                className="w-full bg-slate-50 rounded-2xl py-4 px-6 mb-4 font-black text-sky-600 outline-none"
                                value={tempCode} onChange={(e) => setTempCode(e.target.value)}
                            />
                            <button onClick={handleJoin} className="w-full bg-sky-500 text-white py-4 rounded-2xl font-black shadow-lg">進入系統</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    <header className="bg-white/80 backdrop-blur-md border-b border-sky-50 px-5 pt-4 sticky top-0 z-30 shadow-sm">
                        <div className="flex justify-between items-center mb-4">
                            <div className="flex items-center gap-2">
                                <div className="bg-sky-500 p-2 rounded-xl text-white"><Icon name="box" /></div>
                                <h1 className="text-xl font-black text-sky-900 italic">LinTin</h1>
                            </div>
                            <button onClick={() => setShowModal(true)} className="bg-sky-600 text-white p-2.5 rounded-xl shadow-lg">＋</button>
                        </div>

                        {/* 數據欄位：這裡修正了點擊切換功能 */}
                        <div className="grid grid-cols-3 gap-3 mb-4">
                            <div 
                                className="bg-white p-3 rounded-2xl border border-sky-100 shadow-sm cursor-pointer active:bg-sky-50 transition-colors"
                                onClick={toggleFundCurrency}
                            >
                                <div className="flex justify-between items-center mb-1">
                                    <p className="text-[9px] font-black text-slate-400 uppercase">購物金</p>
                                    <div className="text-sky-400"><Icon name="refresh" /></div>
                                </div>
                                <p className="text-sm font-black text-sky-600 truncate">
                                    {fundSettings.amount.toLocaleString()} 
                                    <span className="text-[8px] ml-0.5 opacity-60">{fundSettings.currency}</span>
                                </p>
                            </div>
                            <div className="bg-white p-3 rounded-2xl border border-sky-100 shadow-sm"><p className="text-[9px] font-black text-slate-400 mb-1 uppercase">待收帳款</p><p className="text-sm font-black text-amber-500">NT$ 0</p></div>
                            <div className="bg-white p-3 rounded-2xl border border-sky-100 shadow-sm"><p className="text-[9px] font-black text-slate-400 mb-1 uppercase">累計利潤</p><p className="text-sm font-black text-emerald-500">NT$ 0</p></div>
                        </div>

                        <div className="flex">
                            {['purchase', 'order'].map(m => (
                                <button key={m} onClick={() => setViewMode(m)} className={`flex-1 pb-3 text-xs font-black relative ${viewMode === m ? 'text-sky-600' : 'text-slate-400'}`}>
                                    {m === 'purchase' ? '採購清單' : '訂單管理'}
                                    {viewMode === m && <div className="absolute bottom-0 left-0 right-0 h-1 bg-sky-500 rounded-t-full mx-8" />}
                                </button>
                            ))}
                        </div>
                    </header>

                    {/* 列表內容 */}
                    <div className="p-4 space-y-3">
                        {items.filter(i => i.stage === viewMode).map(item => (
                            <div key={item.id} className="bg-white rounded-3xl p-5 shadow-sm border border-slate-50 relative">
                                <div className="absolute top-0 right-0 px-4 py-1 text-[9px] font-black text-white bg-fuchsia-400 rounded-bl-xl">{item.payer}</div>
                                <h3 className="text-sm font-black text-slate-800 mb-1">{item.customerName}</h3>
                                <p className="text-xs text-slate-500 bg-slate-50 p-2 rounded-xl mt-2">{item.productName}</p>
                                <div className="mt-3 text-right font-black text-sky-700">NT$ {Number(item.price).toLocaleString()}</div>
                            </div>
                        ))}
                    </div>

                    {/* 彈窗 */}
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4">
                            <div className="bg-white w-full max-w-md rounded-[40px] p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-xl font-black italic text-sky-900">新增項目</h2>
                                    <button onClick={() => setShowModal(false)} className="text-slate-300 text-2xl">&times;</button>
                                </div>
                                <div className="space-y-6">
                                    <div className="flex gap-2">
                                        {['琳', '璇'].map(p => (
                                            <button key={p} onClick={() => setFormData({...formData, payer: p})} className={`flex-1 py-4 rounded-2xl text-xs font-black ${formData.payer === p ? 'bg-slate-800 text-white shadow-lg' : 'bg-slate-50 text-slate-300'}`}>{p}</button>
                                        ))}
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input placeholder="客戶名稱" className="w-full bg-slate-50 p-4 rounded-2xl font-bold text-sm outline-none" value={formData.customerName} onChange={e => setFormData({...formData, customerName: e.target.value})} />
                                        <input placeholder="商品名稱" className="w-full bg-slate-50 p-4 rounded-2xl font-bold text-sm outline-none" value={formData.productName} onChange={e => setFormData({...formData, productName: e.target.value})} />
                                    </div>
                                    <div className="bg-amber-50 p-5 rounded-3xl space-y-4">
                                        <div className="flex gap-2 overflow-x-auto no-scrollbar">
                                            {currencies.map(c => (
                                                <button key={c} onClick={() => setFormData({...formData, currency: c, foreignPrice: ''})} className={`px-4 py-2 rounded-xl text-[10px] font-black flex-shrink-0 ${formData.currency === c ? 'bg-amber-500 text-white' : 'bg-white text-amber-300'}`}>{c}</button>
                                            ))}
                                        </div>
                                        {formData.currency !== 'NTD' && (
                                            <input type="number" placeholder="輸入外幣金額" className="w-full bg-white py-4 px-4 rounded-2xl outline-none font-black text-sm text-amber-600" value={formData.foreignPrice} onChange={e => {
                                                const val = e.target.value;
                                                const twd = Math.round(Number(val) * exchangeRates[formData.currency]);
                                                setFormData({...formData, foreignPrice: val, price: twd.toString()});
                                            }} />
                                        )}
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="number" placeholder="台幣成本" className="w-full bg-sky-50 p-4 rounded-2xl font-black text-sm text-sky-600 outline-none" value={formData.price} onChange={e => setFormData({...formData, price: e.target.value})} />
                                        <input type="number" placeholder="預期利潤" className="w-full bg-emerald-50 p-4 rounded-2xl font-black text-sm text-emerald-600 outline-none" value={formData.fee} onChange={e => setFormData({...formData, fee: e.target.value})} />
                                    </div>
                                    <button onClick={saveItem} className="w-full bg-sky-600 text-white py-5 rounded-3xl font-black shadow-xl active:scale-95 transition-all">確認新增</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
