<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinTin 系統 - 餘額視覺優化版</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; text-align: left; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-scale:active { transform: scale(0.96); }
        .field-label { font-size: 10px; font-weight: 900; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
        .field-value { background-color: #F1F5F9; border: 1px solid #E2E8F0; border-radius: 14px; padding: 10px 14px; font-size: 14px; font-weight: 700; color: #1E293B; width: 100%; outline: none; }
        .stat-input { background: transparent; border: none; padding: 0; font-weight: 900; outline: none; width: 100%; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
        /* 餘額方框專用樣式 */
        .balance-card { background: linear-gradient(135deg, #f0fdfa 0%, #ccfbf1 100%); border: 1px solid #99f6e4; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyCK50TNqgRnXna4fd7x34rnslCfIVotZY4",
            authDomain: "lintin-9aecb.firebaseapp.com",
            databaseURL: "https://lintin-9aecb-default-rtdb.firebaseio.com",
            projectId: "lintin-9aecb",
            storageBucket: "lintin-9aecb.firebasestorage.app",
            messagingSenderId: "165541009067",
            appId: "1:165541009067:web:b9fa7208c7d969f8fb09ee"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                box: <path d="M21 8l-2-2H5L3 8v11a2 2 0 002 2h14a2 2 0 002-2V8zM5 8l1.5-1.5h11L19 8H5zm14 11H5V10h14v9zM9 12h6v2H9v-2z" />,
                edit: <path d="M14.06 3.02l.92.92L5.92 13H5v-.92l9.06-9.06M17.66 1c-.25 0-.51.1-.7.29l-1.83 1.83 3.75 3.75 1.83-1.83c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.2-.2-.45-.29-.71-.29zm-3.6 3.19L3 15.25V21h5.75L19.81 9.94l-3.75-3.75z" />,
                trash: <path d="M16 9v10H8V9h8m-1.5-6h-5l-1 1H5v2h14V4h-3.5l-1-1zM18 7H6v12c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7z" />,
                user: <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />,
                chevron: <path d="M7 10l5 5 5-5H7z" />,
                wallet: <path d="M21 18l-2 2H5l-2-2V6l2-2h14l2 2v12zm-2-2V8H5v8h14zm-2-5h-2v2h2v-2z" />
            };
            return <svg className={className} viewBox="0 0 24 24" fill="currentColor">{icons[name]}</svg>;
        };

        const App = () => {
            const [items, setItems] = useState([]);
            const [credit, setCredit] = useState({ ntd: 0, foreign: 0, cur: 'KRW' });
            const [rates, setRates] = useState({ KRW: 0.0215, JPY: 0.1997, THB: 0.9, HKD: 4.1, AUD: 22.3, USD: 32.5, NTD: 1 });
            const [viewMode, setViewMode] = useState('purchase'); 
            const [activePCat, setActivePCat] = useState('全部');
            const [activeStatus, setActiveStatus] = useState('全部');
            const [showModal, setShowModal] = useState(false);
            const [isEditing, setIsEditing] = useState(null);
            const [showBankModal, setShowBankModal] = useState(false);
            const [showCurSelect, setShowCurSelect] = useState(false);
            const [bankData, setBankData] = useState({ customer: '', lastFive: '' });
            const [form, setForm] = useState({ customer: '', product: '', price: '', fee: '', payer: '無', cur: 'KRW', fPrice: '', cat: '預設', orderStatus: '待付款', lastFive: '' });

            useEffect(() => {
                const fetchRates = async () => {
                    try {
                        const response = await fetch('https://open.er-api.com/v6/latest/TWD');
                        const data = await response.json();
                        if (data && data.rates) {
                            const newRates = {
                                KRW: 1 / data.rates.KRW,
                                JPY: 1 / data.rates.JPY,
                                THB: 1 / data.rates.THB,
                                HKD: 1 / data.rates.HKD,
                                AUD: 1 / data.rates.AUD,
                                USD: 1 / data.rates.USD,
                                NTD: 1
                            };
                            setRates(newRates);
                        }
                    } catch (error) { console.error("Rate fetch failed:", error); }
                };
                fetchRates();
            }, []);

            useEffect(() => {
                const itemsRef = db.ref('items');
                const creditRef = db.ref('credit');
                itemsRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    const list = data ? Object.keys(data).map(key => ({...data[key], id: key})) : [];
                    setItems(list.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0)));
                });
                creditRef.on('value', (snapshot) => { if (snapshot.val()) setCredit(snapshot.val()); });
                return () => { itemsRef.off(); creditRef.off(); };
            }, []);

            const handleSave = (itemData) => {
                if (isEditing) { db.ref(`items/${isEditing}`).set({ ...itemData, timestamp: Date.now() }); } 
                else { db.ref('items').push({ ...itemData, timestamp: Date.now(), stage: viewMode }); }
                setShowModal(false);
            };

            const handleDelete = (id) => { if(confirm('確定刪除商品？')) db.ref(`items/${id}`).remove(); };
            const moveToOrder = (id) => { db.ref(`items/${id}`).update({ stage: 'order', orderStatus: '待付款' }); };
            const updateCredit = (newCredit) => { db.ref('credit').set(newCredit); };

            const categories = useMemo(() => {
                const allCats = items.filter(i => i.stage === 'purchase').map(i => i.cat || '預設');
                return ['全部', ...new Set(allCats)];
            }, [items]);

            const groupedOrders = useMemo(() => {
                const allOrders = items.filter(i => i.stage === 'order');
                const groups = {};
                allOrders.forEach(item => {
                    if (!groups[item.customer]) groups[item.customer] = { items: [], total: 0, status: item.orderStatus, lastFive: item.lastFive };
                    groups[item.customer].items.push(item);
                    groups[item.customer].total += Number(item.price || 0);
                });
                if (activeStatus === '全部') return groups;
                const filtered = {};
                Object.keys(groups).forEach(name => { if (groups[name].status === activeStatus) filtered[name] = groups[name]; });
                return filtered;
            }, [items, activeStatus]);

            const stats = useMemo(() => ({
                profit: items.reduce((s, i) => s + Number(i.fee || 0), 0),
                pending: items.filter(i => i.stage === 'order' && i.orderStatus !== '完成').reduce((s, i) => s + Number(i.price || 0), 0)
            }), [items]);

            const orderStatuses = ['全部', '待付款', '已匯款', '待查帳', '已出貨', '完成'];

            return (
                <div className="min-h-screen pb-10 text-slate-900">
                    <header className="bg-white sticky top-0 z-40 border-b border-slate-100 p-5">
                        <div className="flex justify-between items-center mb-5">
                            <div className="flex items-center gap-2">
                                <div className="bg-sky-500 p-2 rounded-xl text-white shadow-md"><Icon name="box" /></div>
                                <h1 className="text-xl font-black italic tracking-tighter text-sky-600 uppercase">LinTin</h1>
                            </div>
                            <button onClick={() => { setForm({ customer: '', product: '', price: '', fee: '', payer: '無', cur: 'KRW', fPrice: '', cat: '預設', orderStatus: '待付款', lastFive: '' }); setIsEditing(null); setShowModal(true); }} className="bg-sky-500 text-white px-5 py-2.5 rounded-full font-black text-sm active-scale shadow-lg">+ 新增商品</button>
                        </div>

                        {/* ✅ 優化後的數據卡片區塊 */}
                        <div className="grid grid-cols-3 gap-3 mb-6">
                            {/* 優化後的餘額方框 */}
                            <div className="balance-card p-3 rounded-[24px] shadow-sm relative flex flex-col justify-between">
                                <div className="flex justify-between items-start mb-1">
                                    <p className="text-[9px] font-black text-teal-600 uppercase tracking-wider">Balance</p>
                                    <button onClick={() => setShowCurSelect(!showCurSelect)} className="flex items-center gap-0.5 text-[10px] font-black text-teal-700 bg-white/60 px-2 py-0.5 rounded-full border border-teal-200/50 shadow-sm active-scale">
                                        {credit.cur} <Icon name="chevron" className="w-2.5 h-2.5" />
                                    </button>
                                </div>
                                <div className="flex flex-col">
                                    <input type="number" className="stat-input text-sm text-teal-800 font-black w-full" value={credit.foreign} onChange={e => {
                                        const val = e.target.value;
                                        updateCredit({...credit, foreign: val, ntd: Math.round(val * rates[credit.cur])});
                                    }} />
                                    <div className="flex items-center text-[11px] font-bold text-teal-600/70">
                                        $<input type="number" className="stat-input flex-1 ml-0.5 font-bold" value={credit.ntd} onChange={e => updateCredit({...credit, ntd: e.target.value})} />
                                    </div>
                                </div>
                                {showCurSelect && (
                                    <div className="absolute top-[85%] left-0 w-full bg-white border border-teal-100 shadow-2xl rounded-2xl z-50 overflow-hidden py-1">
                                        {Object.keys(rates).filter(c=>c!=='NTD').map(c => (
                                            <button key={c} className="w-full text-[10px] py-2 font-black text-teal-700 hover:bg-teal-50 border-b border-teal-50 last:border-none" onClick={() => {
                                                updateCredit({...credit, cur: c, ntd: Math.round(credit.foreign * rates[c])});
                                                setShowCurSelect(false);
                                            }}>{c}</button>
                                        ))}
                                    </div>
                                )}
                            </div>

                            <div className="bg-white p-3 rounded-[24px] border border-slate-100 shadow-sm text-center flex flex-col justify-between">
                                <p className="text-[9px] font-black text-slate-400 uppercase tracking-wider">Pending</p>
                                <p className="text-sm font-black text-sky-600">${stats.pending.toLocaleString()}</p>
                                <div className="h-4"></div>
                            </div>

                            <div className="bg-white p-3 rounded-[24px] border border-slate-100 shadow-sm text-center flex flex-col justify-between">
                                <p className="text-[9px] font-black text-slate-400 uppercase tracking-wider">Profit</p>
                                <p className="text-sm font-black text-emerald-500">${stats.profit.toLocaleString()}</p>
                                <div className="h-4"></div>
                            </div>
                        </div>

                        <div className="flex gap-6 border-b border-slate-50 mb-3 px-1 text-sm font-black">
                            <button onClick={() => setViewMode('purchase')} className={`pb-2 ${viewMode === 'purchase' ? 'text-sky-500 border-b-2 border-sky-500' : 'text-slate-300'}`}>採購清單</button>
                            <button onClick={() => setViewMode('order')} className={`pb-2 ${viewMode === 'order' ? 'text-sky-700 border-b-2 border-sky-700' : 'text-slate-300'}`}>訂單管理</button>
                        </div>

                        <div className="flex gap-2 overflow-x-auto no-scrollbar py-1">
                            {viewMode === 'purchase' ? categories.map(c => <button key={c} onClick={() => setActivePCat(c)} className={`px-5 py-2 rounded-full text-[11px] font-black whitespace-nowrap transition-all ${activePCat === c ? 'bg-sky-500 text-white' : 'bg-slate-100 text-slate-500'}`}>{c}</button>) : orderStatuses.map(s => <button key={s} onClick={() => setActiveStatus(s)} className={`px-5 py-2 rounded-full text-[11px] font-black whitespace-nowrap ${activeStatus === s ? 'bg-sky-700 text-white' : 'bg-slate-100 text-slate-500'}`}>{s}</button>)}
                        </div>
                    </header>

                    <div className="p-4 space-y-5">
                        {/* 這裡之後的內容保持不變 */}
                        {viewMode === 'purchase' ? (
                            items.filter(i => i.stage === 'purchase' && (activePCat === '全部' || (i.cat || '預設') === activePCat)).map(item => {
                                const isUnpriced = !item.fPrice || item.fPrice === '0';
                                return (
                                    <div key={item.id} className="bg-white rounded-[32px] p-6 card-shadow border border-slate-100 relative">
                                        <div className="absolute top-4 left-6"><span className="bg-slate-50 text-slate-400 px-3 py-1 rounded-full text-[9px] font-black tracking-widest border border-slate-100 uppercase">#{item.cat}</span></div>
                                        <div className={`absolute top-4 right-5 px-3 py-1.5 rounded-full text-[10px] font-black text-white shadow-sm ${item.payer === '璇' ? 'bg-sky-400' : item.payer === '琳' ? 'bg-cyan-400' : 'bg-slate-300'}`}>{item.payer}</div>
                                        <div className="mt-8 space-y-4">
                                            <div className="flex items-start gap-3"><div className="bg-sky-50 text-sky-500 p-2.5 rounded-2xl"><Icon name="user" /></div><div className="flex-1"><p className="text-[10px] font-black text-slate-400 mb-1 leading-none uppercase">客戶</p><h3 className="text-base font-black text-slate-800">{item.customer}</h3></div></div>
                                            <div className="bg-sky-50/40 p-4 rounded-2xl border border-sky-100/50"><p className="text-[10px] font-black text-sky-400 mb-1.5 leading-none uppercase tracking-wider">商品內容</p><p className="text-sm font-bold text-slate-700 leading-relaxed">{item.product}</p></div>
                                            <div className="flex justify-between items-end pt-2">
                                                <div className="space-y-1">
                                                    <p className={`text-2xl font-black ${isUnpriced ? 'text-rose-400 italic' : 'text-slate-900'}`}>{isUnpriced ? '待定價' : `NT$ ${Number(item.price).toLocaleString()}`}</p>
                                                    <p className="text-[11px] font-bold text-slate-400 uppercase">{item.fPrice || 0} {item.cur}</p>
                                                </div>
                                                <div className="flex flex-col gap-3">
                                                    <div className="flex gap-2 self-end"><button onClick={() => { setForm(item); setIsEditing(item.id); setShowModal(true); }} className="p-2.5 bg-slate-100 text-slate-400 rounded-xl"><Icon name="edit" /></button><button onClick={() => handleDelete(item.id)} className="p-2.5 bg-rose-50 text-rose-300 rounded-xl"><Icon name="trash" /></button></div>
                                                    <button onClick={() => moveToOrder(item.id)} className="px-6 py-3 bg-sky-500 text-white rounded-2xl font-black text-[11px] active-scale shadow-lg">完成採購</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })
                        ) : (
                            Object.keys(groupedOrders).map(customer => (
                                <div key={customer} className="bg-white rounded-[32px] overflow-hidden border border-slate-200 shadow-sm mb-4">
                                    <div className="bg-sky-50/50 px-6 py-5 flex justify-between items-center border-b border-sky-100/50">
                                        <div className="flex items-center gap-2"><div className="bg-sky-600 p-1.5 rounded-lg text-white"><Icon name="user" className="w-3.5 h-3.5" /></div><div><span className="font-black text-sky-900 text-sm block leading-none">{customer}</span>{groupedOrders[customer].lastFive && <span className="text-[10px] font-bold text-sky-600">末五碼：{groupedOrders[customer].lastFive}</span>}</div></div>
                                        <div className="flex flex-col items-end gap-2">
                                            <select className={`px-4 py-2 rounded-xl text-[11px] font-black text-white shadow-md ${groupedOrders[customer].status === '待查帳' ? 'bg-amber-500' : groupedOrders[customer].status === '完成' ? 'bg-emerald-500' : 'bg-sky-600'}`} value={groupedOrders[customer].status} onChange={e => {
                                                const newStatus = e.target.value;
                                                if(newStatus === '已匯款') { setBankData({customer, lastFive:''}); setShowBankModal(true); } 
                                                else { items.filter(i => i.customer === customer && i.stage === 'order').forEach(item => db.ref(`items/${item.id}`).update({orderStatus: newStatus})); }
                                            }}>
                                                {orderStatuses.filter(s => s !== '全部').map(s => <option key={s} value={s}>{s}</option>)}
                                            </select>
                                            <p className="text-sm font-black text-sky-700">NT$ {groupedOrders[customer].total.toLocaleString()}</p>
                                        </div>
                                    </div>
                                    <div className="p-4 space-y-2 bg-white">
                                        {groupedOrders[customer].items.map(item => (
                                            <div key={item.id} className="bg-slate-50/40 p-4 rounded-2xl flex justify-between items-center">
                                                <div className="flex-1"><span className="text-[9px] font-black text-slate-400 uppercase">#{item.cat}</span><p className="text-xs font-black text-slate-700">{item.product}</p><p className="text-[10px] font-bold text-slate-400">NT$ {Number(item.price).toLocaleString()} / {item.fPrice} {item.cur}</p></div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => { setForm(item); setIsEditing(item.id); setShowModal(true); }} className="text-slate-300 p-2 active-scale"><Icon name="edit" className="w-4 h-4" /></button>
                                                    <button onClick={() => handleDelete(item.id)} className="text-rose-200 p-2 active-scale"><Icon name="trash" className="w-4 h-4" /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))
                        )}
                    </div>

                    {showBankModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
                            <div className="bg-white w-full max-w-xs rounded-[32px] p-8 shadow-2xl text-center">
                                <h3 className="text-lg font-black text-slate-800 mb-4 uppercase">輸入末五碼</h3>
                                <input autoFocus type="tel" maxLength="5" className="w-full field-value text-center text-2xl tracking-widest mb-6" value={bankData.lastFive} onChange={e => setBankData({...bankData, lastFive: e.target.value})} />
                                <div className="flex gap-3"><button onClick={() => setShowBankModal(false)} className="flex-1 bg-slate-100 text-slate-400 py-3 rounded-xl font-black">取消</button><button onClick={() => {
                                    items.filter(i => i.customer === bankData.customer && i.stage === 'order').forEach(item => db.ref(`items/${item.id}`).update({orderStatus: '待查帳', lastFive: bankData.lastFive}));
                                    setShowBankModal(false);
                                }} className="flex-1 bg-sky-500 text-white py-3 rounded-xl font-black">確認查帳</button></div>
                            </div>
                        </div>
                    )}

                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
                            <div className="bg-white w-full max-w-md rounded-[40px] p-8 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
                                <h2 className="text-2xl font-black text-slate-800 mb-6 italic uppercase">{isEditing ? '修改商品' : '新增商品'}</h2>
                                <div className="space-y-5">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><p className="field-label">分類 Tag</p><input className="field-value" value={form.cat} onChange={e => setForm({...form, cat: e.target.value})} /></div>
                                        <div><p className="field-label">支付 Payer</p><div className="flex gap-1 bg-slate-100 p-1 rounded-xl">
                                            {['琳', '璇', '無'].map(p => <button key={p} onClick={() => setForm({...form, payer: p})} className={`flex-1 py-2 rounded-lg text-[10px] font-black ${form.payer === p ? 'bg-white shadow-sm' : 'text-slate-400'}`}>{p}</button>)}
                                        </div></div>
                                    </div>
                                    <div><p className="field-label">客戶 Client</p><input className="field-value" value={form.customer} onChange={e => setForm({...form, customer: e.target.value})} /></div>
                                    <div><p className="field-label">商品內容 Product</p><input className="field-value" value={form.product} onChange={e => setForm({...form, product: e.target.value})} /></div>
                                    <div className="bg-slate-50 p-5 rounded-[28px] space-y-4 shadow-inner border border-slate-100">
                                        <div className="grid grid-cols-5 gap-1">
                                            {Object.keys(rates).map(c => <button key={c} onClick={() => {
                                                const newRate = rates[c] || 1;
                                                setForm({...form, cur: c, price: form.fPrice ? Math.round(form.fPrice * newRate) : form.price });
                                            }} className={`py-2 rounded-lg text-[10px] font-black border transition-all ${form.cur === c ? 'bg-sky-500 border-sky-600 text-white' : 'bg-white text-slate-400'}`}>{c}</button>)}
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><p className="text-[9px] font-black text-amber-500 mb-1 ml-1">外幣單價</p><input type="number" className="field-value border-none text-amber-600 font-bold bg-white" value={form.fPrice} onChange={e => {
                                                const fPrice = e.target.value;
                                                const rate = rates[form.cur] || 1;
                                                setForm({ ...form, fPrice, price: fPrice ? Math.round(fPrice * rate) : '' });
                                            }} /></div>
                                            <div><p className="text-[9px] font-black text-sky-500 mb-1 ml-1">台幣成本</p><input type="number" className="field-value border-none text-sky-600 font-bold bg-white" value={form.price} onChange={e => setForm({...form, price: e.target.value})} /></div>
                                        </div>
                                        <div><p className="text-[9px] font-black text-emerald-500 mb-1 ml-1">利潤</p><input type="number" className="field-value border-none text-emerald-600 font-bold bg-white" value={form.fee} onChange={e => setForm({...form, fee: e.target.value})} /></div>
                                    </div>
                                    <div className="flex gap-4 pt-4">
                                        <button onClick={() => setShowModal(false)} className="flex-1 bg-slate-100 text-slate-400 py-4 rounded-[20px] font-black">取消</button>
                                        <button onClick={() => handleSave(form)} className="flex-[2] bg-sky-500 text-white py-4 rounded-[20px] font-black shadow-xl">儲存資訊</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
