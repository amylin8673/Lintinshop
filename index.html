<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinTin | 專業代購系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans">
    <div class="max-w-md mx-auto p-4 space-y-6">
        <div class="flex justify-between items-center py-2">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
                    <i class="fas fa-box text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black text-slate-800 leading-tight">LinTin</h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Channel: LinTin</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm border border-slate-100 text-slate-400">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
                <button onclick="openModal()" class="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200 text-white">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3">
            <div class="bg-white p-4 rounded-[2rem] border border-slate-100 shadow-sm space-y-1">
                <div class="flex justify-between items-center">
                    <p class="text-[9px] font-bold text-slate-400">購物金餘額</p>
                    <i class="fas fa-sync text-[8px] text-blue-300"></i>
                </div>
                <p class="text-sm font-black text-blue-500">0 <span class="text-[9px]">KRW</span></p>
            </div>
            <div class="bg-white p-4 rounded-[2rem] border border-slate-100 shadow-sm space-y-1">
                <p class="text-[9px] font-bold text-slate-400">待收帳款</p>
                <p class="text-sm font-black text-orange-400">NT$ 0</p>
            </div>
            <div class="bg-white p-4 rounded-[2rem] border border-slate-100 shadow-sm space-y-1">
                <p class="text-[9px] font-bold text-slate-400">累計利潤</p>
                <p class="text-sm font-black text-emerald-500">NT$ 0</p>
            </div>
        </div>

        <div class="flex border-b border-slate-100">
            <button class="flex-1 pb-3 text-sm font-black text-blue-500 border-b-2 border-blue-500">採購清單</button>
            <button class="flex-1 pb-3 text-sm font-black text-slate-400">訂單管理</button>
        </div>

        <div class="relative">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
            <input type="text" placeholder="快速搜尋..." class="w-full bg-white border border-slate-100 py-3 pl-10 pr-4 rounded-2xl text-sm font-medium outline-none">
        </div>

        <div class="py-10 text-center space-y-4">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-slate-200 border-t-blue-500"></div>
            <p class="text-xs font-bold text-slate-300 tracking-widest">同步雲端資料...</p>
        </div>
    </div>
</body>
</html>
