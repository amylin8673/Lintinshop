<div className="bg-slate-50 p-5 rounded-[28px] space-y-4">
    {/* 幣別切換 */}
    <div className="grid grid-cols-5 gap-1">
        {Object.keys(rates).map(c => <button key={c} onClick={() => setForm({...form, cur: c})} className={`py-2 rounded-lg text-[10px] font-black border transition-all ${form.cur === c ? 'bg-sky-500 border-sky-600 text-white' : 'bg-white text-slate-400'}`}>{c}</button>)}
    </div>
    
    {/* 外幣與台幣欄位 */}
    <div className="grid grid-cols-2 gap-4">
        <div>
            <p className="text-[9px] font-black text-amber-500 mb-1 ml-1 uppercase">外幣單價</p>
            <input type="number" className="field-value border-none text-amber-600 font-bold bg-white" value={form.fPrice} onChange={e => handleFPriceChange(e.target.value)} />
        </div>
        <div>
            <p className="text-[9px] font-black text-sky-500 mb-1 ml-1 uppercase">台幣成本</p>
            <input type="number" className="field-value border-none text-sky-600 font-bold bg-white" value={form.price} onChange={e => setForm({...form, price: e.target.value})} />
        </div>
    </div>

    {/* 利潤欄位 */}
    <div>
        <p className="text-[9px] font-black text-emerald-500 mb-1 ml-1 uppercase">預期利潤</p>
        <input type="number" className="field-value border-none text-emerald-600 font-bold bg-white" value={form.fee} onChange={e => setForm({...form, fee: e.target.value})} />
    </div>
</div>
