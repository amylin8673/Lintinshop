<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinTin 系統 v23.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-scale:active { transform: scale(0.95); }
        .glass-tag { backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.3); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                box: <path d="M21 8l-2-2H5L3 8v11a2 2 0 002 2h14a2 2 0 002-2V8zM5 8l1.5-1.5h11L19 8H5zm14 11H5V10h14v9zM9 12h6v2H9v-2z" />,
                plus: <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />,
                edit: <path d="M14.06 3.02l.92.92L5.92 13H5v-.92l9.06-9.06M17.66 1c-.25 0-.51.1-.7.29l-1.83 1.83 3.75 3.75 1.83-1.83c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.2-.2-.45-.29-.71-.29zm-3.6 3.19L3 15.25V21h5.75L19.81 9.94l-3.75-3.75z" />,
                trash: <path d="M16 9v10H8V9h8m-1.5-6h-5l-1 1H5v2h14V4h-3.5l-1-1zM18 7H6v12c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7z" />,
                x: <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
            };
            return <svg className={className} viewBox="0 0 24 24" fill="currentColor">{icons[name]}</svg>;
        };

        const App = () => {
            const [items, setItems] = useState(() => JSON.parse(localStorage.getItem('lt_items')) || []);
            const [pCats, setPCats] = useState(() => JSON.parse(localStorage.getItem('lt_p_cats')) || ['預設', '韓國東大門']);
            const [credit, setCredit] = useState(() => JSON.parse(localStorage.getItem('lt_credit')) || { ntd: 0, foreign: 0, cur: 'KRW' });
            const [rates] = useState({ KRW: 0.024, JPY: 0.21, THB: 0.9, HKD: 4.1, AUD: 21.2, NTD: 1 });
            const orderStatuses = ['全部', '待付款', '已匯款', '待查帳', '已出貨', '完成'];
            
            const [viewMode, setViewMode] = useState('purchase'); 
            const [activePCat, setActivePCat] = useState('全部');
            const [activeStatus, setActiveStatus] = useState('全部');
            
            const [showModal, setShowModal] = useState(false);
            const [showCreditModal, setShowCreditModal] = useState(false);
            const [isEditing, setIsEditing] = useState(null);

            const [form, setForm] = useState({ customer: '', product: '', price: '', fee: '', payer: '無', cur: 'KRW', fPrice: '', cat: '預設', orderStatus: '待付款' });
            const [tempCredit, setTempCredit] = useState({ ntd: 0, foreign: 0, cur: 'KRW' });

            useEffect(() => { localStorage.setItem('lt_items', JSON.stringify(items)); }, [items]);
            useEffect(() => { localStorage.setItem('lt_p_cats', JSON.stringify(pCats)); }, [pCats]);
            useEffect(() => { localStorage.setItem('lt_credit', JSON.stringify(credit)); }, [credit]);

            const stats = useMemo(() => ({
                profit: items.reduce((s, i) => s + Number(i.fee || 0), 0),
                pending: items.filter(i => i.stage === 'order' && i.orderStatus !== '完成').reduce((s, i) => s + Number(i.price || 0), 0)
            }), [items]);

            const filteredItems = items.filter(i => {
                if (i.stage !== viewMode) return false;
                if (viewMode === 'purchase') return activePCat === '全部' || i.cat === activePCat;
                return activeStatus === '全部' || i.orderStatus === activeStatus;
            });

            return (
                <div className="min-h-screen pb-10 text-slate-900 bg-[#F8FAFC]">
                    <header className="bg-white sticky top-0 z-40 border-b border-slate-100 p-5 pb-2 shadow-sm text-left">
                        <div className="flex justify-between items-center mb-5">
                            <div className="flex items-center gap-2">
                                <div className="bg-sky-600 p-2.5 rounded-2xl text-white shadow-lg shadow-sky-100"><Icon name="box" className="w-5 h-5" /></div>
                                <h1 className="text-2xl font-black text-slate-800 italic leading-none tracking-tight">LinTin</h1>
                            </div>
                            <button onClick={() => { 
                                setForm({ customer: '', product: '', price: '', fee: '', payer: '無', cur: 'KRW', fPrice: '', cat: '預設', orderStatus: '待付款' }); 
                                setIsEditing(null); setShowModal(true); 
                            }} className="bg-slate-900 text-white p-3 rounded-2xl shadow-xl active-scale">
                                <Icon name="plus" className="w-6 h-6" />
                            </button>
                        </div>

                        {/* 頂部數據卡 */}
                        <div className="grid grid-cols-3 gap-2 mb-4">
                            <div onClick={() => { setTempCredit({...credit}); setShowCreditModal(true); }} className="bg-white p-3 rounded-2xl border border-slate-100 shadow-sm">
                                <p className="text-[9px] font-bold text-slate-400 mb-1">基金庫存</p>
                                <p className="text-[11px] font-black text-amber-500 truncate leading-none mb-1">{credit.foreign} {credit.cur}</p>
                                <p className="text-[11px] font-black text-slate-800 leading-none">${Number(credit.ntd).toLocaleString()}</p>
                            </div>
                            <div className="bg-amber-50/50 p-3 rounded-2xl border border-amber-100/50">
                                <p className="text-[9px] font-bold text-amber-600 mb-1">待收訂單</p>
                                <p className="text-xs font-black text-amber-700 mt-1">${stats.pending.toLocaleString()}</p>
                            </div>
                            <div className="bg-emerald-50/50 p-3 rounded-2xl border border-emerald-100/50">
                                <p className="text-[9px] font-bold text-emerald-600 mb-1">累計利潤</p>
                                <p className="text-xs font-black text-emerald-700 mt-1">${stats.profit.toLocaleString()}</p>
                            </div>
                        </div>

                        <div className="flex gap-6 border-b border-slate-50 mb-2">
                            <button onClick={() => setViewMode('purchase')} className={`pb-2 text-xs font-black transition-all ${viewMode === 'purchase' ? 'text-sky-600 border-b-2 border-sky-600' : 'text-slate-400'}`}>採購清單</button>
                            <button onClick={() => setViewMode('order')} className={`pb-2 text-xs font-black transition-all ${viewMode === 'order' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-slate-400'}`}>訂單管理</button>
                        </div>

                        {/* 標籤過濾欄 */}
                        <div className="flex gap-2 overflow-x-auto no-scrollbar py-1">
                            {viewMode === 'purchase' ? (
                                <>
                                    <button onClick={() => setActivePCat('全部')} className={`px-4 py-2 rounded-full text-[11px] font-bold whitespace-nowrap transition-all ${activePCat === '全部' ? 'bg-sky-600 text-white shadow-md shadow-sky-100' : 'bg-slate-100 text-slate-500'}`}>全部</button>
                                    {pCats.map(c => <button key={c} onClick={() => setActivePCat(c)} className={`px-4 py-2 rounded-full text-[11px] font-bold whitespace-nowrap transition-all ${activePCat === c ? 'bg-sky-600 text-white shadow-md shadow-sky-100' : 'bg-slate-100 text-slate-500'}`}>{c}</button>)}
                                </>
                            ) : (
                                orderStatuses.map(s => (
                                    <button key={s} onClick={() => setActiveStatus(s)} className={`px-4 py-2 rounded-full text-[11px] font-bold whitespace-nowrap transition-all ${activeStatus === s ? 'bg-indigo-600 text-white shadow-md shadow-indigo-100' : 'bg-slate-100 text-slate-500'}`}>{s}</button>
                                ))
                            )}
                        </div>
                    </header>

                    <div className="p-4 space-y-4 text-left">
                        {filteredItems.map(item => (
                            <div key={item.id} className="bg-white rounded-[32px] p-6 border border-slate-100 shadow-sm relative transition-all active:scale-[0.98]">
                                {/* 支付者浮動標籤 */}
                                <div className={`absolute top-0 right-8 px-4 py-1.5 text-[10px] font-black text-white rounded-b-2xl shadow-sm ${item.payer === '璇' ? 'bg-sky-400' : item.payer === '琳' ? 'bg-fuchsia-400' : 'bg-slate-300'}`}>{item.payer}</div>
                                
                                <div className="space-y-3 mb-5">
                                    <div className="flex items-center gap-2">
                                        <span className="px-2.5 py-1 rounded-full bg-slate-100 text-slate-500 text-[10px] font-bold border border-slate-200/50">客戶</span>
                                        <h3 className="font-bold text-slate-800 text-base">{item.customer}</h3>
                                    </div>
                                    
                                    <div className="flex items-start gap-2">
                                        <span className="px-2.5 py-1 rounded-full bg-amber-50 text-amber-600 text-[10px] font-bold border border-amber-100 shrink-0">商品</span>
                                        <p className="text-sm text-slate-600 font-medium leading-relaxed">{item.product}</p>
                                    </div>

                                    <div className="flex items-center gap-2">
                                        <span className="px-2.5 py-1 rounded-full bg-sky-50 text-sky-600 text-[10px] font-bold border border-sky-100">分類</span>
                                        <span className="text-[11px] text-sky-800 font-bold">{item.cat}</span>
                                    </div>
                                </div>

                                <div className="flex justify-between items-center pt-4 border-t border-slate-50">
                                    <div className="flex gap-2">
                                        <button onClick={() => { setForm(item); setIsEditing(item.id); setShowModal(true); }} className="p-3 bg-slate-50 text-slate-400 rounded-2xl active-scale border border-slate-100"><Icon name="edit" className="w-4 h-4" /></button>
                                        <button onClick={() => setItems(items.filter(i => i.id !== item.id))} className="p-3 bg-slate-50 text-slate-400 rounded-2xl active-scale border border-slate-100"><Icon name="trash" className="w-4 h-4" /></button>
                                    </div>
                                    <div className="flex flex-col items-end gap-1">
                                        {viewMode === 'purchase' ? (
                                            <button onClick={() => setItems(items.map(i => i.id === item.id ? {...i, stage:'order', orderStatus:'待付款'} : i))} className="bg-sky-600 text-white text-[11px] font-black px-5 py-2 rounded-full active-scale shadow-lg shadow-sky-100">標記已買到</button>
                                        ) : (
                                            <div className="relative">
                                                <select className={`pl-3 pr-8 py-2 rounded-full text-[11px] font-black appearance-none outline-none shadow-sm transition-colors ${item.orderStatus === '完成' ? 'bg-emerald-500 text-white' : 'bg-indigo-500 text-white'}`} value={item.orderStatus} onChange={e => setItems(items.map(i => i.id === item.id ? {...i, orderStatus:e.target.value} : i))}>
                                                    {orderStatuses.filter(s => s !== '全部').map(s => <option key={s} value={s}>{s}</option>)}
                                                </select>
                                                <div className="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-white/60">▼</div>
                                            </div>
                                        )}
                                        <div className="text-right mt-1">
                                            <p className="text-[10px] text-slate-300 font-mono tracking-tighter uppercase">{item.fPrice} {item.cur}</p>
                                            <p className="text-xl font-black text-slate-800 leading-none">NT$ {Number(item.price).toLocaleString()}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* 新增/編輯視窗 (同樣升級視覺) */}
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-slate-900/60 p-0 sm:p-4 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-md rounded-t-[40px] sm:rounded-[40px] p-8 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar text-left animate-in slide-in-from-bottom duration-300">
                                <div className="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6 sm:hidden"></div>
                                <h2 className="text-2xl font-black text-slate-800 mb-6 italic">Item Detail</h2>
                                <div className="space-y-5">
                                    <div className="bg-slate-50/50 p-4 rounded-[24px] border border-slate-100">
                                        <p className="text-[10px] font-black text-slate-400 mb-3 uppercase tracking-widest">標籤分類</p>
                                        <div className="flex flex-wrap gap-2 mb-3">
                                            {pCats.map(c => (
                                                <div key={c} onClick={() => setForm({...form, cat: c})} className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-[11px] font-bold cursor-pointer transition-all ${form.cat === c ? 'bg-sky-600 text-white shadow-md' : 'bg-white text-slate-400 border border-slate-100'}`}>
                                                    <span>{c}</span>
                                                    {c !== '預設' && <button onClick={(e) => { e.stopPropagation(); setPCats(prev => prev.filter(x => x !== c)); if(form.cat === c) setForm({...form, cat:'預設'}); }}><Icon name="x" className="w-3 h-3" /></button>}
                                                </div>
                                            ))}
                                        </div>
                                        <input placeholder="+ 輸入新分類標籤" className="w-full bg-white p-3 rounded-2xl text-sm font-bold outline-none border border-slate-100 focus:border-sky-300 transition-colors" value={form.cat} onChange={e => setForm({...form, cat: e.target.value})} />
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1">
                                            <p className="text-[10px] font-black text-slate-400 ml-2 uppercase">客戶名稱</p>
                                            <input placeholder="王小明" className="w-full bg-slate-50 p-4 rounded-2xl font-bold text-sm outline-none focus:bg-white focus:ring-2 ring-sky-100 transition-all" value={form.customer} onChange={e => setForm({...form, customer: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <p className="text-[10px] font-black text-slate-400 ml-2 uppercase">支付對象</p>
                                            <div className="flex gap-1 bg-slate-50 p-1.5 rounded-2xl">
                                                {['琳', '璇', '無'].map(p => <button key={p} onClick={() => setForm({...form, payer: p})} className={`flex-1 py-2 rounded-xl text-[11px] font-black transition-all ${form.payer === p ? 'bg-white text-sky-600 shadow-sm' : 'text-slate-400'}`}>{p}</button>)}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="space-y-1">
                                        <p className="text-[10px] font-black text-slate-400 ml-2 uppercase">商品名稱</p>
                                        <input placeholder="例如：韓版毛衣 藍色 M" className="w-full bg-slate-50 p-4 rounded-2xl font-bold text-sm outline-none focus:bg-white focus:ring-2 ring-sky-100 transition-all" value={form.product} onChange={e => setForm({...form, product: e.target.value})} />
                                    </div>

                                    <div className="bg-sky-50/30 p-5 rounded-[32px] space-y-4 border border-sky-100/50">
                                        <div className="flex gap-3">
                                            <div className="w-24">
                                                <p className="text-[10px] font-black text-sky-400 ml-2 mb-1 uppercase">幣別</p>
                                                <select className="w-full bg-white p-3 rounded-xl text-xs font-black outline-none border border-sky-100" value={form.cur} onChange={e => setForm({...form, cur: e.target.value})}>
                                                    {Object.keys(rates).map(c => <option key={c} value={c}>{c}</option>)}
                                                </select>
                                            </div>
                                            <div className="flex-1">
                                                <p className="text-[10px] font-black text-sky-400 ml-2 mb-1 uppercase">外幣單價</p>
                                                <input type="number" placeholder="0" className="w-full bg-white p-3 rounded-xl font-black text-sm outline-none border border-sky-100 text-amber-600" value={form.fPrice} onChange={e => setForm({...form, fPrice: e.target.value, price: Math.round(e.target.value * rates[form.cur])})} />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div>
                                                <p className="text-[10px] font-black text-sky-400 ml-2 mb-1 uppercase">台幣售價</p>
                                                <input type="number" className="w-full bg-white p-3 rounded-xl font-black text-sm outline-none border border-sky-100 text-sky-600" value={form.price} onChange={e => setForm({...form, price: e.target.value})} />
                                            </div>
                                            <div>
                                                <p className="text-[10px] font-black text-sky-400 ml-2 mb-1 uppercase">預計利潤</p>
                                                <input type="number" className="w-full bg-white p-3 rounded-xl font-black text-sm outline-none border border-emerald-100 text-emerald-600" value={form.fee} onChange={e => setForm({...form, fee: e.target.value})} />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex gap-3 pt-2">
                                        <button onClick={() => setShowModal(false)} className="flex-1 bg-slate-100 text-slate-500 py-4 rounded-2xl font-bold active-scale transition-all">取消</button>
                                        <button onClick={() => {
                                            if (form.cat && !pCats.includes(form.cat)) setPCats([...pCats, form.cat]);
                                            if (isEditing) setItems(items.map(i => i.id === isEditing ? {...form, id: isEditing} : i));
                                            else setItems([{...form, id: Date.now(), stage: viewMode}, ...items]);
                                            setShowModal(false);
                                        }} className="flex-[2] bg-slate-900 text-white py-4 rounded-2xl font-black shadow-xl shadow-slate-200 active-scale transition-all">儲存項目資料</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
