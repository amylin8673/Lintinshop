<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinTin Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 p-4 font-sans text-slate-900 leading-relaxed">
    <div class="max-w-md mx-auto space-y-6 pt-4">
        <div class="flex justify-between items-center px-2">
            <h1 class="text-2xl font-black text-blue-600 italic">LinTin Pro</h1>
            <span class="bg-blue-600 text-white px-3 py-1 rounded-full text-[10px] font-bold shadow-md">GITHUB CLOUD</span>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-blue-200/50 p-8 border border-white relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-blue-600"></div>
            
            <div class="space-y-6">
                <div>
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest mb-3 block ml-1">外幣金額</label>
                    <div class="flex bg-slate-100 rounded-2xl p-2 border-2 border-transparent focus-within:border-blue-500 focus-within:bg-white transition-all">
                        <select id="currency" class="bg-white px-4 py-2 rounded-xl font-bold text-blue-600 shadow-sm outline-none">
                            <option value="JPY">日圓</option>
                            <option value="KRW">韓圓</option>
                            <option value="USD">美金</option>
                        </select>
                        <input type="number" id="foreignPrice" placeholder="0.00" class="w-full bg-transparent p-3 text-2xl font-bold outline-none text-right">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <label class="text-[10px] font-bold text-slate-400 block mb-1">匯率</label>
                        <input type="number" id="rate" value="0.215" step="0.001" class="w-full bg-transparent text-lg font-bold text-blue-800 outline-none">
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <label class="text-[10px] font-bold text-slate-400 block mb-1">服務費 %</label>
                        <input type="number" id="fee" value="10" class="w-full bg-transparent text-lg font-bold text-blue-800 outline-none">
                    </div>
                </div>

                <button onclick="calculate()" class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-3xl py-6 shadow-xl shadow-blue-300 active:scale-95 transition-all outline-none">
                    <span class="text-blue-100 text-xs block mb-1 opacity-80">預估台幣總價</span>
                    <span class="text-3xl font-black" id="totalResult">NT$ 0</span>
                </button>
            </div>
        </div>

        <div class="px-6 py-4 bg-blue-50 rounded-2xl border border-blue-100 flex items-center space-x-2">
            <div class="w-2 h-2 bg-blue-400 rounded-full animate-pulse"></div>
            <span class="text-[10px] font-bold text-blue-600">系統狀態：已連結 GitHub Pages 雲端服務</span>
        </div>
    </div>

    <script>
        function calculate() {
            const price = parseFloat(document.getElementById('foreignPrice').value) || 0;
            const rate = parseFloat(document.getElementById('rate').value) || 0;
            const fee = parseFloat(document.getElementById('fee').value) || 0;
            const total = Math.round(price * rate * (1 + fee/100));
            document.getElementById('totalResult').innerText = 'NT$ ' + total.toLocaleString();
        }
    </script>
</body>
</html>
