<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinTin Pro | 專業代購管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-user-lin { background-color: #f0abfc; color: white; } /* 琳 - 粉紫色 */
        .active-user-shuan { background-color: #bfdbfe; color: #1e40af; } /* 璇 - 淺藍色 */
        .unselected { background-color: #f1f5f9; color: #94a3b8; }
    </style>
</head>
<body class="bg-slate-100/50 font-sans">
    <div class="max-w-md mx-auto p-4 opacity-50">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-blue-600 italic">LinTin</h1>
            <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white"><i class="fas fa-plus"></i></div>
        </div>
    </div>

    <div class="fixed inset-0 bg-slate-900/20 backdrop-blur-md flex items-center justify-center p-6 z-50">
        <div class="bg-white w-full rounded-[2.5rem] p-8 shadow-2xl space-y-6 relative">
            <button class="absolute right-6 top-6 text-slate-300"><i class="fas fa-times text-xl"></i></button>

            <h2 class="text-center text-lg font-black text-slate-700">新增代購</h2>

            <div class="space-y-5">
                <div>
                    <label class="text-xs font-bold text-slate-400 mb-2 block">代墊人</label>
                    <div class="flex bg-slate-100 p-1 rounded-xl gap-1">
                        <button class="flex-1 py-2 text-xs font-bold rounded-lg unselected">無</button>
                        <button class="flex-1 py-2 text-xs font-bold rounded-lg active-user-lin shadow-sm">琳</button>
                        <button class="flex-1 py-2 text-xs font-bold rounded-lg unselected">璇</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-slate-400 mb-2 block">買家名稱</label>
                        <input type="text" placeholder="輸入名稱" class="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl text-sm font-bold outline-none focus:ring-2 ring-blue-100">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-400 mb-2 block">商品名稱</label>
                        <input type="text" placeholder="輸入商品" class="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl text-sm font-bold outline-none focus:ring-2 ring-blue-100">
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-400 mb-2 block">外幣金額</label>
                    <div class="relative">
                        <select class="absolute left-3 top-1/2 -translate-y-1/2 bg-transparent text-blue-500 font-black text-xs outline-none">
                            <option>KRW</option>
                            <option>JPY</option>
                        </select>
                        <input type="number" value="0" class="w-full bg-slate-50 border border-slate-100 py-4 pl-16 pr-4 rounded-2xl text-sm font-bold outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-slate-400 mb-2 block">台幣價格</label>
                        <input type="number" placeholder="自動計算" class="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl text-sm font-bold outline-none">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-400 mb-2 block">代購費 (潤)</label>
                        <input type="number" placeholder="利潤" class="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl text-sm font-bold outline-none">
                    </div>
                </div>

                <button class="w-full bg-sky-300 text-white py-4 rounded-2xl font-black text-lg shadow-lg shadow-sky-100 active:scale-95 transition-all">
                    新增項目
                </button>
            </div>
        </div>
    </div>
</body>
</html>
