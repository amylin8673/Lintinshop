<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinTin 代購管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4 font-sans">
    <div class="max-w-md mx-auto space-y-6">
        <header class="flex justify-between items-center py-4">
            <h1 class="text-2xl font-black text-blue-600 tracking-tight">LinTin Pro</h1>
            <span class="bg-green-100 text-green-600 px-3 py-1 rounded-full text-xs font-bold shadow-sm">GitHub 永久版</span>
        </header>

        <div class="bg-white rounded-3xl shadow-xl shadow-blue-100/50 p-6 border border-blue-50">
            <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                <span class="bg-blue-500 w-2 h-6 rounded-full mr-2"></span>快速計算
            </h2>
            
            <div class="space-y-5">
                <div>
                    <label class="text-sm font-bold text-gray-500 mb-2 block">外幣金額</label>
                    <div class="flex border-2 border-blue-100 rounded-2xl overflow-hidden focus-within:border-blue-400 transition-all shadow-sm">
                        <select id="currency" class="bg-blue-50 px-4 font-bold text-blue-700 outline-none border-r-2 border-blue-100">
                            <option value="JPY">日圓</option>
                            <option value="KRW">韓圓</option>
                            <option value="USD">美金</option>
                        </select>
                        <input type="number" id="foreignPrice" placeholder="輸入金額" class="w-full p-4 text-lg outline-none font-medium">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-400">當前匯率</label>
                        <input type="number" id="rate" value="0.215" step="0.001" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-blue-300">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-400">服務費 %</label>
                        <input type="number" id="fee" value="10" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-blue-300">
                    </div>
                </div>

                <div class="pt-2">
                    <button onclick="calculate()" class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-2xl p-4 shadow-lg shadow-blue-200 active:scale-95 transition-all outline-none">
                        <div class="text-xs opacity-80 mb-1">預估台幣總價 (含服務費)</div>
                        <div class="text-2xl font-black" id="totalResult">NT$ 0</div>
                    </button>
                </div>
            </div>
        </div>

        <p class="text-center text-gray-400 text-xs">貼心提醒：計算結果僅供參考，實際以交易時匯率為準。</p>
    </div>

    <script>
        function calculate() {
            const price = parseFloat(document.getElementById('foreignPrice').value) || 0;
            const rate = parseFloat(document.getElementById('rate').value) || 0;
            const fee = parseFloat(document.getElementById('fee').value) || 0;
            
            // 計算公式：外幣 * 匯率 * (1 + 服務費百分比)
            const total = Math.round(price * rate * (1 + fee/100));
            
            document.getElementById('totalResult').innerText = 'NT$ ' + total.toLocaleString();
        }
    </script>
</body>
</html>
