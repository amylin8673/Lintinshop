<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinTin 協作系統 v5.7</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-scale:active { transform: scale(0.95); }
        .rotate-anim { animation: rotate 1s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const Icon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                box: <path d="M21 8l-2-2H5L3 8v11a2 2 0 002 2h14a2 2 0 002-2V8zM5 8l1.5-1.5h11L19 8H5zm14 11H5V10h14v9zM9 12h6v2H9v-2z" />,
                edit: <path d="M14.06 3.02l.92.92L5.92 13H5v-.92l9.06-9.06M17.66 1c-.25 0-.51.1-.7.29l-1.83 1.83 3.75 3.75 1.83-1.83c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.2-.2-.45-.29-.71-.29zm-3.6 3.19L3 15.25V21h5.75L19.81 9.94l-3.75-3.75z" />,
                trash: <path d="M16 9v10H8V9h8m-1.5-6h-5l-1 1H5v2h14V4h-3.5l-1-1zM18 7H6v12c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7z" />,
                down: <path d="M7 10l5 5 5-5H7z" />,
                search: <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />,
                refresh: <path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />,
                card: <path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z" />
            };
            return (
                <svg className={className} viewBox="0 0 24 24" fill="currentColor">
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [inviteCode, setInviteCode] = React.useState(localStorage.getItem('lintin_invite_code') || '');
            const [tempCode, setTempCode] = React.useState('');
            const [viewMode, setViewMode] = React.useState('purchase'); 
            const [orderFilter, setOrderFilter] = React.useState('全部');
            const [searchQuery, setSearchQuery] = React.useState('');
            const [showModal, setShowModal] = React.useState(false);
            const [isEditing, setIsEditing] = React.useState(null);
            const [items, setItems] = React.useState([]);
            
            const [payers, setPayers] = React.useState(JSON.parse(localStorage.getItem('lintin_payers')) || ['琳', '璇']);
            
            const [rates, setRates] = React.useState({ KRW: 0.024, JPY: 0.21, HKD: 4.1, THB: 0.9, AUD: 21.2, NTD: 1 });
            const [isUpdatingRates, setIsUpdatingRates] = React.useState(false);

            const [showBankModal, setShowBankModal] = React.useState(false);
            const [currentBankCustomer, setCurrentBankCustomer] = React.useState(null);
            const [bankCode, setBankCode] = React.useState('');

            const [fundSettings, setFundSettings] = React.useState({ amount: 1000000, currency: 'KRW' });
            const [pendingFinance, setPendingFinance] = React.useState(0);
            const [totalProfit, setTotalProfit] = React.useState(0);

            const currencies = ['KRW', 'JPY', 'THB', 'HKD', 'AUD', 'NTD'];
            const orderStatusList = ['全部', '未付款', '已匯款', '待查帳', '已發貨', '已完成'];

            const initialForm = { customerName: '', productName: '', price: '', fee: '', payer: '琳', currency: 'KRW', foreignPrice: '', status: '未付款', bankLastFive: '' };
            const [formData, setFormData] = React.useState(initialForm);

            const fetchRates = async () => {
                setIsUpdatingRates(true);
                try {
                    const response = await fetch('https://www.floatrates.com/daily/twd.json');
                    const data = await response.json();
                    const newRates = { ...rates };
                    if (data.krw) newRates.KRW = 1 / data.krw.rate;
                    if (data.jpy) newRates.JPY = 1 / data.jpy.rate;
                    if (data.thb) newRates.THB = 1 / data.thb.rate;
                    if (data.hkd) newRates.HKD = 1 / data.hkd.rate;
                    if (data.aud) newRates.AUD = 1 / data.aud.rate;
                    setRates(newRates);
                } catch (error) { console.error("Rates fetch failed"); }
                finally { setTimeout(() => setIsUpdatingRates(false), 800); }
            };

            React.useEffect(() => {
                fetchRates();
                localStorage.setItem('lintin_payers', JSON.stringify(payers));
            }, [payers]);

            const addPayer = () => {
                const name = prompt("請輸入新的代墊人姓名：");
                if (name && !payers.includes(name)) setPayers([...payers, name]);
            };

            const removePayer = (name) => {
                if (payers.length <= 1) return;
                if (confirm(`確定要刪除「${name}」嗎？`)) setPayers(payers.filter(p => p !== name));
            };

            const groupedOrders = React.useMemo(() => {
                const orders = items.filter(i => i.stage === 'order');
                const groups = {};
                orders.forEach(item => {
                    if (!groups[item.customerName]) {
                        groups[item.customerName] = { customerName: item.customerName, items: [] };
                    }
                    groups[item.customerName].items.push(item);
                });
                return Object.values(groups);
            }, [items]);

            const saveItem = () => {
                if (!formData.customerName || !formData.productName) { alert("請填寫必要資訊"); return; }
                if (isEditing) {
                    setItems(items.map(item => item.id === isEditing ? { ...formData, id: isEditing, stage: item.stage } : item));
                    setIsEditing(null);
                } else {
                    setItems([{ id: Date.now(), ...formData, stage: 'purchase', status: '未付款' }, ...items]);
                }
                setShowModal(false);
                setFormData(initialForm);
            };

            const handleGroupStatusChange = (customerName, newStatus) => {
                if (newStatus === '已匯款') {
                    setCurrentBankCustomer(customerName);
                    const existing = items.find(i => i.customerName === customerName && i.bankLastFive);
                    setBankCode(existing ? existing.bankLastFive : '');
                    setShowBankModal(true);
                } else {
                    setItems(items.map(item => item.customerName === customerName && item.stage === 'order' ? { ...item, status: newStatus } : item));
                }
            };

            const saveBankCode = () => {
                setItems(items.map(item => (item.customerName === currentBankCustomer && item.stage === 'order') ? { ...item, bankLastFive: bankCode, status: '待查帳' } : item));
                setShowBankModal(false);
                setBankCode('');
            };

            const deleteItem = (id) => {
                const itemToDelete = items.find(i => i.id === id);
                if (confirm("確定要刪除這個商品嗎？")) {
                    if (itemToDelete.stage === 'order') {
                        setFundSettings(prev => ({ ...prev, amount: Number(prev.amount) + (Number(itemToDelete.price) / rates[prev.currency]) }));
                        setPendingFinance(prev => prev - Number(itemToDelete.price || 0));
                        setTotalProfit(prev => prev - Number(itemToDelete.fee || 0));
                    }
                    setItems(items.filter(item => item.id !== id));
                }
            };

            const markAsBought = (id) => {
                setItems(items.map(item => {
                    if (item.id === id) {
                        const itemPriceTWD = Number(item.price || 0);
                        const deduction = itemPriceTWD / rates[fundSettings.currency];
                        setFundSettings(prev => ({ ...prev, amount: Math.max(0, Number(prev.amount) - deduction) }));
                        setPendingFinance(prev => prev + itemPriceTWD);
                        setTotalProfit(prev => prev + Number(item.fee || 0));
                        return { ...item, stage: 'order', status: '未付款' };
                    }
                    return item;
                }));
                setViewMode('order');
            };

            const openEdit = (item) => { setIsEditing(item.id); setFormData(item); setShowModal(true); };

            const getPayerColor = (name) => {
                const colors = ['bg-fuchsia-400', 'bg-orange-400', 'bg-sky-400', 'bg-emerald-400', 'bg-indigo-400'];
                const idx = payers.indexOf(name);
                return idx !== -1 ? colors[idx % colors.length] : 'bg-slate-400';
            };

            if (!inviteCode) {
                return (
                    <div className="min-h-screen bg-sky-50 flex items-center justify-center p-6 text-center">
                        <div className="w-full max-w-sm bg-white rounded-[40px] p-10 shadow-xl">
                            <h1 className="text-2xl font-black text-sky-900 mb-6 italic">LinTin Login</h1>
                            <input type="text" placeholder="代碼" className="w-full bg-slate-50 rounded-2xl py-4 px-6 mb-4 font-black text-sky-600 outline-none" value={tempCode} onChange={(e) => setTempCode(e.target.value)} />
                            <button onClick={() => { setInviteCode(tempCode.toUpperCase()); localStorage.setItem('lintin_invite_code', tempCode.toUpperCase()); }} className="w-full bg-sky-500 text-white py-4 rounded-2xl font-black shadow-lg active-scale">進入系統</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-10 text-left">
                    <header className="bg-white/80 backdrop-blur-md border-b border-sky-50 px-5 pt-4 sticky top-0 z-30 shadow-sm">
                        <div className="flex justify-between items-center mb-4">
                            <div className="flex items-center gap-2">
                                <div className="bg-sky-500 p-2.5 rounded-xl text-white shadow-md"><Icon name="box" className="w-5 h-5" /></div>
                                <h1 className="text-xl font-black text-sky-900 italic tracking-tight leading-none">LinTin</h1>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={fetchRates} className={`p-2.5 rounded-xl text-sky-500 bg-sky-50 active-scale ${isUpdatingRates ? 'rotate-anim' : ''}`}><Icon name="refresh" /></button>
                                <button onClick={() => { setIsEditing(null); setFormData(initialForm); setShowModal(true); }} className="bg-sky-600 text-white p-2.5 rounded-xl shadow-lg active-scale">＋</button>
                            </div>
                        </div>

                        <div className="grid grid-cols-3 gap-2 mb-4 text-center">
                            {/* 購物金餘額 - 置中優化 */}
                            <div className="bg-white p-2.5 rounded-2xl border border-sky-100 shadow-sm flex flex-col items-center justify-center">
                                <p className="text-[8px] font-black text-slate-400 uppercase mb-1">購物金餘額</p>
                                <div className="flex items-center justify-center gap-0.5 w-full">
                                    <input 
                                        type="number" 
                                        className="w-16 text-[11px] font-black text-sky-600 bg-transparent outline-none text-center font-mono" 
                                        value={Math.round(fundSettings.amount)} 
                                        onChange={(e) => setFundSettings({...fundSettings, amount: e.target.value})} 
                                    />
                                    <select className="text-[8px] font-black text-sky-400 bg-sky-50 px-0.5 rounded outline-none" value={fundSettings.currency} onChange={(e) => setFundSettings({ ...fundSettings, currency: e.target.value })}>
                                        {currencies.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                            </div>
                            {/* 待收帳款 - 置中優化 */}
                            <div className="bg-white p-2.5 rounded-2xl border border-sky-100 shadow-sm flex flex-col items-center justify-center">
                                <p className="text-[8px] font-black text-slate-400 mb-1 uppercase text-center w-full">待收帳款</p>
                                <p className="text-[11px] font-black text-amber-500 italic truncate font-mono text-center w-full">NT$ {pendingFinance.toLocaleString()}</p>
                            </div>
                            {/* 累積利潤 - 置中優化 */}
                            <div className="bg-white p-2.5 rounded-2xl border border-sky-100 shadow-sm flex flex-col items-center justify-center">
                                <p className="text-[8px] font-black text-slate-400 mb-1 uppercase text-center w-full">累積利潤</p>
                                <p className="text-[11px] font-black text-emerald-500 italic truncate font-mono text-center w-full">NT$ {totalProfit.toLocaleString()}</p>
                            </div>
                        </div>

                        <div className="flex mb-3">
                            {['purchase', 'order'].map(m => (
                                <button key={m} onClick={() => { setViewMode(m); setOrderFilter('全部'); }} className={`flex-1 pb-3 text-xs font-black transition-all relative ${viewMode === m ? 'text-sky-600' : 'text-slate-400'}`}>
                                    {m === 'purchase' ? '採購清單' : '訂單管理'}
                                    {viewMode === m && <div className="absolute bottom-0 left-0 right-0 h-1 bg-sky-500 rounded-t-full mx-8" />}
                                </button>
                            ))}
                        </div>

                        {viewMode === 'order' && (
                            <div className="pb-4 space-y-3">
                                <div className="relative">
                                    <input type="text" placeholder="搜尋客戶或商品..." className="w-full bg-slate-100/50 rounded-xl py-2.5 px-10 text-xs font-bold outline-none focus:bg-white focus:ring-2 focus:ring-sky-100 transition-all shadow-inner" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                                    <div className="absolute left-3.5 top-3 text-slate-400"><Icon name="search" className="w-3.5 h-3.5" /></div>
                                </div>
                                <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                                    {orderStatusList.map(status => (
                                        <button key={status} onClick={() => setOrderFilter(status)} className={`whitespace-nowrap px-4 py-1.5 rounded-full text-[10px] font-black transition-all border ${orderFilter === status ? 'bg-sky-500 text-white border-sky-500 shadow-md' : 'bg-white text-slate-400 border-slate-100 active-scale'}`}>
                                            {status}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}
                    </header>

                    <div className="p-4 space-y-4">
                        {viewMode === 'purchase' && items.filter(i => i.stage === 'purchase').filter(i => i.customerName.includes(searchQuery) || i.productName.includes(searchQuery)).map(item => (
                            <div key={item.id} className="bg-white rounded-[24px] p-5 shadow-sm border border-slate-50 relative overflow-hidden">
                                <div className={`absolute top-0 right-0 px-4 py-1 text-[9px] font-black text-white rounded-bl-xl ${getPayerColor(item.payer)}`}>{item.payer}</div>
                                <div className="flex justify-between items-start">
                                    <div className="flex-1 pr-4">
                                        <h3 className="text-sm font-black text-slate-800 mb-1">{item.customerName}</h3>
                                        <p className="text-xs text-slate-400 mb-4 font-medium">{item.productName}</p>
                                        <div className="flex gap-2">
                                            <button onClick={() => openEdit(item)} className="bg-slate-50 text-slate-400 p-2.5 rounded-xl active-scale"><Icon name="edit" /></button>
                                            <button onClick={() => deleteItem(item.id)} className="bg-slate-50 text-slate-400 p-2.5 rounded-xl active-scale"><Icon name="trash" /></button>
                                        </div>
                                    </div>
                                    <div className="flex flex-col items-end gap-2">
                                        <div className="font-black text-sky-700 text-sm font-mono text-right">
                                            {item.foreignPrice && item.currency !== 'NTD' && <p className="text-[9px] text-slate-300 uppercase mb-0.5">{Number(item.foreignPrice).toLocaleString()} {item.currency}</p>}
                                            <p>NT$ {Number(item.price).toLocaleString()}</p>
                                        </div>
                                        <button onClick={() => markAsBought(item.id)} className="bg-sky-50 text-sky-600 text-[10px] font-black px-5 py-2.5 rounded-xl active-scale border border-sky-100">已買到</button>
                                    </div>
                                </div>
                            </div>
                        ))}

                        {viewMode === 'order' && groupedOrders
                            .filter(group => orderFilter === '全部' || group.items.some(i => i.status === orderFilter))
                            .filter(group => group.customerName.includes(searchQuery) || group.items.some(i => i.productName.includes(searchQuery)))
                            .map(group => {
                                const totalGroupPrice = group.items.reduce((sum, i) => sum + Number(i.price || 0), 0);
                                const totalGroupFee = group.items.reduce((sum, i) => sum + Number(i.fee || 0), 0);
                                const currentStatus = group.items[0].status;
                                return (
                                    <div key={group.customerName} className="bg-white rounded-[32px] shadow-sm border border-slate-100 overflow-hidden">
                                        <div className="p-5 pb-3 flex justify-between items-start bg-slate-50/50">
                                            <div>
                                                <div className="flex items-center gap-2 mb-1">
                                                    <h3 className="text-sm font-black text-slate-800">{group.customerName}</h3>
                                                    {group.items[0].bankLastFive && <span className="bg-rose-50 text-rose-400 text-[8px] px-2 py-0.5 rounded-lg font-bold">帳號後五碼：{group.items[0].bankLastFive}</span>}
                                                </div>
                                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">共 {group.items.length} 件商品</p>
                                            </div>
                                            <div className="relative">
                                                <select className={`appearance-none pl-3 pr-8 py-1.5 rounded-xl text-[9px] font-black border shadow-sm outline-none cursor-pointer ${currentStatus === '已完成' ? 'bg-emerald-50 text-emerald-500 border-emerald-100' : 'bg-amber-50 text-amber-500 border-amber-100'}`} value={currentStatus} onChange={(e) => handleGroupStatusChange(group.customerName, e.target.value)}>
                                                    {orderStatusList.filter(s => s !== '全部').map(s => <option key={s} value={s}>{s}</option>)}
                                                </select>
                                                <div className="absolute right-2 top-2 pointer-events-none text-current opacity-50"><Icon name="down" className="w-2.5 h-2.5" /></div>
                                            </div>
                                        </div>
                                        <div className="px-5 py-2 space-y-3">
                                            {group.items.map((item, idx) => (
                                                <div key={item.id} className={`flex justify-between items-center py-2 ${idx !== group.items.length - 1 ? 'border-b border-dashed border-slate-100' : ''}`}>
                                                    <div className="flex-1 pr-4">
                                                        <p className="text-xs text-slate-600 font-medium line-clamp-1">{item.productName}</p>
                                                        <div className="flex gap-2 mt-1">
                                                            <button onClick={() => openEdit(item)} className="text-slate-300 hover:text-sky-500 active-scale"><Icon name="edit" className="w-3 h-3" /></button>
                                                            <button onClick={() => deleteItem(item.id)} className="text-slate-300 hover:text-red-500 active-scale"><Icon name="trash" className="w-3 h-3" /></button>
                                                        </div>
                                                    </div>
                                                    <div className="text-right">
                                                        {item.foreignPrice && item.currency !== 'NTD' && <p className="text-[8px] font-black text-slate-300 font-mono uppercase">{Number(item.foreignPrice).toLocaleString()} {item.currency}</p>}
                                                        <p className="text-[11px] font-black text-slate-400 font-mono">NT$ {Number(item.price).toLocaleString()}</p>
                                                        <p className="text-[9px] font-black text-emerald-400 font-mono">+{Number(item.fee).toLocaleString()}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="p-4 bg-sky-50/30 flex justify-between items-center border-t border-slate-50">
                                            <span className="text-[10px] font-black text-sky-900/40 uppercase">Total Amount</span>
                                            <div className="text-right">
                                                <div className="text-sm font-black text-sky-600 font-mono italic">NT$ {totalGroupPrice.toLocaleString()}</div>
                                                <div className="text-[9px] font-black text-emerald-500 font-mono">Profit: +{totalGroupFee.toLocaleString()}</div>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })
                        }
                    </div>

                    {/* Modal 等其餘組件同前 */}
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4 text-left">
                            <div className="bg-white w-full max-w-md rounded-[40px] p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-xl font-black italic text-sky-900">{isEditing ? '編輯項目' : '新增項目'}</h2>
                                    <button onClick={() => setShowModal(false)} className="text-slate-300 text-3xl leading-none">&times;</button>
                                </div>
                                <div className="space-y-6">
                                    <div>
                                        <div className="flex justify-between items-center mb-3">
                                            <p className="text-[10px] font-black text-slate-400 uppercase ml-1">代墊人</p>
                                            <button onClick={addPayer} className="text-[10px] font-black text-sky-500 bg-sky-50 px-2 py-1 rounded-lg">+ 新增選項</button>
                                        </div>
                                        <div className="flex flex-wrap gap-2">
                                            {payers.map(p => (
                                                <div key={p} className="relative group">
                                                    <button onClick={() => setFormData({...formData, payer: p})} className={`px-4 py-2.5 rounded-xl text-xs font-black transition-all ${formData.payer === p ? 'bg-slate-800 text-white shadow-lg' : 'bg-slate-50 text-slate-400'}`}>{p}</button>
                                                    <button onClick={() => removePayer(p)} className="absolute -top-1 -right-1 bg-red-400 text-white w-4 h-4 rounded-full text-[8px] flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">&times;</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input placeholder="客戶名稱" className="w-full bg-slate-50 p-4 rounded-2xl font-bold text-sm outline-none" value={formData.customerName} onChange={e => setFormData({...formData, customerName: e.target.value})} />
                                        <input placeholder="商品名稱" className="w-full bg-slate-50 p-4 rounded-2xl font-bold text-sm outline-none" value={formData.productName} onChange={e => setFormData({...formData, productName: e.target.value})} />
                                    </div>
                                    <div className="bg-amber-50/50 p-5 rounded-[32px] space-y-4 border border-amber-100/50">
                                        <div className="relative">
                                            <select className="w-full bg-white p-3.5 rounded-xl text-xs font-black text-amber-600 outline-none border border-amber-100 appearance-none" value={formData.currency} onChange={(e) => setFormData({...formData, currency: e.target.value, foreignPrice: ''})}>
                                                {currencies.map(c => <option key={c} value={c}>{c} {c !== 'NTD' ? `(1:${rates[c].toFixed(3)})` : ''}</option>)}
                                            </select>
                                            <div className="absolute right-3 top-3.5 text-amber-300 pointer-events-none"><Icon name="down" className="w-3.5 h-3.5" /></div>
                                        </div>
                                        {formData.currency !== 'NTD' && (
                                            <input type="number" placeholder="外幣金額" className="w-full bg-white py-4 px-4 rounded-2xl outline-none font-black text-sm text-amber-600 shadow-sm" value={formData.foreignPrice} onChange={e => {
                                                const val = e.target.value;
                                                const twd = Math.round(Number(val) * rates[formData.currency]);
                                                setFormData({...formData, foreignPrice: val, price: twd.toString()});
                                            }} />
                                        )}
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="number" placeholder="台幣成本" className="w-full bg-sky-50 p-4 rounded-2xl font-black text-sm text-sky-600 outline-none shadow-sm" value={formData.price} onChange={e => setFormData({...formData, price: e.target.value})} />
                                        <input type="number" placeholder="預期利潤" className="w-full bg-emerald-50 p-4 rounded-2xl font-black text-sm text-emerald-600 outline-none shadow-sm" value={formData.fee} onChange={e => setFormData({...formData, fee: e.target.value})} />
                                    </div>
                                    <button onClick={saveItem} className="w-full bg-sky-600 text-white py-5 rounded-3xl font-black shadow-xl active-scale hover:bg-sky-700">儲存項目</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
