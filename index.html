<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinTin 協作系統 v6.7 - 標籤管理版</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; user-select: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-scale:active { transform: scale(0.95); }
        .rotate-anim { animation: rotate 1s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        input { user-select: text; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const Icon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                box: <path d="M21 8l-2-2H5L3 8v11a2 2 0 002 2h14a2 2 0 002-2V8zM5 8l1.5-1.5h11L19 8H5zm14 11H5V10h14v9zM9 12h6v2H9v-2z" />,
                edit: <path d="M14.06 3.02l.92.92L5.92 13H5v-.92l9.06-9.06M17.66 1c-.25 0-.51.1-.7.29l-1.83 1.83 3.75 3.75 1.83-1.83c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.2-.2-.45-.29-.71-.29zm-3.6 3.19L3 15.25V21h5.75L19.81 9.94l-3.75-3.75z" />,
                trash: <path d="M16 9v10H8V9h8m-1.5-6h-5l-1 1H5v2h14V4h-3.5l-1-1zM18 7H6v12c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7z" />,
                refresh: <path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
            };
            return <svg className={className} viewBox="0 0 24 24" fill="currentColor">{icons[name]}</svg>;
        };

        const App = () => {
            const [inviteCode, setInviteCode] = React.useState(localStorage.getItem('lintin_invite_code') || '');
            const [tempCode, setTempCode] = React.useState('');
            const [viewMode, setViewMode] = React.useState('purchase'); 
            const [items, setItems] = React.useState([]);
            const [showModal, setShowModal] = React.useState(false);
            const [isEditing, setIsEditing] = React.useState(null);
            
            const [categories, setCategories] = React.useState(() => {
                const saved = JSON.parse(localStorage.getItem('lintin_cats'));
                return (saved && saved.length > 0) ? saved : ['預設'];
            });
            const [activeCategory, setActiveCategory] = React.useState('全部');

            const [payers, setPayers] = React.useState(() => JSON.parse(localStorage.getItem('lintin_payers')) || ['琳', '璇']);
            const [rates, setRates] = React.useState({ KRW: 0.024, JPY: 0.21, HKD: 4.1, THB: 0.9, AUD: 21.2, NTD: 1 });
            const [isUpdatingRates, setIsUpdatingRates] = React.useState(false);
            const [fundSettings, setFundSettings] = React.useState({ amount: '', currency: 'KRW' });
            const [pendingFinance, setPendingFinance] = React.useState(0);
            const [totalProfit, setTotalProfit] = React.useState(0);

            const currencies = ['KRW', 'JPY', 'THB', 'HKD', 'AUD', 'NTD'];
            const initialForm = { customerName: '', productName: '', price: '', fee: '', payer: '琳', currency: 'KRW', foreignPrice: '', category: '預設' };
            const [formData, setFormData] = React.useState(initialForm);

            // 長按處理
            const timerRef = React.useRef(null);
            const handleTouchStart = (cat) => {
                if (cat === '預設') return;
                timerRef.current = setTimeout(() => {
                    if (confirm(`確定要刪除標籤「${cat}」嗎？\n(已標記此標籤的商品將改為「預設」)`)) {
                        const newCats = categories.filter(c => c !== cat);
                        setCategories(newCats);
                        setItems(items.map(i => i.category === cat ? {...i, category: '預設'} : i));
                        if (formData.category === cat) setFormData({...formData, category: '預設'});
                        if (activeCategory === cat) setActiveCategory('全部');
                    }
                }, 600);
            };
            const handleTouchEnd = () => clearTimeout(timerRef.current);

            const fetchRates = async () => {
                setIsUpdatingRates(true);
                try {
                    const response = await fetch('https://www.floatrates.com/daily/twd.json');
                    const data = await response.json();
                    const newRates = { ...rates };
                    if (data.krw) newRates.KRW = 1 / data.krw.rate;
                    if (data.jpy) newRates.JPY = 1 / data.jpy.rate;
                    setRates(newRates);
                } catch (e) {} finally { setTimeout(() => setIsUpdatingRates(false), 800); }
            };

            React.useEffect(() => {
                fetchRates();
                localStorage.setItem('lintin_payers', JSON.stringify(payers));
                localStorage.setItem('lintin_cats', JSON.stringify(categories));
            }, [payers, categories]);

            const saveItem = () => {
                if (!formData.customerName || !formData.productName) { alert("請填寫必要資訊"); return; }
                if (isEditing) {
                    setItems(items.map(item => item.id === isEditing ? { ...formData, id: isEditing, stage: item.stage } : item));
                    setIsEditing(null);
                } else {
                    setItems([{ id: Date.now(), ...formData, stage: 'purchase' }, ...items]);
                }
                setShowModal(false);
                setFormData(initialForm);
            };

            const filteredItems = items.filter(i => {
                const stageMatch = i.stage === viewMode;
                const categoryMatch = activeCategory === '全部' || (i.category || '預設') === activeCategory;
                return stageMatch && categoryMatch;
            });

            if (!inviteCode) {
                return (
                    <div className="min-h-screen bg-sky-50 flex items-center justify-center p-6 text-center">
                        <div className="w-full max-w-sm bg-white rounded-[40px] p-10 shadow-xl">
                            <h1 className="text-2xl font-black text-sky-900 mb-6 italic">LinTin Login</h1>
                            <input type="text" placeholder="代碼" className="w-full bg-slate-50 rounded-2xl py-4 px-6 mb-4 font-black text-sky-600 outline-none text-center" value={tempCode} onChange={(e) => setTempCode(e.target.value)} />
                            <button onClick={() => { setInviteCode(tempCode.toUpperCase()); localStorage.setItem('lintin_invite_code', tempCode.toUpperCase()); }} className="w-full bg-sky-500 text-white py-4 rounded-2xl font-black shadow-lg active-scale">進入系統</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-10 text-left">
                    <header className="bg-white/90 backdrop-blur-md border-b border-sky-50 sticky top-0 z-30 shadow-sm">
                        <div className="px-5 pt-4">
                            <div className="flex justify-between items-center mb-4">
                                <div className="flex items-center gap-2">
                                    <div className="bg-sky-500 p-2.5 rounded-xl text-white shadow-md"><Icon name="box" className="w-5 h-5" /></div>
                                    <h1 className="text-xl font-black text-sky-900 italic tracking-tight leading-none">LinTin</h1>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={fetchRates} className={`p-2.5 rounded-xl text-sky-500 bg-sky-50 active-scale ${isUpdatingRates ? 'rotate-anim' : ''}`}><Icon name="refresh" /></button>
                                    <button onClick={() => { setIsEditing(null); setFormData(initialForm); setShowModal(true); }} className="bg-sky-600 text-white p-2.5 rounded-xl shadow-lg active-scale">＋</button>
                                </div>
                            </div>
                            <div className="grid grid-cols-3 gap-2 mb-4">
                                <div className="bg-white p-2.5 rounded-2xl border border-sky-100 shadow-sm text-center">
                                    <p className="text-[8px] font-black text-slate-400 uppercase mb-1">購物金餘額</p>
                                    <input type="number" className="w-full text-[11px] font-black text-sky-600 bg-transparent outline-none text-center font-mono" value={fundSettings.amount} onChange={(e) => setFundSettings({...fundSettings, amount: e.target.value})} placeholder="0" />
                                </div>
                                <div className="bg-white p-2.5 rounded-2xl border border-sky-100 shadow-sm text-center">
                                    <p className="text-[8px] font-black text-slate-400 mb-1 uppercase">待收帳款</p>
                                    <p className="text-[11px] font-black text-amber-500 italic font-mono truncate">NT$ {pendingFinance.toLocaleString()}</p>
                                </div>
                                <div className="bg-white p-2.5 rounded-2xl border border-sky-100 shadow-sm text-center">
                                    <p className="text-[8px] font-black text-slate-400 mb-1 uppercase">累積利潤</p>
                                    <p className="text-[11px] font-black text-emerald-500 italic font-mono truncate">NT$ {totalProfit.toLocaleString()}</p>
                                </div>
                            </div>
                            <div className="flex mb-2">
                                {['purchase', 'order'].map(m => (
                                    <button key={m} onClick={() => { setViewMode(m); setActiveCategory('全部'); }} className={`flex-1 pb-3 text-xs font-black transition-all relative ${viewMode === m ? 'text-sky-600' : 'text-slate-400'}`}>
                                        {m === 'purchase' ? '採購清單' : '訂單管理'}
                                        {viewMode === m && <div className="absolute bottom-0 left-0 right-0 h-1 bg-sky-500 rounded-t-full mx-8" />}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="px-5 pb-3 overflow-x-auto no-scrollbar flex gap-2 border-t border-slate-50 pt-3">
                            <button onClick={() => setActiveCategory('全部')} className={`px-4 py-1.5 rounded-full text-[10px] font-black whitespace-nowrap transition-all ${activeCategory === '全部' ? 'bg-sky-500 text-white shadow-md' : 'bg-slate-100 text-slate-400'}`}>全部</button>
                            {categories.map(cat => (
                                <button key={cat} onClick={() => setActiveCategory(cat)} className={`px-4 py-1.5 rounded-full text-[10px] font-black whitespace-nowrap transition-all ${activeCategory === cat ? 'bg-sky-500 text-white shadow-md' : 'bg-slate-100 text-slate-400'}`}>{cat}</button>
                            ))}
                        </div>
                    </header>

                    <div className="p-4 space-y-4">
                        {filteredItems.map(item => (
                            <div key={item.id} className="bg-white rounded-[24px] p-5 shadow-sm border border-slate-50 relative overflow-hidden mb-4">
                                <div className={`absolute top-0 right-0 px-4 py-1 text-[9px] font-black text-white rounded-bl-xl ${payers.indexOf(item.payer) === 0 ? 'bg-fuchsia-400' : 'bg-sky-400'}`}>{item.payer}</div>
                                <div className="flex justify-between items-start">
                                    <div className="flex-1 pr-4">
                                        <div className="flex items-center gap-2 mb-1.5">
                                            <h3 className="text-base font-black text-slate-900">{item.customerName}</h3>
                                            <span className="text-[8px] bg-slate-100 text-slate-400 px-2 py-0.5 rounded-md font-bold uppercase">{item.category || '預設'}</span>
                                        </div>
                                        <div className="inline-block bg-amber-50 border border-amber-100/50 px-3 py-1.5 rounded-xl mb-4">
                                            <p className="text-[11px] text-amber-900/80 font-black leading-tight">{item.productName}</p>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => {setIsEditing(item.id); setFormData(item); setShowModal(true);}} className="bg-slate-50 text-slate-400 p-2.5 rounded-xl active-scale"><Icon name="edit" /></button>
                                            <button onClick={() => { if(confirm("刪除此項？")) setItems(items.filter(i => i.id !== item.id)); }} className="bg-slate-50 text-slate-400 p-2.5 rounded-xl active-scale"><Icon name="trash" /></button>
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <div className="font-black text-sky-700 text-sm font-mono">
                                            <p className="text-[9px] text-slate-300 uppercase mb-0.5">{item.foreignPrice} {item.currency}</p>
                                            <p>NT$ {Number(item.price).toLocaleString()}</p>
                                        </div>
                                        {item.stage === 'purchase' && <button onClick={() => {
                                            setPendingFinance(p => p + Number(item.price));
                                            setTotalProfit(p => p + Number(item.fee || 0));
                                            setItems(items.map(i => i.id === item.id ? {...i, stage: 'order'} : i));
                                            setViewMode('order');
                                        }} className="mt-4 bg-sky-600 text-white text-[10px] font-black px-4 py-2.5 rounded-xl shadow-lg active-scale">已買到</button>}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4 text-left">
                            <div className="bg-white w-full max-w-md rounded-[40px] p-8 shadow-2xl overflow-y-auto max-h-[90vh] no-scrollbar">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-black italic text-sky-900">{isEditing ? '編輯項目' : '新增項目'}</h2>
                                    <button onClick={() => setShowModal(false)} className="text-slate-300 text-3xl leading-none">&times;</button>
                                </div>
                                <div className="space-y-6">
                                    <div>
                                        <div className="flex justify-between items-center mb-3 px-1">
                                            <p className="text-[10px] font-black text-slate-400 uppercase">標籤 (長按可刪除)</p>
                                            <button onClick={() => {
                                                const n = prompt("新標籤名稱：");
                                                if(n && !categories.includes(n)) setCategories([...categories, n]);
                                            }} className="text-[10px] font-black text-sky-500 bg-sky-50 px-2 py-1 rounded-lg">+ 新增</button>
                                        </div>
                                        <div className="flex flex-wrap gap-2">
                                            {categories.map(cat => (
                                                <button 
                                                    key={cat} 
                                                    onMouseDown={() => handleTouchStart(cat)} 
                                                    onMouseUp={handleTouchEnd} 
                                                    onTouchStart={() => handleTouchStart(cat)} 
                                                    onTouchEnd={handleTouchEnd}
                                                    onClick={() => setFormData({...formData, category: cat})} 
                                                    className={`px-4 py-2 rounded-xl text-[10px] font-black transition-all ${formData.category === cat ? 'bg-sky-100 text-sky-700 border border-sky-200' : 'bg-slate-50 text-slate-400'}`}
                                                >{cat}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input placeholder="客戶" className="w-full bg-slate-50 py-4 px-4 rounded-2xl font-bold text-sm outline-none" value={formData.customerName} onChange={e => setFormData({...formData, customerName: e.target.value})} />
                                        <input placeholder="商品" className="w-full bg-slate-50 py-4 px-4 rounded-2xl font-bold text-sm outline-none" value={formData.productName} onChange={e => setFormData({...formData, productName: e.target.value})} />
                                    </div>
                                    <div className="bg-amber-50/50 p-5 rounded-[32px] space-y-4">
                                        <select className="w-full bg-white py-3 px-3.5 rounded-xl text-xs font-black text-amber-600 outline-none border border-amber-100" value={formData.currency} onChange={(e) => setFormData({...formData, currency: e.target.value, foreignPrice: ''})}>
                                            {currencies.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                        <input type="number" placeholder="外幣金額" className="w-full bg-white py-4 px-4 rounded-2xl outline-none font-black text-sm text-amber-600 border border-amber-100" value={formData.foreignPrice} onChange={e => setFormData({...formData, foreignPrice: e.target.value, price: Math.round(e.target.value * rates[formData.currency])})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="number" placeholder="台幣成本" className="w-full bg-sky-50 py-4 px-4 rounded-2xl font-black text-sm text-sky-600 outline-none" value={formData.price} onChange={e => setFormData({...formData, price: e.target.value})} />
                                        <input type="number" placeholder="預期利潤" className="w-full bg-emerald-50 py-4 px-4 rounded-2xl font-black text-sm text-emerald-600 outline-none" value={formData.fee} onChange={e => setFormData({...formData, fee: e.target.value})} />
                                    </div>
                                    <button onClick={saveItem} className="w-full bg-sky-600 text-white py-5 rounded-3xl font-black shadow-xl active-scale">儲存項目</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
