<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinTin 協作系統 v9.0</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; user-select: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-scale:active { transform: scale(0.95); }
        .rotate-anim { animation: rotate 1s linear; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        input { user-select: text; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const Icon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                box: <path d="M21 8l-2-2H5L3 8v11a2 2 0 002 2h14a2 2 0 002-2V8zM5 8l1.5-1.5h11L19 8H5zm14 11H5V10h14v9zM9 12h6v2H9v-2z" />,
                edit: <path d="M14.06 3.02l.92.92L5.92 13H5v-.92l9.06-9.06M17.66 1c-.25 0-.51.1-.7.29l-1.83 1.83 3.75 3.75 1.83-1.83c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.2-.2-.45-.29-.71-.29zm-3.6 3.19L3 15.25V21h5.75L19.81 9.94l-3.75-3.75z" />,
                trash: <path d="M16 9v10H8V9h8m-1.5-6h-5l-1 1H5v2h14V4h-3.5l-1-1zM18 7H6v12c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7z" />,
                plus: <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />,
                refresh: <path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
            };
            return <svg className={className} viewBox="0 0 24 24" fill="currentColor">{icons[name]}</svg>;
        };

        const App = () => {
            const [viewMode, setViewMode] = React.useState('purchase'); 
            const [items, setItems] = React.useState([]);
            const [showModal, setShowModal] = React.useState(false);
            const [showCheckModal, setShowCheckModal] = React.useState(false);
            const [showTagModal, setShowTagModal] = React.useState(false);
            const [showCreditModal, setShowCreditModal] = React.useState(false);
            const [isEditing, setIsEditing] = React.useState(null);
            const [checkingItem, setCheckingItem] = React.useState(null);
            const [lastFive, setLastFive] = React.useState('');
            const [isRefreshing, setIsRefreshing] = React.useState(false);

            // 匯率狀態 (預設值作為備援)
            const [rates, setRates] = React.useState({ KRW: 0.024, JPY: 0.21, HKD: 4.1, THB: 0.9, AUD: 21.2, NTD: 1 });
            const currencies = ['KRW', 'JPY', 'THB', 'HKD', 'AUD', 'NTD'];

            const [categories, setCategories] = React.useState(() => JSON.parse(localStorage.getItem('lintin_cats')) || ['預設', '服飾', '美妝']);
            const [creditData, setCreditData] = React.useState(() => JSON.parse(localStorage.getItem('lintin_credit')) || { ntdAmount: 0, currency: 'KRW', foreignAmount: 0 });

            const initialForm = { customerName: '', productName: '', price: '', fee: '', payer: '無', currency: 'KRW', foreignPrice: '', category: '預設', orderStatus: '待付款', accountDigits: '' };
            const [formData, setFormData] = React.useState(initialForm);

            // 抓取即時匯率函式
            const fetchLiveRates = async () => {
                setIsRefreshing(true);
                try {
                    const response = await fetch('https://open.er-api.com/v6/latest/TWD');
                    const data = await response.json();
                    if (data && data.rates) {
                        const r = data.rates;
                        setRates({
                            NTD: 1,
                            KRW: 1 / r.KRW,
                            JPY: 1 / r.JPY,
                            HKD: 1 / r.HKD,
                            THB: 1 / r.THB,
                            AUD: 1 / r.AUD
                        });
                    }
                } catch (error) {
                    console.error("匯率更新失敗，使用預設值");
                }
                setTimeout(() => setIsRefreshing(false), 1000);
            };

            // 初始化與自動更新
            React.useEffect(() => {
                fetchLiveRates();
                localStorage.setItem('lintin_cats', JSON.stringify(categories));
            }, [categories]);

            React.useEffect(() => { localStorage.setItem('lintin_credit', JSON.stringify(creditData)); }, [creditData]);

            const handleSave = () => {
                if (formData.category && !categories.includes(formData.category)) {
                    setCategories([...categories, formData.category]);
                }
                if (isEditing) setItems(items.map(i => i.id === isEditing ? {...formData, id: isEditing} : i));
                else setItems([{ id: Date.now(), ...formData, stage: 'purchase' }, ...items]);
                setShowModal(false);
            };

            const stats = React.useMemo(() => {
                const pending = items.filter(i => i.stage === 'order' && i.orderStatus !== '完成').reduce((sum, i) => sum + Number(i.price || 0), 0);
                const profit = items.reduce((sum, i) => sum + Number(i.fee || 0), 0);
                return { collection: pending, profit: profit };
            }, [items]);

            return (
                <div className="min-h-screen pb-10 text-left text-slate-900">
                    <header className="bg-white/90 backdrop-blur-md border-b border-sky-50 sticky top-0 z-30 shadow-sm">
                        <div className="px-5 pt-4">
                            <div className="flex justify-between items-center mb-4">
                                <div className="flex items-center gap-2">
                                    <div className="bg-sky-500 p-2.5 rounded-xl text-white shadow-md"><Icon name="box" /></div>
                                    <h1 className="text-xl font-black text-sky-900 italic leading-none">LinTin</h1>
                                </div>
                                <button onClick={() => { setIsEditing(null); setFormData({ ...initialForm, category: categories[0] }); setShowModal(true); }} className="bg-sky-600 text-white p-2.5 rounded-xl shadow-lg active-scale leading-none">＋</button>
                            </div>

                            <div className="grid grid-cols-3 gap-3 mb-5">
                                <div className="bg-slate-50 p-3 rounded-2xl border border-slate-100 active-scale cursor-pointer relative" onClick={() => setShowCreditModal(true)}>
                                    <div className="flex justify-between items-center mb-1">
                                        <p className="text-[8px] font-black text-slate-400 uppercase">共同基金</p>
                                        <div onClick={(e) => { e.stopPropagation(); fetchLiveRates(); }} className={`${isRefreshing ? 'rotate-anim' : ''} text-sky-400`}>
                                            <Icon name="refresh" className="w-2.5 h-2.5" />
                                        </div>
                                    </div>
                                    <p className="text-[10px] font-black text-amber-600 truncate">{Number(creditData.foreignAmount).toLocaleString()} {creditData.currency}</p>
                                    <p className="text-[10px] font-black text-slate-700 truncate">NT$ {Number(creditData.ntdAmount).toLocaleString()}</p>
                                </div>
                                <div className="bg-amber-50 p-3 rounded-2xl border border-amber-100">
                                    <p className="text-[9px] font-black text-amber-600/70 uppercase mb-1">待收訂單</p>
                                    <p className="text-sm font-black text-amber-700 leading-none mt-1">NT$ {stats.collection.toLocaleString()}</p>
                                </div>
                                <div className="bg-emerald-50 p-3 rounded-2xl border border-emerald-100">
                                    <p className="text-[9px] font-black text-emerald-600/70 uppercase mb-1">累計利潤</p>
                                    <p className="text-sm font-black text-emerald-700 leading-none mt-1">NT$ {stats.profit.toLocaleString()}</p>
                                </div>
                            </div>

                            <div className="flex mb-2">
                                {['purchase', 'order'].map(m => (
                                    <button key={m} onClick={() => setViewMode(m)} className={`flex-1 pb-3 text-xs font-black relative ${viewMode === m ? 'text-sky-600' : 'text-slate-400'}`}>
                                        {m === 'purchase' ? '採購清單' : '訂單管理'}
                                        {viewMode === m && <div className="absolute bottom-0 left-0 right-0 h-1 bg-sky-500 rounded-t-full mx-8" />}
                                    </button>
                                ))}
                            </div>
                        </div>
                        
                        <div className="px-5 pb-3 overflow-x-auto no-scrollbar flex items-center gap-2 border-t border-slate-50 pt-3">
                            <button onClick={() => setActiveCategory('全部')} className={`px-4 py-1.5 rounded-full text-[10px] font-black whitespace-nowrap ${activeCategory === '全部' ? 'bg-sky-500 text-white shadow-md' : 'bg-slate-100 text-slate-400'}`}>全部</button>
                            {categories.map(cat => <button key={cat} onClick={() => setActiveCategory(cat)} className={`px-4 py-1.5 rounded-full text-[10px] font-black whitespace-nowrap ${activeCategory === cat ? 'bg-sky-500 text-white shadow-md' : 'bg-slate-100 text-slate-400'}`}>{cat}</button>)}
                            <button onClick={() => setShowTagModal(true)} className="p-1.5 bg-slate-100 text-slate-400 rounded-full active-scale min-w-[28px]"><Icon name="plus" className="w-3 h-3" /></button>
                        </div>
                    </header>

                    <div className="p-4 space-y-4">
                        {items.filter(i => {
                            const matchStage = (viewMode === 'purchase') ? (i.stage === 'purchase' || !i.stage) : (i.stage === 'order');
                            const matchCat = (activeCategory === '全部' || i.category === activeCategory);
                            return matchStage && matchCat;
                        }).map(item => (
                            <div key={item.id} className="bg-white rounded-[24px] p-5 shadow-sm border border-slate-50 relative overflow-hidden">
                                <div className={`absolute top-0 right-0 px-4 py-1 text-[9px] font-black text-white rounded-bl-xl ${item.payer === '璇' ? 'bg-sky-400' : item.payer === '琳' ? 'bg-fuchsia-400' : 'bg-slate-400'}`}>{item.payer}</div>
                                <div className="flex justify-between items-start">
                                    <div className="flex-1 pr-2 text-left">
                                        <div className="flex items-center gap-2 mb-1">
                                            <h3 className="text-base font-black text-slate-900">{item.customerName}</h3>
                                            <span className="text-[8px] bg-slate-100 text-slate-400 px-2 py-0.5 rounded-md font-bold uppercase">{item.category}</span>
                                        </div>
                                        <p className="text-[11px] text-amber-700 font-bold mb-3">{item.productName}</p>
                                        <div className="flex gap-2">
                                            <button onClick={() => {setIsEditing(item.id); setFormData(item); setShowModal(true);}} className="bg-slate-50 text-slate-400 p-2.5 rounded-xl active-scale"><Icon name="edit" /></button>
                                            <button onClick={() => setItems(items.filter(i => i.id !== item.id))} className="bg-slate-50 text-slate-400 p-2.5 rounded-xl active-scale"><Icon name="trash" /></button>
                                        </div>
                                    </div>
                                    <div className="text-right mt-6">
                                        <p className="text-[9px] text-slate-300 font-black uppercase mb-1">{item.foreignPrice} {item.currency}</p>
                                        <p className="font-black text-sky-700 text-sm font-mono leading-none mb-4">NT$ {Number(item.price).toLocaleString()}</p>
                                        <button onClick={() => {
                                            if(viewMode==='purchase') { setItems(items.map(i => i.id === item.id ? {...i, stage: 'order', orderStatus: '待付款'} : i)); setViewMode('order'); }
                                        }} className={`text-[10px] font-black px-4 py-2.5 rounded-xl shadow-lg text-white ${viewMode==='purchase' ? 'bg-sky-600' : 'bg-indigo-500'}`}>{viewMode==='purchase'?'已買到':item.orderStatus}</button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4 text-left">
                            <div className="bg-white w-full max-w-md rounded-[40px] p-8 shadow-2xl overflow-y-auto max-h-[90vh] no-scrollbar">
                                <div className="flex justify-between items-center mb-6"><h2 className="text-xl font-black italic text-sky-900 leading-none">{isEditing ? '編輯項目' : '新增項目'}</h2><button onClick={() => setShowModal(false)} className="text-slate-300 text-3xl leading-none">&times;</button></div>
                                <div className="space-y-5">
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1.5"><p className="text-[10px] font-black text-slate-400 px-1">分類標籤</p>
                                            <input list="modal-tags" className="w-full bg-slate-50 py-4 px-4 rounded-2xl font-bold text-sm outline-none" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} />
                                            <datalist id="modal-tags">{categories.map(c => <option key={c} value={c} />)}</datalist>
                                        </div>
                                        <div className="space-y-1.5"><p className="text-[10px] font-black text-slate-400 px-1">代墊人</p>
                                            <div className="flex gap-2 h-[52px]">
                                                {['琳', '璇', '無'].map(p => <button key={p} onClick={() => setFormData({...formData, payer: p})} className={`flex-1 rounded-2xl text-[10px] font-black ${formData.payer === p ? 'bg-slate-800 text-white shadow-md' : 'bg-slate-50 text-slate-400'}`}>{p}</button>)}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <input placeholder="客戶名稱" className="bg-slate-50 py-4 px-4 rounded-2xl font-bold text-sm outline-none" value={formData.customerName} onChange={e => setFormData({...formData, customerName: e.target.value})} />
                                        <input placeholder="商品名稱" className="bg-slate-50 py-4 px-4 rounded-2xl font-bold text-sm outline-none" value={formData.productName} onChange={e => setFormData({...formData, productName: e.target.value})} />
                                    </div>
                                    <div className="bg-slate-50 p-5 rounded-[32px] space-y-4">
                                        <div className="flex gap-2">
                                            <select className="bg-white py-3 px-2 rounded-xl text-[10px] font-black outline-none border border-amber-100" value={formData.currency} onChange={e => {
                                                const newCurrency = e.target.value;
                                                setFormData({...formData, currency: newCurrency, price: Math.round(formData.foreignPrice * rates[newCurrency])});
                                            }}>{currencies.map(c => <option key={c} value={c}>{c}</option>)}</select>
                                            <input type="number" placeholder="外幣" className="flex-1 bg-white py-4 px-4 rounded-2xl outline-none font-black text-sm border border-amber-100 text-amber-600" value={formData.foreignPrice} onChange={e => {
                                                const f = e.target.value; 
                                                setFormData({...formData, foreignPrice: f, price: Math.round(f * rates[formData.currency])});
                                            }} />
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="relative">
                                                <input type="number" placeholder="台幣成本" className="w-full bg-white py-4 px-4 rounded-2xl font-black text-sm outline-none border border-sky-100 text-sky-600" value={formData.price} onChange={e => setFormData({...formData, price: e.target.value})} />
                                                <span className="absolute right-3 top-1/2 -translate-y-1/2 text-[8px] font-black text-sky-300">LIVE</span>
                                            </div>
                                            <input type="number" placeholder="預期利潤" className="bg-white py-4 px-4 rounded-2xl font-black text-sm outline-none border border-emerald-100 text-emerald-600" value={formData.fee} onChange={e => setFormData({...formData, fee: e.target.value})} />
                                        </div>
                                    </div>
                                    <button onClick={handleSave} className="w-full bg-sky-600 text-white py-5 rounded-3xl font-black shadow-xl active-scale">儲存項目</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 標籤管理、基金管理 Modal 略過與上版相同 */}
                    {showTagModal && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-6 text-left">
                            <div className="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl">
                                <div className="flex justify-between items-center mb-6"><h2 className="text-xl font-black text-sky-900 italic">管理標籤</h2><button onClick={() => setShowTagModal(false)} className="text-slate-300 text-3xl leading-none">&times;</button></div>
                                <div className="space-y-2 max-h-60 overflow-y-auto no-scrollbar">
                                    {categories.map(tag => (
                                        <div key={tag} className="flex justify-between items-center bg-slate-50 p-3 rounded-xl text-sm font-black text-slate-700">{tag}{tag !== '預設' && <button onClick={() => setCategories(categories.filter(c => c !== tag))} className="text-rose-400 p-1"><Icon name="trash" className="w-3.5 h-3.5" /></button>}</div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
