<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinTin 系統 v38.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-scale:active { transform: scale(0.96); }
        .field-label { font-size: 10px; font-weight: 900; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; margin-left: 4px; text-align: left; }
        .field-value { background-color: #F1F5F9; border: 1px solid #E2E8F0; border-radius: 12px; padding: 10px 14px; font-size: 14px; font-weight: 700; color: #1E293B; width: 100%; text-align: left; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                box: <path d="M21 8l-2-2H5L3 8v11a2 2 0 002 2h14a2 2 0 002-2V8zM5 8l1.5-1.5h11L19 8H5zm14 11H5V10h14v9zM9 12h6v2H9v-2z" />,
                edit: <path d="M14.06 3.02l.92.92L5.92 13H5v-.92l9.06-9.06M17.66 1c-.25 0-.51.1-.7.29l-1.83 1.83 3.75 3.75 1.83-1.83c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.2-.2-.45-.29-.71-.29zm-3.6 3.19L3 15.25V21h5.75L19.81 9.94l-3.75-3.75z" />,
                trash: <path d="M16 9v10H8V9h8m-1.5-6h-5l-1 1H5v2h14V4h-3.5l-1-1zM18 7H6v12c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7z" />,
                user: <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />,
                bank: <path d="M11.5 2L2 6v2h19V6l-9.5-4zM6 9v10h3V9H6zm5 0v10h3V9h-3zm5 0v10h3V9h-3zM2 22h19v-2H2v2z" />
            };
            return <svg className={className} viewBox="0 0 24 24" fill="currentColor">{icons[name]}</svg>;
        };

        const App = () => {
            const [items, setItems] = useState(() => JSON.parse(localStorage.getItem('lt_items')) || []);
            const [rates] = useState({ KRW: 0.024, JPY: 0.20, THB: 0.88, HKD: 4.05, AUD: 20.8, NTD: 1 });
            const orderStatuses = ['全部', '待付款', '已匯款', '待查帳', '已出貨', '完成'];
            
            const [viewMode, setViewMode] = useState('purchase'); 
            const [activeStatus, setActiveStatus] = useState('全部');
            const [showModal, setShowModal] = useState(false);
            const [isEditing, setIsEditing] = useState(null);

            // 銀行末五碼彈窗狀態
            const [showBankModal, setShowBankModal] = useState(false);
            const [bankForm, setBankForm] = useState({ customer: '', lastFive: '' });

            const [form, setForm] = useState({ customer: '', product: '', price: '', fee: '', payer: '無', cur: 'KRW', fPrice: '', cat: '預設', orderStatus: '待付款', lastFive: '' });

            useEffect(() => { localStorage.setItem('lt_items', JSON.stringify(items)); }, [items]);

            const changeStatus = (customerName, newStatus) => {
                if (newStatus === '已匯款') {
                    setBankForm({ customer: customerName, lastFive: '' });
                    setShowBankModal(true);
                } else {
                    executeStatusUpdate(customerName, newStatus);
                }
            };

            const executeStatusUpdate = (customerName, newStatus, lastFive = null) => {
                setItems(prev => prev.map(item => 
                    (item.customer === customerName && item.stage === 'order') 
                    ? { ...item, orderStatus: newStatus, lastFive: lastFive !== null ? lastFive : item.lastFive } 
                    : item
                ));
                setShowBankModal(false);
            };

            const groupedOrders = useMemo(() => {
                const allOrders = items.filter(i => i.stage === 'order');
                const groups = {};
                allOrders.forEach(item => {
                    if (!groups[item.customer]) {
                        groups[item.customer] = { items: [], total: 0, status: item.orderStatus, lastFive: item.lastFive };
                    }
                    groups[item.customer].items.push(item);
                    groups[item.customer].total += Number(item.price || 0);
                });
                if (activeStatus === '全部') return groups;
                const filtered = {};
                Object.keys(groups).forEach(name => {
                    if (groups[name].status === activeStatus) filtered[name] = groups[name];
                });
                return filtered;
            }, [items, activeStatus]);

            return (
                <div className="min-h-screen pb-10 text-slate-900">
                    <header className="bg-white sticky top-0 z-40 border-b border-slate-100 p-5 text-left">
                        <div className="flex justify-between items-center mb-5">
                            <h1 className="text-xl font-black italic text-sky-600">LinTin</h1>
                            <button onClick={() => { setForm({ customer: '', product: '', price: '', fee: '', payer: '無', cur: 'KRW', fPrice: '', cat: '預設', orderStatus: '待付款', lastFive: '' }); setIsEditing(null); setShowModal(true); }} className="bg-sky-500 text-white px-5 py-2 rounded-full font-black text-sm active-scale shadow-lg">+ 新增項目</button>
                        </div>

                        <div className="flex gap-6 border-b border-slate-50 mb-3 px-1 text-sm font-black">
                            <button onClick={() => setViewMode('purchase')} className={`pb-2 transition-colors ${viewMode === 'purchase' ? 'text-sky-500 border-b-2 border-sky-500' : 'text-slate-300'}`}>採購清單</button>
                            <button onClick={() => setViewMode('order')} className={`pb-2 transition-colors ${viewMode === 'order' ? 'text-sky-700 border-b-2 border-sky-700' : 'text-slate-300'}`}>訂單管理</button>
                        </div>

                        {viewMode === 'order' && (
                            <div className="flex gap-2 overflow-x-auto no-scrollbar py-1">
                                {orderStatuses.map(s => (
                                    <button key={s} onClick={() => setActiveStatus(s)} className={`px-5 py-2 rounded-full text-[11px] font-black whitespace-nowrap transition-all ${activeStatus === s ? 'bg-sky-700 text-white shadow-md' : 'bg-slate-100 text-slate-500'}`}>{s}</button>
                                ))}
                            </div>
                        )}
                    </header>

                    <div className="p-4 space-y-6">
                        {viewMode === 'order' && Object.keys(groupedOrders).map(customer => (
                            <div key={customer} className="bg-white rounded-[32px] overflow-hidden border border-slate-200 shadow-sm text-left">
                                <div className="bg-sky-50/50 px-6 py-5 flex justify-between items-center border-b border-sky-100/50">
                                    <div className="flex items-center gap-2">
                                        <div className="bg-sky-600 p-1.5 rounded-lg text-white shadow-sm"><Icon name="user" className="w-3.5 h-3.5" /></div>
                                        <div>
                                            <span className="font-black text-sky-900 text-sm block leading-none">{customer}</span>
                                            {groupedOrders[customer].lastFive && (
                                                <span className="text-[10px] font-bold text-emerald-600 flex items-center gap-1 mt-1">
                                                    <Icon name="bank" className="w-2.5 h-2.5" /> 末五碼：{groupedOrders[customer].lastFive}
                                                </span>
                                            )}
                                        </div>
                                    </div>
                                    <div className="flex flex-col items-end gap-2">
                                        <select 
                                            className={`px-4 py-2 rounded-xl text-[11px] font-black outline-none text-white transition-colors shadow-md ${groupedOrders[customer].status === '已匯款' ? 'bg-amber-500' : groupedOrders[customer].status === '完成' ? 'bg-emerald-500' : 'bg-sky-600'}`} 
                                            value={groupedOrders[customer].status} 
                                            onChange={e => changeStatus(customer, e.target.value)}
                                        >
                                            {orderStatuses.filter(s => s !== '全部').map(s => <option key={s} value={s}>{s}</option>)}
                                        </select>
                                        <p className="text-sm font-black text-sky-700">NT$ {groupedOrders[customer].total.toLocaleString()}</p>
                                    </div>
                                </div>
                                <div className="p-4 space-y-3">
                                    {groupedOrders[customer].items.map(item => (
                                        <div key={item.id} className="bg-slate-50/40 p-4 rounded-2xl flex justify-between items-center border border-slate-100">
                                            <div className="flex-1">
                                                <p className="text-xs font-black text-slate-700">{item.product}</p>
                                                <p className="text-[10px] font-bold text-slate-400 uppercase">NT$ {Number(item.price).toLocaleString()}</p>
                                            </div>
                                            <div className="flex gap-4 ml-4">
                                                <button onClick={() => { setForm(item); setIsEditing(item.id); setShowModal(true); }} className="text-slate-300"><Icon name="edit" className="w-3.5 h-3.5" /></button>
                                                <button onClick={() => setItems(items.filter(i => i.id !== item.id))} className="text-rose-200"><Icon name="trash" className="w-3.5 h-3.5" /></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* 銀行末五碼輸入彈窗 */}
                    {showBankModal && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-6 text-left">
                            <div className="bg-white w-full max-w-xs rounded-[40px] p-8 shadow-2xl animate-in zoom-in duration-200">
                                <div className="w-12 h-12 bg-amber-100 text-amber-600 rounded-2xl flex items-center justify-center mb-4 mx-auto">
                                    <Icon name="bank" className="w-6 h-6" />
                                </div>
                                <h2 className="text-lg font-black text-slate-800 text-center mb-1">匯款對帳確認</h2>
                                <p className="text-xs text-slate-400 text-center mb-6">請輸入 {bankForm.customer} 的匯款末五碼</p>
                                
                                <input 
                                    autoFocus
                                    type="tel"
                                    maxLength="5"
                                    placeholder="00000"
                                    className="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 text-center text-2xl font-black tracking-widest outline-none focus:border-amber-400 transition-colors mb-6"
                                    value={bankForm.lastFive}
                                    onChange={e => setBankForm({...bankForm, lastFive: e.target.value})}
                                />

                                <div className="flex gap-3">
                                    <button onClick={() => setShowBankModal(false)} className="flex-1 py-4 text-sm font-black text-slate-400 bg-slate-100 rounded-2xl active-scale">取消</button>
                                    <button onClick={() => executeStatusUpdate(bankForm.customer, '已匯款', bankForm.lastFive)} className="flex-[2] py-4 text-sm font-black text-white bg-amber-500 rounded-2xl shadow-lg shadow-amber-100 active-scale">確認已匯款</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 主編輯 Modal (省略部分維持原樣) */}
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 text-left">
                            <div className="bg-white w-full max-w-md rounded-[40px] p-8 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
                                <h2 className="text-2xl font-black text-slate-800 mb-6 italic">Edit Item</h2>
                                <div className="space-y-5">
                                    <div><p className="field-label">分類 Tag</p><input className="field-value outline-none focus:border-sky-300" value={form.cat} onChange={e => setForm({...form, cat: e.target.value})} /></div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><p className="field-label">客戶 Client</p><input className="field-value outline-none" value={form.customer} onChange={e => setForm({...form, customer: e.target.value})} /></div>
                                        <div>
                                            <p className="field-label">支付 Payer</p>
                                            <div className="flex gap-1 bg-slate-100 p-1 rounded-xl">
                                                {['琳', '璇', '無'].map(p => <button key={p} onClick={() => setForm({...form, payer: p})} className={`flex-1 py-2 rounded-lg text-[10px] font-black ${form.payer === p ? 'bg-white shadow-sm' : 'text-slate-400'}`}>{p}</button>)}
                                            </div>
                                        </div>
                                    </div>
                                    <div><p className="field-label">商品名稱 Product</p><input className="field-value outline-none" value={form.product} onChange={e => setForm({...form, product: e.target.value})} /></div>
                                    <div className="bg-slate-50 p-5 rounded-[28px] space-y-4">
                                        <div className="grid grid-cols-2 gap-4">
                                            <input type="number" placeholder="外幣單價" className="field-value border-none text-amber-600 font-black" value={form.fPrice} onChange={e => setForm({...form, fPrice: e.target.value})} />
                                            <input type="number" placeholder="台幣售價" className="field-value border-none text-sky-600 font-black" value={form.price} onChange={e => setForm({...form, price: e.target.value})} />
                                        </div>
                                        <input type="number" placeholder="預期利潤" className="field-value border-none text-emerald-600 font-black" value={form.fee} onChange={e => setForm({...form, fee: e.target.value})} />
                                    </div>
                                    <div className="flex gap-4 pt-4">
                                        <button onClick={() => setShowModal(false)} className="flex-1 bg-slate-100 text-slate-400 py-4 rounded-[20px] font-black active-scale">取消</button>
                                        <button onClick={() => { if (isEditing) setItems(items.map(i => i.id === isEditing ? {...form, id: isEditing} : i)); else setItems([{...form, id: Date.now(), stage: viewMode}, ...items]); setShowModal(false); }} className="flex-[2] bg-sky-500 text-white py-4 rounded-[20px] font-black shadow-xl active-scale">儲存項目</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
