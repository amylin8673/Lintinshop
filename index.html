<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinTin | 專業代購系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans pb-24">
    <div class="max-w-md mx-auto p-4 space-y-6">
        <div class="flex justify-between items-center py-2">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
                    <i class="fas fa-box text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black text-slate-800 leading-tight">LinTin</h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Channel: LinTin</p>
                </div>
            </div>
            <button onclick="document.getElementById('modal').classList.remove('hidden')" class="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200 text-white">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <div class="grid grid-cols-3 gap-3 text-center">
            <div class="bg-white p-4 rounded-[1.5rem] shadow-sm border border-slate-50">
                <p class="text-[9px] font-bold text-slate-400 mb-1">購物金餘額</p>
                <p class="text-sm font-black text-blue-500">0 <span class="text-[8px]">KRW</span></p>
            </div>
            <div class="bg-white p-4 rounded-[1.5rem] shadow-sm border border-slate-50">
                <p class="text-[9px] font-bold text-slate-400 mb-1">待收帳款</p>
                <p class="text-sm font-black text-orange-400">NT$ 0</p>
            </div>
            <div class="bg-white p-4 rounded-[1.5rem] shadow-sm border border-slate-50">
                <p class="text-[9px] font-bold text-slate-400 mb-1">累計利潤</p>
                <p class="text-sm font-black text-emerald-500">NT$ 0</p>
            </div>
        </div>

        <div class="flex border-b border-slate-100">
            <button class="flex-1 pb-3 text-sm font-black text-blue-500 border-b-2 border-blue-500">採購清單</button>
            <button class="flex-1 pb-3 text-sm font-black text-slate-400">訂單管理</button>
        </div>

        <div class="relative">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
            <input type="text" placeholder="快速搜尋..." class="w-full bg-white border border-slate-100 py-3 pl-11 rounded-2xl text-sm font-medium outline-none">
        </div>

        <div id="list" class="py-20 text-center space-y-2">
            <i class="fas fa-folder-open text-slate-100 text-5xl"></i>
            <p class="text-xs font-bold text-slate-300 tracking-widest uppercase">目前沒有採購項目</p>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-50 hidden flex items-center justify-center p-6">
        <div class="bg-white w-full rounded-[2rem] p-8 space-y-4 shadow-2xl">
            <h2 class="font-black text-slate-800">新增代購項目</h2>
            <input id="c" type="text" placeholder="客戶名稱" class="w-full bg-slate-50 p-4 rounded-xl outline-none text-sm font-bold">
            <input id="p" type="text" placeholder="商品名稱" class="w-full bg-slate-50 p-4 rounded-xl outline-none text-sm font-bold">
            <button onclick="alert('門面已修好！接下來我們來接通雲端。'); document.getElementById('modal').classList.add('hidden')" class="w-full bg-blue-500 text-white py-4 rounded-xl font-black">確認儲存</button>
            <button onclick="document.getElementById('modal').classList.add('hidden')" class="w-full text-slate-300 text-xs font-bold">取消</button>
        </div>
    </div>
</body>
</html>
