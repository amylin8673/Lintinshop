<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinTin 系統 v20.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com-react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; text-align: left; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-scale:active { transform: scale(0.95); }
        input, select { font-size: 16px !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                box: <path d="M21 8l-2-2H5L3 8v11a2 2 0 002 2h14a2 2 0 002-2V8zM5 8l1.5-1.5h11L19 8H5zm14 11H5V10h14v9zM9 12h6v2H9v-2z" />,
                plus: <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />,
                edit: <path d="M14.06 3.02l.92.92L5.92 13H5v-.92l9.06-9.06M17.66 1c-.25 0-.51.1-.7.29l-1.83 1.83 3.75 3.75 1.83-1.83c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.2-.2-.45-.29-.71-.29zm-3.6 3.19L3 15.25V21h5.75L19.81 9.94l-3.75-3.75z" />,
                trash: <path d="M16 9v10H8V9h8m-1.5-6h-5l-1 1H5v2h14V4h-3.5l-1-1zM18 7H6v12c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7z" />,
                x: <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
            };
            return <svg className={className} viewBox="0 0 24 24" fill="currentColor">{icons[name]}</svg>;
        };

        const App = () => {
            const [items, setItems] = useState(() => JSON.parse(localStorage.getItem('lt_items')) || []);
            const [pCats, setPCats] = useState(() => JSON.parse(localStorage.getItem('lt_p_cats')) || ['預設', '服飾', '鞋包']);
            const [credit, setCredit] = useState(() => JSON.parse(localStorage.getItem('lt_credit')) || { ntd: 0, foreign: 0, cur: 'KRW' });
            
            const [rates] = useState({ KRW: 0.024, JPY: 0.21, THB: 0.9, HKD: 4.1, AUD: 21.2, NTD: 1 });
            const orderStatuses = ['全部', '待付款', '已匯款', '待查帳', '已出貨', '完成'];
            
            const [viewMode, setViewMode] = useState('purchase'); // 'purchase' or 'order'
            const [activePCat, setActivePCat] = useState('全部');
            const [activeStatus, setActiveStatus] = useState('全部');
            
            const [showModal, setShowModal] = useState(false);
            const [showCreditModal, setShowCreditModal] = useState(false);
            const [isEditing, setIsEditing] = useState(null);

            const [form, setForm] = useState({ customer: '', product: '', price: '', fee: '', payer: '無', cur: 'KRW', fPrice: '', cat: '預設', orderStatus: '待付款' });
            const [tempCredit, setTempCredit] = useState({ ntd: 0, foreign: 0, cur: 'KRW' });

            useEffect(() => { localStorage.setItem('lt_items', JSON.stringify(items)); }, [items]);
            useEffect(() => { localStorage.setItem('lt_p_cats', JSON.stringify(pCats)); }, [pCats]);
            useEffect(() => { localStorage.setItem('lt_credit', JSON.stringify(credit)); }, [credit]);

            const stats = useMemo(() => ({
                profit: items.reduce((s, i) => s + Number(i.fee || 0), 0),
                pending: items.filter(i => i.stage === 'order' && i.orderStatus !== '完成').reduce((s, i) => s + Number(i.price || 0), 0)
            }), [items]);

            // 過濾邏輯：採購看分類，訂單看狀態
            const filteredItems = items.filter(i => {
                if (i.stage !== viewMode) return false;
                if (viewMode === 'purchase') {
                    return activePCat === '全部' || i.cat === activePCat;
                } else {
                    return activeStatus === '全部' || i.orderStatus === activeStatus;
                }
            });

            return (
                <div className="min-h-screen pb-10 text-slate-900 bg-[#F8FAFC]">
                    <header className="bg-white sticky top-0 z-40 border-b border-slate-100 p-5 pb-2 shadow-sm">
                        <div className="flex justify-between items-center mb-5">
                            <div className="flex items-center gap-2">
                                <div className="bg-sky-600 p-2 rounded-xl text-white"><Icon name="box" /></div>
                                <h1 className="text-2xl font-black text-sky-900 italic leading-none">LinTin</h1>
                            </div>
                            <button onClick={() => { 
                                setForm({ customer: '', product: '', price: '', fee: '', payer: '無', cur: 'KRW', fPrice: '', cat: '預設', orderStatus: '待付款' }); 
                                setIsEditing(null); setShowModal(true); 
                            }} className="bg-sky-600 text-white p-3 rounded-2xl shadow-lg active-scale">
                                <Icon name="plus" className="w-5 h-5" />
                            </button>
                        </div>

                        <div className="grid grid-cols-3 gap-2 mb-4">
                            <div onClick={() => { setTempCredit({...credit}); setShowCreditModal(true); }} className="bg-slate-50 p-3 rounded-2xl border border-slate-100 cursor-pointer active-scale text-left">
                                <p className="text-[8px] font-black text-slate-400 uppercase">基金庫存</p>
                                <p className="text-[10px] font-bold text-amber-600 truncate">{credit.foreign} {credit.cur}</p>
                                <p className="text-[10px] font-bold text-slate-700 truncate">${Number(credit.ntd).toLocaleString()}</p>
                            </div>
                            <div className="bg-amber-50 p-3 rounded-2xl border border-amber-100 text-left">
                                <p className="text-[8px] font-black text-amber-600/70 uppercase">待收訂單</p>
                                <p className="text-xs font-bold text-amber-700 mt-1">${stats.pending.toLocaleString()}</p>
                            </div>
                            <div className="bg-emerald-50 p-3 rounded-2xl border border-emerald-100 text-left">
                                <p className="text-[8px] font-black text-emerald-600/70 uppercase">累計利潤</p>
                                <p className="text-xs font-bold text-emerald-700 mt-1">${stats.profit.toLocaleString()}</p>
                            </div>
                        </div>

                        <div className="flex gap-4 border-b border-slate-50 mb-2">
                            <button onClick={() => setViewMode('purchase')} className={`flex-1 pb-2 text-xs font-black transition-all ${viewMode === 'purchase' ? 'text-sky-600 border-b-2 border-sky-600' : 'text-slate-400'}`}>採購清單</button>
                            <button onClick={() => setViewMode('order')} className={`flex-1 pb-2 text-xs font-black transition-all ${viewMode === 'order' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-slate-400'}`}>訂單管理</button>
                        </div>

                        {/* 動態標籤欄 */}
                        <div className="flex gap-2 overflow-x-auto no-scrollbar py-1 text-left">
                            {viewMode === 'purchase' ? (
                                <>
                                    <button onClick={() => setActivePCat('全部')} className={`px-3 py-1.5 rounded-full text-[10px] font-bold whitespace-nowrap ${activePCat === '全部' ? 'bg-sky-500 text-white' : 'bg-slate-100 text-slate-400'}`}>全部</button>
                                    {pCats.map(c => <button key={c} onClick={() => setActivePCat(c)} className={`px-3 py-1.5 rounded-full text-[10px] font-bold whitespace-nowrap ${activePCat === c ? 'bg-sky-500 text-white' : 'bg-slate-100 text-slate-400'}`}>{c}</button>)}
                                </>
                            ) : (
                                orderStatuses.map(s => (
                                    <button key={s} onClick={() => setActiveStatus(s)} className={`px-3 py-1.5 rounded-full text-[10px] font-bold whitespace-nowrap ${activeStatus === s ? 'bg-indigo-500 text-white' : 'bg-slate-100 text-slate-400'}`}>{s}</button>
                                ))
                            )}
                        </div>
                    </header>

                    <div className="p-4 space-y-4 text-left">
                        {filteredItems.map(item => (
                            <div key={item.id} className="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm relative">
                                <div className={`absolute top-0 right-0 px-3 py-1 text-[9px] font-bold text-white rounded-bl-xl ${item.payer === '璇' ? 'bg-sky-400' : item.payer === '琳' ? 'bg-fuchsia-400' : 'bg-slate-400'}`}>{item.payer}</div>
                                <h3 className="font-black text-slate-900">{item.customer} <span className="text-[10px] text-sky-400 font-bold ml-1">{item.cat}</span></h3>
                                <p className="text-xs text-amber-700 font-bold mb-3">{item.product}</p>
                                <div className="flex justify-between items-end">
                                    <div className="flex gap-2">
                                        <button onClick={() => { setForm(item); setIsEditing(item.id); setShowModal(true); }} className="p-2.5 bg-slate-50 text-slate-400 rounded-xl active-scale"><Icon name="edit" /></button>
                                        <button onClick={() => setItems(items.filter(i => i.id !== item.id))} className="p-2.5 bg-slate-50 text-slate-400 rounded-xl active-scale"><Icon name="trash" /></button>
                                    </div>
                                    <div className="text-right">
                                        {viewMode === 'purchase' ? (
                                            <button onClick={() => setItems(items.map(i => i.id === item.id ? {...i, stage:'order', orderStatus:'待付款'} : i))} className="bg-sky-600 text-white text-[10px] font-black px-4 py-2 rounded-xl mb-2 active-scale shadow-md">已買到</button>
                                        ) : (
                                            <select className={`text-white text-[10px] font-black px-2 py-1 rounded-lg mb-2 outline-none shadow-sm ${item.orderStatus === '完成' ? 'bg-emerald-500' : 'bg-indigo-500'}`} value={item.orderStatus} onChange={e => setItems(items.map(i => i.id === item.id ? {...i, orderStatus:e.target.value} : i))}>
                                                {orderStatuses.filter(s => s !== '全部').map(s => <option key={s} value={s}>{s}</option>)}
                                            </select>
                                        )}
                                        <p className="text-[10px] text-slate-300 font-mono leading-none mb-1">{item.fPrice} {item.cur}</p>
                                        <p className="text-lg font-black text-sky-700 leading-none">NT$ {item.price}</p>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* 基金庫存 Modal */}
                    {showCreditModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 p-4 text-left">
                            <div className="bg-white w-full max-w-sm rounded-[32px] p-6 shadow-2xl">
                                <h2 className="text-xl font-black text-slate-800 mb-6 italic">設定基金庫存</h2>
                                <div className="space-y-4">
                                    <div className="flex gap-1 overflow-x-auto pb-2 no-scrollbar">
                                        {['KRW', 'JPY', 'THB', 'HKD', 'AUD'].map(c => (
                                            <button key={c} onClick={() => setTempCredit({...tempCredit, cur: c})} className={`flex-1 min-w-[50px] py-2 rounded-lg text-[10px] font-black ${tempCredit.cur === c ? 'bg-amber-500 text-white shadow-md' : 'bg-slate-50 text-slate-400'}`}>{c}</button>
                                        ))}
                                    </div>
                                    <input type="number" placeholder="外幣金額" className="w-full bg-slate-50 p-4 rounded-xl font-black text-amber-600 outline-none border-2 border-transparent focus:border-amber-100" value={tempCredit.foreign} onChange={e => setTempCredit({...tempCredit, foreign: e.target.value})} />
                                    <input type="number" placeholder="台幣金額" className="w-full bg-slate-50 p-4 rounded-xl font-black text-slate-700 outline-none border-2 border-transparent focus:border-slate-200" value={tempCredit.ntd} onChange={e => setTempCredit({...tempCredit, ntd: e.target.value})} />
                                    <button onClick={() => { setCredit({...tempCredit}); setShowCreditModal(false); }} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black active-scale shadow-lg">更新基金資料</button>
                                    <button onClick={() => setShowCreditModal(false)} className="w-full text-slate-400 text-sm font-bold mt-2">取消</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 新增/編輯 Modal */}
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 p-4 text-left">
                            <div className="bg-white w-full max-w-md rounded-[32px] p-6 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
                                <h2 className="text-xl font-black text-sky-900 mb-4 italic">{isEditing ? '編輯項目' : '新增項目'}</h2>
                                <div className="space-y-4">
                                    <div className="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                        <p className="text-[10px] font-black text-slate-400 mb-2 uppercase">商品分類標籤</p>
                                        <div className="flex flex-wrap gap-2 mb-2">
                                            {pCats.map(c => (
                                                <div key={c} onClick={() => setForm({...form, cat: c})} className={`flex items-center gap-1 px-2 py-1 rounded-lg text-[10px] font-bold cursor-pointer transition-all ${form.cat === c ? 'bg-sky-500 text-white shadow-sm' : 'bg-white text-slate-400'}`}>
                                                    <span>{c}</span>
                                                    {c !== '預設' && <button onClick={(e) => { e.stopPropagation(); setPCats(prev => prev.filter(x => x !== c)); if(form.cat === c) setForm({...form, cat:'預設'}); }}><Icon name="x" className="w-2 h-2" /></button>}
                                                </div>
                                            ))}
                                        </div>
                                        <input placeholder="+ 新增分類" className="w-full bg-white p-3 rounded-xl text-sm font-bold outline-none border border-slate-100" value={form.cat} onChange={e => setForm({...form, cat: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <input placeholder="客戶" className="bg-slate-50 p-4 rounded-xl font-bold text-sm outline-none" value={form.customer} onChange={e => setForm({...form, customer: e.target.value})} />
                                        <div className="flex gap-1 bg-slate-50 p-1 rounded-xl">
                                            {['琳', '璇', '無'].map(p => <button key={p} onClick={() => setForm({...form, payer: p})} className={`flex-1 rounded-lg text-[10px] font-black ${form.payer === p ? 'bg-white text-sky-600 shadow-sm' : 'text-slate-400'}`}>{p}</button>)}
                                        </div>
                                    </div>
                                    <input placeholder="商品名稱" className="w-full bg-slate-50 p-4 rounded-xl font-bold text-sm outline-none" value={form.product} onChange={e => setForm({...form, product: e.target.value})} />
                                    <div className="bg-sky-50/50 p-4 rounded-2xl space-y-3 border border-sky-100">
                                        <div className="flex gap-2">
                                            <select className="bg-white p-3 rounded-lg text-[10px] font-black outline-none border border-sky-100" value={form.cur} onChange={e => setForm({...form, cur: e.target.value})}>
                                                {Object.keys(rates).map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                            <input type="number" placeholder="外幣" className="flex-1 bg-white p-3 rounded-lg font-bold text-sm outline-none border border-sky-100 text-amber-600" value={form.fPrice} onChange={e => setForm({...form, fPrice: e.target.value, price: Math.round(e.target.value * rates[form.cur])})} />
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <input type="number" placeholder="台幣" className="bg-white p-3 rounded-lg font-bold text-sm outline-none border border-sky-100 text-sky-600" value={form.price} onChange={e => setForm({...form, price: e.target.value})} />
                                            <input type="number" placeholder="利潤" className="bg-white p-3 rounded-lg font-bold text-sm outline-none border border-emerald-100 text-emerald-600" value={form.fee} onChange={e => setForm({...form, fee: e.target.value})} />
                                        </div>
                                    </div>
                                    <button onClick={() => {
                                        if (form.cat && !pCats.includes(form.cat)) setPCats([...pCats, form.cat]);
                                        if (isEditing) setItems(items.map(i => i.id === isEditing ? {...form, id: isEditing} : i));
                                        else setItems([{...form, id: Date.now(), stage: viewMode}, ...items]);
                                        setShowModal(false);
                                    }} className="w-full bg-sky-600 text-white py-4 rounded-2xl font-black shadow-lg active-scale">儲存項目</button>
                                    <button onClick={() => setShowModal(false)} className="w-full text-slate-400 text-sm font-bold">取消</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
