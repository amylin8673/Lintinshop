<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinTin 系統 v37.19</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; text-align: left; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-scale:active { transform: scale(0.96); }
        .field-label { font-size: 10px; font-weight: 900; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
        .field-value { background-color: #F1F5F9; border: 1px solid #E2E8F0; border-radius: 14px; padding: 10px 14px; font-size: 14px; font-weight: 700; color: #1E293B; width: 100%; outline: none; }
        .stat-input { background: transparent; border: none; padding: 0; font-weight: 900; outline: none; width: 100%; }
        .currency-select { background: #FEF3C7; color: #D97706; font-size: 10px; font-weight: 900; padding: 1px 4px; border-radius: 4px; border: none; outline: none; appearance: none; cursor: pointer; }
        @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-slow { animation: pulse-slow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                box: <path d="M21 8l-2-2H5L3 8v11a2 2 0 002 2h14a2 2 0 002-2V8zM5 8l1.5-1.5h11L19 8H5zm14 11H5V10h14v9zM9 12h6v2H9v-2z" />,
                edit: <path d="M14.06 3.02l.92.92L5.92 13H5v-.92l9.06-9.06M17.66 1c-.25 0-.51.1-.7.29l-1.83 1.83 3.75 3.75 1.83-1.83c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.2-.2-.45-.29-.71-.29zm-3.6 3.19L3 15.25V21h5.75L19.81 9.94l-3.75-3.75z" />,
                trash: <path d="M16 9v10H8V9h8m-1.5-6h-5l-1 1H5v2h14V4h-3.5l-1-1zM18 7H6v12c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7z" />,
                user: <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />,
                refresh: <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
            };
            return <svg className={className} viewBox="0 0 24 24" fill="currentColor">{icons[name]}</svg>;
        };

        const App = () => {
            const [items, setItems] = useState(() => JSON.parse(localStorage.getItem('lt_items')) || []);
            const [credit, setCredit] = useState(() => JSON.parse(localStorage.getItem('lt_credit')) || { ntd: 0, foreign: 0, cur: 'KRW' });
            const [rates, setRates] = useState({ KRW: 0.0215, JPY: 0.1997, THB: 0.9, HKD: 4.1, AUD: 22.3, USD: 32.5, NTD: 1 });
            const [isSyncing, setIsSyncing] = useState(false);
            const [viewMode, setViewMode] = useState('purchase'); 
            const [activePCat, setActivePCat] = useState('全部');
            const [activeStatus, setActiveStatus] = useState('全部');
            const [showModal, setShowModal] = useState(false);
            const [isEditing, setIsEditing] = useState(null);
            const [showBankModal, setShowBankModal] = useState(false);
            const [bankData, setBankData] = useState({ customer: '', lastFive: '' });
            const [form, setForm] = useState({ customer: '', product: '', price: '', fee: '', payer: '無', cur: 'KRW', fPrice: '', cat: '預設', orderStatus: '待付款', lastFive: '' });

            const categories = useMemo(() => {
                const allCats = items.filter(i => i.stage === 'purchase').map(i => i.cat || '預設');
                return ['全部', ...new Set(allCats)];
            }, [items]);

            const fetchRates = async () => {
                setIsSyncing(true);
                try {
                    const res = await fetch('https://api.frankfurter.dev/v1/latest?base=TWD');
                    const data = await res.json();
                    if (data && data.rates) {
                        const newRates = { ...rates };
                        Object.keys(data.rates).forEach(cur => {
                            if (newRates[cur] !== undefined) newRates[cur] = parseFloat((1 / data.rates[cur]).toFixed(4));
                        });
                        setRates(newRates);
                    }
                } catch (err) { console.error(err); } finally { setIsSyncing(false); }
            };

            useEffect(() => { fetchRates(); }, []);
            useEffect(() => { localStorage.setItem('lt_items', JSON.stringify(items)); }, [items]);
            useEffect(() => { localStorage.setItem('lt_credit', JSON.stringify(credit)); }, [credit]);

            const handleFPriceChange = (val) => {
                const fPrice = val;
                if (!fPrice || fPrice === '0' || fPrice === '') {
                    setForm({ ...form, fPrice, price: '' });
                    return;
                }
                const rate = rates[form.cur] || 1;
                const ntdPrice = Math.round(fPrice * rate); 
                setForm({ ...form, fPrice, price: ntdPrice });
            };

            const updateCustomerStatus = (customerName, newStatus, lastFiveVal = null) => {
                const finalStatus = lastFiveVal ? '待查帳' : newStatus;
                setItems(prev => prev.map(item => (item.customer === customerName && item.stage === 'order') ? { ...item, orderStatus: finalStatus, lastFive: lastFiveVal !== null ? lastFiveVal : item.lastFive } : item));
                setShowBankModal(false);
            };

            const groupedOrders = useMemo(() => {
                const allOrders = items.filter(i => i.stage === 'order');
                const groups = {};
                allOrders.forEach(item => {
                    if (!groups[item.customer]) groups[item.customer] = { items: [], total: 0, status: item.orderStatus, lastFive: item.lastFive };
                    groups[item.customer].items.push(item);
                    groups[item.customer].total += Number(item.price || 0);
                });
                if (activeStatus === '全部') return groups;
                const filtered = {};
                Object.keys(groups).forEach(name => { if (groups[name].status === activeStatus) filtered[name] = groups[name]; });
                return filtered;
            }, [items, activeStatus]);

            const stats = useMemo(() => ({
                profit: items.reduce((s, i) => s + Number(i.fee || 0), 0),
                pending: items.filter(i => i.stage === 'order' && i.orderStatus !== '完成').reduce((s, i) => s + Number(i.price || 0), 0)
            }), [items]);

            const orderStatuses = ['全部', '待付款', '已匯款', '待查帳', '已出貨', '完成'];

            return (
                <div className="min-h-screen pb-10 text-slate-900">
                    <header className="bg-white sticky top-0 z-40 border-b border-slate-100 p-5 text-left">
                        <div className="flex justify-between items-center mb-5">
                            <div className="flex items-center gap-2">
                                <div className="bg-sky-500 p-2 rounded-xl text-white shadow-md"><Icon name="box" /></div>
                                <h1 className="text-xl font-black italic tracking-tighter text-sky-600">LinTin</h1>
                            </div>
                            <button onClick={() => { setForm({ customer: '', product: '', price: '', fee: '', payer: '無', cur: 'KRW', fPrice: '', cat: '預設', orderStatus: '待付款', lastFive: '' }); setIsEditing(null); setShowModal(true); }} className="bg-sky-500 text-white px-5 py-2.5 rounded-full font-black text-sm active-scale shadow-lg">+ 新增項目</button>
                        </div>

                        <div className="grid grid-cols-3 gap-2 mb-5">
                            <div className="bg-white p-3 rounded-2xl border border-slate-100 shadow-sm relative">
                                <p className="text-[10px] font-bold text-slate-400 mb-1 flex justify-between items-center">
                                    庫存餘額 <button onClick={fetchRates} className={isSyncing ? 'animate-spin text-sky-500' : 'text-slate-300'}><Icon name="refresh" className="w-2.5 h-2.5" /></button>
                                </p>
                                <div className="flex items-center gap-1">
                                    <input type="number" className="stat-input text-[11px] text-amber-500 w-12" value={credit.foreign} onChange={e => setCredit({...credit, foreign: e.target.value})} />
                                    <select className="currency-select" value={credit.cur} onChange={e => setCredit({...credit, cur: e.target.value})}>
                                        {Object.keys(rates).filter(c => c !== 'NTD').map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                <div className="flex items-center text-[11px] font-black text-slate-800">$<input type="number" className="stat-input flex-1 ml-0.5" value={credit.ntd} onChange={e => setCredit({...credit, ntd: e.target.value})} /></div>
                            </div>
                            <div className="bg-white p-3 rounded-2xl border border-slate-100 shadow-sm">
                                <p className="text-[10px] font-bold text-slate-400 mb-1">待收金額</p>
                                <p className="text-xs font-black text-sky-600 mt-1">${stats.pending.toLocaleString()}</p>
                            </div>
                            <div className="bg-white p-3 rounded-2xl border border-slate-100 shadow-sm">
                                <p className="text-[10px] font-bold text-slate-400 mb-1">利潤統計</p>
                                <p className="text-xs font-black text-emerald-500 mt-1">${stats.profit.toLocaleString()}</p>
                            </div>
                        </div>

                        <div className="flex gap-6 border-b border-slate-50 mb-3 px-1 text-sm font-black">
                            <button onClick={() => setViewMode('purchase')} className={`pb-2 ${viewMode === 'purchase' ? 'text-sky-500 border-b-2 border-sky-500' : 'text-slate-300'}`}>採購清單</button>
                            <button onClick={() => setViewMode('order')} className={`pb-2 ${viewMode === 'order' ? 'text-sky-700 border-b-2 border-sky-700' : 'text-slate-300'}`}>訂單管理</button>
                        </div>

                        <div className="flex gap-2 overflow-x-auto no-scrollbar py-1">
                            {viewMode === 'purchase' ? (
                                categories.map(c => (
                                    <button 
                                        key={c} 
                                        onClick={() => setActivePCat(c)} 
                                        className={`px-5 py-2 rounded-full text-[11px] font-black whitespace-nowrap transition-all ${activePCat === c ? 'bg-sky-500 text-white' : 'bg-slate-100 text-slate-500'}`}
                                    >
                                        {c}
                                    </button>
                                ))
                            ) : (
                                orderStatuses.map(s => <button key={s} onClick={() => setActiveStatus(s)} className={`px-5 py-2 rounded-full text-[11px] font-black whitespace-nowrap ${activeStatus === s ? 'bg-sky-700 text-white' : 'bg-slate-100 text-slate-500'}`}>{s}</button>)
                            )}
                        </div>
                    </header>

                    <div className="p-4 space-y-5 text-left">
                        {viewMode === 'purchase' ? (
                            items.filter(i => i.stage === 'purchase' && (activePCat === '全部' || (i.cat || '預設') === activePCat)).map(item => {
                                const isUnpriced = !item.fPrice || item.fPrice === '0' || item.fPrice === '';
                                return (
                                    <div key={item.id} className={`bg-white rounded-[32px] p-6 card-shadow border transition-all relative ${isUnpriced ? 'border-rose-100 bg-rose-50/10' : 'border-slate-100'}`}>
                                        <div className="absolute top-4 left-6">
                                            <span className="bg-slate-50 text-slate-400 px-3 py-1 rounded-full text-[9px] font-black tracking-widest border border-slate-100 shadow-sm uppercase">
                                                #{item.cat || '預設'}
                                            </span>
                                        </div>
                                        <div className={`absolute top-4 right-5 px-3 py-1.5 rounded-full text-[10px] font-black text-white shadow-sm ${item.payer === '璇' ? 'bg-sky-400' : item.payer === '琳' ? 'bg-cyan-400' : 'bg-slate-300'}`}>
                                            {item.payer}
                                        </div>

                                        <div className="mt-8 space-y-4">
                                            <div className="flex items-start gap-3">
                                                <div className="bg-sky-50 text-sky-500 p-2.5 rounded-2xl">
                                                    <Icon name="user" className="w-5 h-5" />
                                                </div>
                                                <div className="flex-1">
                                                    <p className="text-[10px] font-black text-slate-400 leading-none mb-1">CUSTOMER</p>
                                                    <h3 className="text-base font-black text-slate-800">{item.customer}</h3>
                                                </div>
                                            </div>

                                            {/* 這裡更改了產品區塊底色 */}
                                            <div className="bg-sky-50/40 p-4 rounded-2xl border border-sky-100/50">
                                                <p className="text-[10px] font-black text-sky-400 leading-none mb-1.5 uppercase tracking-wider">Product Item</p>
                                                <p className="text-sm font-bold text-slate-700 leading-relaxed">{item.product}</p>
                                            </div>

                                            <div className="flex justify-between items-end pt-2">
                                                <div className="space-y-1">
                                                    {!isUnpriced && item.fee > 0 && (
                                                        <div className="flex items-center gap-1.5">
                                                            <div className="w-1.5 h-1.5 rounded-full bg-emerald-400"></div>
                                                            <span className="text-emerald-500 text-[10px] font-black uppercase">Profit +${Number(item.fee).toLocaleString()}</span>
                                                        </div>
                                                    )}
                                                    <p className={`text-2xl font-black ${isUnpriced ? 'text-rose-400 italic text-xl' : 'text-slate-900'}`}>
                                                        {isUnpriced ? '待定價' : `NT$ ${Number(item.price).toLocaleString()}`}
                                                    </p>
                                                    {!isUnpriced && (
                                                        <p className="text-[11px] font-bold text-slate-400 uppercase">
                                                            {Number(item.fPrice).toLocaleString()} {item.cur}
                                                        </p>
                                                    )}
                                                </div>
                                                <div className="flex flex-col gap-3">
                                                    <div className="flex gap-2 self-end">
                                                        <button onClick={() => { setForm(item); setIsEditing(item.id); setShowModal(true); }} className="p-2.5 bg-slate-100 text-slate-400 rounded-xl active-scale transition-colors hover:bg-slate-200"><Icon name="edit" className="w-3.5 h-3.5" /></button>
                                                        <button onClick={() => setItems(items.filter(i => i.id !== item.id))} className="p-2.5 bg-rose-50 text-rose-300 rounded-xl active-scale transition-colors hover:bg-rose-100"><Icon name="trash" className="w-3.5 h-3.5" /></button>
                                                    </div>
                                                    <button 
                                                        disabled={isUnpriced}
                                                        onClick={() => setItems(items.map(i => i.id === item.id ? {...i, stage:'order', orderStatus:'待付款'} : i))} 
                                                        className={`px-6 py-3 rounded-2xl font-black text-[11px] active-scale shadow-lg transition-all ${isUnpriced ? 'bg-slate-100 text-slate-300 cursor-not-allowed shadow-none' : 'bg-sky-500 text-white hover:bg-sky-600'}`}
                                                    >
                                                        完成採購
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })
                        ) : (
                            Object.keys(groupedOrders).map(customer => (
                                <div key={customer} className="bg-white rounded-[32px] overflow-hidden border border-slate-200 shadow-sm mb-4">
                                    <div className="bg-sky-50/50 px-6 py-5 flex justify-between items-center border-b border-sky-100/50">
                                        <div className="flex items-center gap-2">
                                            <div className="bg-sky-600 p-1.5 rounded-lg text-white"><Icon name="user" className="w-3.5 h-3.5" /></div>
                                            <div><span className="font-black text-sky-900 text-sm block leading-none">{customer}</span>{groupedOrders[customer].lastFive && <span className="text-[10px] font-bold text-sky-600">末五碼：{groupedOrders[customer].lastFive}</span>}</div>
                                        </div>
                                        <div className="flex flex-col items-end gap-2">
                                            <select className={`px-4 py-2 rounded-xl text-[11px] font-black outline-none text-white shadow-md ${groupedOrders[customer].status === '待查帳' ? 'bg-amber-500' : groupedOrders[customer].status === '完成' ? 'bg-emerald-500' : 'bg-sky-600'}`} value={groupedOrders[customer].status} onChange={e => { if(e.target.value==='已匯款') { setBankData({customer, lastFive:''}); setShowBankModal(true); } else updateCustomerStatus(customer, e.target.value); }}>
                                                {orderStatuses.filter(s => s !== '全部').map(s => <option key={s} value={s}>{s}</option>)}
                                            </select>
                                            <p className="text-sm font-black text-sky-700">NT$ {groupedOrders[customer].total.toLocaleString()}</p>
                                        </div>
                                    </div>
                                    <div className="p-4 space-y-2 bg-white">
                                        {groupedOrders[customer].items.map(item => (
                                            <div key={item.id} className="bg-slate-50/40 p-4 rounded-2xl flex justify-between items-center">
                                                <div className="flex-1">
                                                    <span className="text-[9px] font-black text-slate-400 uppercase">#{item.cat}</span>
                                                    <p className="text-xs font-black text-slate-700">{item.product}</p>
                                                    <p className="text-[10px] font-bold text-slate-400">{item.price ? `NT$ ${Number(item.price).toLocaleString()}` : '未定價'} / {item.fPrice || 0} {item.cur}</p>
                                                </div>
                                                <div className="flex gap-4 ml-4"><button onClick={() => { setForm(item); setIsEditing(item.id); setShowModal(true); }} className="text-slate-300"><Icon name="edit" className="w-3.5 h-3.5" /></button></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))
                        )}
                    </div>

                    {showBankModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
                            <div className="bg-white w-full max-w-xs rounded-[32px] p-8 shadow-2xl text-center">
                                <h3 className="text-lg font-black text-slate-800 mb-4">輸入末五碼</h3>
                                <input autoFocus type="tel" maxLength="5" className="w-full field-value text-center text-2xl tracking-widest outline-none mb-6" value={bankData.lastFive} onChange={e => setBankData({...bankData, lastFive: e.target.value})} />
                                <div className="flex gap-3"><button onClick={() => setShowBankModal(false)} className="flex-1 bg-slate-100 text-slate-400 py-3 rounded-xl font-black">取消</button><button onClick={() => updateCustomerStatus(bankData.customer, '已匯款', bankData.lastFive)} className="flex-1 bg-sky-500 text-white py-3 rounded-xl font-black">確認查帳</button></div>
                            </div>
                        </div>
                    )}

                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 text-left">
                            <div className="bg-white w-full max-w-md rounded-[40px] p-8 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
                                <h2 className="text-2xl font-black text-slate-800 mb-6 italic">{isEditing ? 'Edit Item' : 'New Item'}</h2>
                                <div className="space-y-5">
                                    <div><p className="field-label">分類 Tag</p><input className="field-value" value={form.cat} onChange={e => setForm({...form, cat: e.target.value})} /></div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><p className="field-label">客戶 Client</p><input className="field-value" value={form.customer} onChange={e => setForm({...form, customer: e.target.value})} /></div>
                                        <div><p className="field-label">支付 Payer</p><div className="flex gap-1 bg-slate-100 p-1 rounded-xl">
                                            {['琳', '璇', '無'].map(p => <button key={p} onClick={() => setForm({...form, payer: p})} className={`flex-1 py-2 rounded-lg text-[10px] font-black ${form.payer === p ? 'bg-white shadow-sm' : 'text-slate-400'}`}>{p}</button>)}
                                        </div></div>
                                    </div>
                                    <div><p className="field-label">商品 Product</p><input className="field-value" value={form.product} onChange={e => setForm({...form, product: e.target.value})} /></div>
                                    <div className="bg-slate-50 p-5 rounded-[28px] space-y-4">
                                        <div className="grid grid-cols-5 gap-1">
                                            {Object.keys(rates).map(c => <button key={c} onClick={() => setForm({...form, cur: c})} className={`py-2 rounded-lg text-[10px] font-black border transition-all ${form.cur === c ? 'bg-sky-500 border-sky-600 text-white' : 'bg-white text-slate-400'}`}>{c}</button>)}
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <input type="number" placeholder="外幣單價" className="field-value border-none text-amber-600 font-bold" value={form.fPrice} onChange={e => handleFPriceChange(e.target.value)} />
                                            <input type="number" placeholder="台幣成本" className="field-value border-none text-sky-600 font-bold" value={form.price} onChange={e => setForm({...form, price: e.target.value})} />
                                        </div>
                                        <input type="number" placeholder="手動輸入利潤" className="field-value border-none text-emerald-600 font-bold" value={form.fee} onChange={e => setForm({...form, fee: e.target.value})} />
                                    </div>
                                    <div className="flex gap-4 pt-4">
                                        <button onClick={() => setShowModal(false)} className="flex-1 bg-slate-100 text-slate-400 py-4 rounded-[20px] font-black">取消</button>
                                        <button onClick={() => { if (isEditing) setItems(items.map(i => i.id === isEditing ? {...form, id: isEditing} : i)); else setItems([{...form, id: Date.now(), stage: viewMode}, ...items]); setShowModal(false); }} className="flex-[2] bg-sky-500 text-white py-4 rounded-[20px] font-black shadow-xl">儲存項目</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
