<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinTin 系統 v34.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FBFBFA; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-scale:active { transform: scale(0.96); }
        .field-label { font-size: 10px; font-weight: 900; color: #A8A29E; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; margin-left: 4px; text-align: left; }
        .field-value { background-color: #F5F5F4; border: 1px solid #E7E5E4; border-radius: 12px; padding: 10px 14px; font-size: 14px; font-weight: 700; color: #44403C; width: 100%; text-align: left; }
        
        /* 霧霾藍與鼠尾草綠的自定義顏色 */
        .bg-dusty-blue { background-color: #78909C; }
        .text-dusty-blue { color: #546E7A; }
        .border-dusty-blue { border-color: #CFD8DC; }
        
        .bg-sage-green { background-color: #8D9984; }
        .text-sage-green { color: #6B7563; }
        .border-sage-green { border-color: #D6DBD2; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                box: <path d="M21 8l-2-2H5L3 8v11a2 2 0 002 2h14a2 2 0 002-2V8zM5 8l1.5-1.5h11L19 8H5zm14 11H5V10h14v9zM9 12h6v2H9v-2z" />,
                sync: <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z" />,
                edit: <path d="M14.06 3.02l.92.92L5.92 13H5v-.92l9.06-9.06M17.66 1c-.25 0-.51.1-.7.29l-1.83 1.83 3.75 3.75 1.83-1.83c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.2-.2-.45-.29-.71-.29zm-3.6 3.19L3 15.25V21h5.75L19.81 9.94l-3.75-3.75z" />,
                trash: <path d="M16 9v10H8V9h8m-1.5-6h-5l-1 1H5v2h14V4h-3.5l-1-1zM18 7H6v12c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7z" />,
                user: <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
            };
            return <svg className={className} viewBox="0 0 24 24" fill="currentColor">{icons[name]}</svg>;
        };

        const App = () => {
            const [items, setItems] = useState(() => JSON.parse(localStorage.getItem('lt_items')) || []);
            const [pCats, setPCats] = useState(() => JSON.parse(localStorage.getItem('lt_p_cats')) || ['預設', '韓國東大門']);
            const [credit, setCredit] = useState(() => JSON.parse(localStorage.getItem('lt_credit')) || { ntd: 0, foreign: 0, cur: 'KRW' });
            const [rates, setRates] = useState({ KRW: 0.024, JPY: 0.20, THB: 0.88, HKD: 4.05, AUD: 20.8, NTD: 1 });
            const [isUpdatingRates, setIsUpdatingRates] = useState(false);

            const orderStatuses = ['全部', '待付款', '已匯款', '待查帳', '已出貨', '完成'];
            const [viewMode, setViewMode] = useState('purchase'); 
            const [activePCat, setActivePCat] = useState('全部');
            const [activeStatus, setActiveStatus] = useState('全部');
            const [showModal, setShowModal] = useState(false);
            const [showCreditModal, setShowCreditModal] = useState(false);
            const [isEditing, setIsEditing] = useState(null);

            const [form, setForm] = useState({ customer: '', product: '', price: '', fee: '', payer: '無', cur: 'KRW', fPrice: '', cat: '預設', orderStatus: '待付款' });
            const [tempCredit, setTempCredit] = useState({ ntd: 0, foreign: 0, cur: 'KRW' });

            const fetchLatestRates = async () => {
                setIsUpdatingRates(true);
                try {
                    const res = await fetch('https://api.frankfurter.dev/v1/latest?base=TWD');
                    const data = await res.json();
                    if (data && data.rates) {
                        setRates({ KRW: 1 / data.rates.KRW, JPY: 1 / data.rates.JPY, THB: 1 / data.rates.THB, HKD: 1 / data.rates.HKD, AUD: 1 / data.rates.AUD, NTD: 1 });
                    }
                } catch (err) { console.error(err); } finally { setIsUpdatingRates(false); }
            };

            useEffect(() => { fetchLatestRates(); }, []);
            useEffect(() => { localStorage.setItem('lt_items', JSON.stringify(items)); }, [items]);
            useEffect(() => {
                if (form.fPrice && form.cur) setForm(prev => ({ ...prev, price: Math.round(form.fPrice * rates[form.cur]) }));
            }, [rates, form.fPrice, form.cur]);

            const groupedOrders = useMemo(() => {
                const filtered = items.filter(i => i.stage === 'order' && (activeStatus === '全部' || i.orderStatus === activeStatus));
                const groups = {};
                filtered.forEach(item => {
                    if (!groups[item.customer]) groups[item.customer] = [];
                    groups[item.customer].push(item);
                });
                return groups;
            }, [items, activeStatus]);

            const purchaseItems = useMemo(() => {
                return items.filter(i => i.stage === 'purchase' && (activePCat === '全部' || i.cat === activePCat));
            }, [items, activePCat]);

            const stats = useMemo(() => ({
                profit: items.reduce((s, i) => s + Number(i.fee || 0), 0),
                pending: items.filter(i => i.stage === 'order' && i.orderStatus !== '完成').reduce((s, i) => s + Number(i.price || 0), 0)
            }), [items]);

            return (
                <div className="min-h-screen pb-10 text-stone-800">
                    <header className="bg-white sticky top-0 z-40 border-b border-stone-100 p-5 text-left">
                        <div className="flex justify-between items-center mb-5">
                            <div className="flex items-center gap-2">
                                <div className="bg-stone-800 p-2 rounded-xl text-stone-50 shadow-md"><Icon name="box" className="w-5 h-5" /></div>
                                <h1 className="text-xl font-black italic tracking-tighter text-stone-800">LinTin</h1>
                            </div>
                            <button onClick={() => { setForm({ customer: '', product: '', price: '', fee: '', payer: '無', cur: 'KRW', fPrice: '', cat: '預設', orderStatus: '待付款' }); setIsEditing(null); setShowModal(true); }} className="bg-dusty-blue text-white px-5 py-2.5 rounded-full font-black text-sm active-scale shadow-lg">+ 新增項目</button>
                        </div>

                        <div className="grid grid-cols-3 gap-2 mb-5">
                            <div onClick={() => { fetchLatestRates(); setTempCredit({...credit}); setShowCreditModal(true); }} className="bg-stone-50 p-3 rounded-2xl border border-stone-200/60 shadow-sm active-scale relative overflow-hidden">
                                {isUpdatingRates && <div className="absolute inset-0 bg-white/60 flex items-center justify-center"><Icon name="sync" className="w-4 h-4 text-dusty-blue animate-spin" /></div>}
                                <p className="text-[10px] font-bold text-stone-400 mb-1">庫存</p>
                                <p className="text-[11px] font-black text-amber-600 truncate leading-none mb-1">{credit.foreign} {credit.cur}</p>
                                <p className="text-[11px] font-black text-stone-800 leading-none">${Number(credit.ntd).toLocaleString()}</p>
                            </div>
                            <div className="bg-stone-50 p-3 rounded-2xl border border-stone-200/60">
                                <p className="text-[10px] font-bold text-stone-400 mb-1">待收</p>
                                <p className="text-xs font-black text-stone-800 mt-1">${stats.pending.toLocaleString()}</p>
                            </div>
                            <div className="bg-stone-50 p-3 rounded-2xl border border-stone-200/60">
                                <p className="text-[10px] font-bold text-stone-400 mb-1">利潤</p>
                                <p className="text-xs font-black text-stone-800 mt-1">${stats.profit.toLocaleString()}</p>
                            </div>
                        </div>

                        <div className="flex gap-6 border-b border-stone-50 mb-3 px-1 text-sm font-black">
                            <button onClick={() => setViewMode('purchase')} className={`pb-2 transition-colors ${viewMode === 'purchase' ? 'text-dusty-blue border-b-2 border-dusty-blue' : 'text-stone-300'}`}>採購清單</button>
                            <button onClick={() => setViewMode('order')} className={`pb-2 transition-colors ${viewMode === 'order' ? 'text-sage-green border-b-2 border-sage-green' : 'text-stone-300'}`}>訂單管理</button>
                        </div>

                        <div className="flex gap-2 overflow-x-auto no-scrollbar py-1">
                            {viewMode === 'purchase' ? (
                                <>
                                    <button onClick={() => setActivePCat('全部')} className={`px-5 py-2 rounded-full text-[11px] font-black whitespace-nowrap ${activePCat === '全部' ? 'bg-dusty-blue text-white shadow-md' : 'bg-stone-100 text-stone-400'}`}>全部</button>
                                    {pCats.map(c => <button key={c} onClick={() => setActivePCat(c)} className={`px-5 py-2 rounded-full text-[11px] font-black whitespace-nowrap ${activePCat === c ? 'bg-dusty-blue text-white shadow-md' : 'bg-stone-100 text-stone-400'}`}>{c}</button>)}
                                </>
                            ) : (
                                orderStatuses.map(s => (
                                    <button key={s} onClick={() => setActiveStatus(s)} className={`px-5 py-2 rounded-full text-[11px] font-black whitespace-nowrap transition-all ${activeStatus === s ? 'bg-sage-green text-white shadow-md' : 'bg-stone-100 text-stone-400'}`}>{s}</button>
                                ))
                            )}
                        </div>
                    </header>

                    <div className="p-4 space-y-6">
                        {/* 採購清單 - 霧霾藍調 */}
                        {viewMode === 'purchase' && purchaseItems.map(item => (
                            <div key={item.id} className="bg-white rounded-[28px] p-6 shadow-sm border border-stone-200 relative text-left">
                                <div className={`absolute top-5 right-5 px-3 py-1.5 rounded-full text-[10px] font-black text-white ${item.payer === '璇' ? 'bg-stone-400' : item.payer === '琳' ? 'bg-stone-300' : 'bg-stone-200'}`}>{item.payer}</div>
                                <div className="space-y-4">
                                    <div><p className="field-label text-stone-300">客戶</p><div className="field-value border-none bg-stone-50">{item.customer}</div></div>
                                    <div><p className="field-label text-stone-300">商品</p><div className="field-value border-none bg-stone-50">{item.product}</div></div>
                                    <div className="flex justify-between items-end pt-4 border-t border-stone-50">
                                        <div className="flex gap-2">
                                            <button onClick={() => { setForm(item); setIsEditing(item.id); setShowModal(true); }} className="p-3 bg-stone-50 text-stone-400 rounded-xl active-scale"><Icon name="edit" /></button>
                                            <button onClick={() => setItems(items.filter(i => i.id !== item.id))} className="p-3 bg-stone-50 text-stone-400 rounded-xl active-scale"><Icon name="trash" /></button>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-xl font-black text-stone-800 leading-none mb-3">NT$ {Number(item.price).toLocaleString()}</p>
                                            <button onClick={() => setItems(items.map(i => i.id === item.id ? {...i, stage:'order', orderStatus:'待付款'} : i))} className="bg-stone-800 text-white text-[11px] font-black px-6 py-2.5 rounded-xl active-scale shadow-lg">完成採購</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}

                        {/* 訂單管理 - 鼠尾草綠調 */}
                        {viewMode === 'order' && Object.keys(groupedOrders).map(customer => (
                            <div key={customer} className="bg-white rounded-[32px] overflow-hidden border border-stone-200 shadow-sm mb-4 text-left">
                                <div className="bg-stone-50/50 px-6 py-4 flex justify-between items-center border-b border-stone-100">
                                    <div className="flex items-center gap-2 text-sage-green">
                                        <Icon name="user" className="w-4 h-4" />
                                        <span className="font-black text-stone-700 text-sm">{customer}</span>
                                    </div>
                                    <span className="text-[10px] font-black bg-stone-100 px-3 py-1 rounded-full text-stone-400 uppercase tracking-tighter">Items: {groupedOrders[customer].length}</span>
                                </div>
                                <div className="p-4 space-y-4">
                                    {groupedOrders[customer].map(item => (
                                        <div key={item.id} className="bg-stone-50/30 p-4 rounded-2xl border border-stone-100/50 flex justify-between items-center">
                                            <div className="flex-1">
                                                <p className="text-xs font-black text-stone-700 mb-1">{item.product}</p>
                                                <p className="text-[10px] font-bold text-stone-300 uppercase">NT$ {Number(item.price).toLocaleString()} / {item.fPrice} {item.cur}</p>
                                            </div>
                                            <div className="flex flex-col items-end gap-2">
                                                <select className={`px-3 py-1.5 rounded-lg text-[10px] font-black outline-none text-white transition-colors ${item.orderStatus === '完成' ? 'bg-stone-400' : 'bg-sage-green'}`} value={item.orderStatus} onChange={e => setItems(items.map(i => i.id === item.id ? {...i, orderStatus:e.target.value} : i))}>
                                                    {orderStatuses.filter(s => s !== '全部').map(s => <option key={s} value={s}>{s}</option>)}
                                                </select>
                                                <div className="flex gap-4">
                                                    <button onClick={() => { setForm(item); setIsEditing(item.id); setShowModal(true); }} className="text-stone-300 active-scale"><Icon name="edit" className="w-3.5 h-3.5" /></button>
                                                    <button onClick={() => setItems(items.filter(i => i.id !== item.id))} className="text-stone-200 active-scale"><Icon name="trash" className="w-3.5 h-3.5" /></button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Modal */}
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-stone-900/40 backdrop-blur-[2px] p-4 text-left">
                            <div className="bg-white w-full max-w-md rounded-[40px] p-8 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
                                <h2 className="text-xl font-black text-stone-800 mb-6 italic">Edit Item</h2>
                                <div className="space-y-5">
                                    <div><p className="field-label">分類 Tag</p><input className="field-value outline-none focus:border-stone-300" value={form.cat} onChange={e => setForm({...form, cat: e.target.value})} /></div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><p className="field-label">客戶 Client</p><input className="field-value outline-none focus:border-stone-300" value={form.customer} onChange={e => setForm({...form, customer: e.target.value})} /></div>
                                        <div>
                                            <p className="field-label text-stone-300">支付 Payer</p>
                                            <div className="flex gap-1 bg-stone-50 p-1 rounded-xl">
                                                {['琳', '璇', '無'].map(p => <button key={p} onClick={() => setForm({...form, payer: p})} className={`flex-1 py-2 rounded-lg text-[10px] font-black transition-all ${form.payer === p ? 'bg-white shadow-sm text-stone-800' : 'text-stone-300'}`}>{p}</button>)}
                                            </div>
                                        </div>
                                    </div>
                                    <div><p className="field-label">商品名稱 Product</p><input className="field-value outline-none focus:border-stone-300" value={form.product} onChange={e => setForm({...form, product: e.target.value})} /></div>
                                    <div className="bg-stone-50 p-5 rounded-[28px] space-y-4">
                                        <div className="grid grid-cols-5 gap-1">
                                            {Object.keys(rates).map(c => (
                                                <button key={c} onClick={() => setForm({...form, cur: c})} className={`py-2 rounded-lg text-[10px] font-black border transition-all ${form.cur === c ? 'bg-stone-800 border-stone-800 text-white shadow-md' : 'bg-white text-stone-400 border-stone-200/60'}`}>{c}</button>
                                            ))}
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <input type="number" placeholder="外幣單價" className="field-value border-none text-amber-700 font-black" value={form.fPrice} onChange={e => setForm({...form, fPrice: e.target.value})} />
                                            <input type="number" placeholder="台幣售價" className="field-value border-none text-stone-800 font-black" value={form.price} onChange={e => setForm({...form, price: e.target.value})} />
                                        </div>
                                        <input type="number" placeholder="預期利潤" className="field-value border-none text-stone-500 font-black" value={form.fee} onChange={e => setForm({...form, fee: e.target.value})} />
                                    </div>
                                    <div className="flex gap-4 pt-4">
                                        <button onClick={() => setShowModal(false)} className="flex-1 bg-stone-100 text-stone-400 py-4 rounded-[20px] font-black active-scale">取消</button>
                                        <button onClick={() => { if (isEditing) setItems(items.map(i => i.id === isEditing ? {...form, id: isEditing} : i)); else setItems([{...form, id: Date.now(), stage: viewMode}, ...items]); setShowModal(false); }} className="flex-[2] bg-stone-800 text-white py-4 rounded-[20px] font-black shadow-xl active-scale">儲存變更</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
