<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinTin 協作系統 v3.1</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        select { appearance: none; -webkit-appearance: none; }
        .active-scale:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const Icon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                box: <path d="M21 8l-2-2H5L3 8v11a2 2 0 002 2h14a2 2 0 002-2V8zM5 8l1.5-1.5h11L19 8H5zm14 11H5V10h14v9zM9 12h6v2H9v-2z" />,
                edit: <path d="M14.06 3.02l.92.92L5.92 13H5v-.92l9.06-9.06M17.66 1c-.25 0-.51.1-.7.29l-1.83 1.83 3.75 3.75 1.83-1.83c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.2-.2-.45-.29-.71-.29zm-3.6 3.19L3 15.25V21h5.75L19.81 9.94l-3.75-3.75z" />,
                trash: <path d="M16 9v10H8V9h8m-1.5-6h-5l-1 1H5v2h14V4h-3.5l-1-1zM18 7H6v12c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7z" />,
                down: <path d="M7 10l5 5 5-5H7z" />
            };
            return (
                <svg className={className} viewBox="0 0 24 24" fill="currentColor">
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [inviteCode, setInviteCode] = React.useState(localStorage.getItem('lintin_invite_code') || '');
            const [tempCode, setTempCode] = React.useState('');
            const [viewMode, setViewMode] = React.useState('purchase'); 
            const [showModal, setShowModal] = React.useState(false);
            const [isEditing, setIsEditing] = React.useState(null);
            const [items, setItems] = React.useState([]);
            
            const [fundSettings, setFundSettings] = React.useState({ amount: 1000000, currency: 'KRW' });
            const currencies = ['KRW', 'JPY', 'THB', 'HKD', 'AUD', 'NTD'];
            const exchangeRates = { KRW: 0.024, JPY: 0.21, HKD: 4.1, THB: 0.9, AUD: 21.2, NTD: 1 };

            const initialForm = { customerName: '', productName: '', price: '', fee: '', payer: '', currency: 'KRW', foreignPrice: '' };
            const [formData, setFormData] = React.useState(initialForm);

            const saveItem = () => {
                if (!formData.customerName || !formData.productName) { alert("請填寫必要資訊"); return; }
                if (isEditing) {
                    setItems(items.map(item => item.id === isEditing ? { ...formData, id: isEditing, stage: item.stage } : item));
                    setIsEditing(null);
                } else {
                    setItems([{ id: Date.now(), ...formData, stage: 'purchase' }, ...items]);
                }
                setShowModal(false);
                setFormData(initialForm);
            };

            const deleteItem = (id) => {
                if (confirm("確定要刪除這個項目嗎？")) {
                    setItems(items.filter(item => item.id !== id));
                }
            };

            const openEdit = (item) => {
                setFormData(item);
                setIsEditing(item.id);
                setShowModal(true);
            };

            const markAsBought = (id) => {
                setItems(items.map(item => item.id === id ? { ...item, stage: 'order' } : item));
                setViewMode('order');
            };

            if (!inviteCode) {
                return (
                    <div className="min-h-screen bg-sky-50 flex items-center justify-center p-6 text-center">
                        <div className="w-full max-w-sm bg-white rounded-[40px] p-10 shadow-xl">
                            <h1 className="text-2xl font-black text-sky-900 mb-6 italic leading-none">LinTin Login</h1>
                            <input type="text" placeholder="代碼" className="w-full bg-slate-50 rounded-2xl py-4 px-6 mb-4 font-black text-sky-600 outline-none" value={tempCode} onChange={(e) => setTempCode(e.target.value)} />
                            <button onClick={() => { setInviteCode(tempCode.toUpperCase()); localStorage.setItem('lintin_invite_code', tempCode.toUpperCase()); }} className="w-full bg-sky-500 text-white py-4 rounded-2xl font-black shadow-lg active-scale">進入系統</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-10">
                    <header className="bg-white/80 backdrop-blur-md border-b border-sky-50 px-5 pt-4 sticky top-0 z-30 shadow-sm">
                        <div className="flex justify-between items-center mb-4">
                            <div className="flex items-center gap-2">
                                <div className="bg-sky-500 p-2.5 rounded-xl text-white shadow-md"><Icon name="box" className="w-5 h-5" /></div>
                                <h1 className="text-xl font-black text-sky-900 italic leading-none tracking-tight">LinTin</h1>
                            </div>
                            <button onClick={() => { setIsEditing(null); setFormData(initialForm); setShowModal(true); }} className="bg-sky-600 text-white p-2.5 rounded-xl shadow-lg active-scale transition-all">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M12 6v12m6-6H6" /></svg>
                            </button>
                        </div>

                        <div className="grid grid-cols-3 gap-2 mb-4">
                            <div className="col-span-1 bg-white p-2 rounded-2xl border border-sky-100 shadow-sm">
                                <p className="text-[8px] font-black text-slate-400 uppercase mb-1">購物金餘額</p>
                                <div className="flex items-center gap-1">
                                    <input type="number" className="w-full text-[11px] font-black text-sky-600 bg-transparent outline-none" value={fundSettings.amount} onChange={(e) => setFundSettings({...fundSettings, amount: e.target.value})} />
                                    <div className="relative flex items-center">
                                        <select className="text-[9px] font-black text-sky-400 bg-sky-50 py-0.5 px-1.5 rounded-md outline-none pr-3 cursor-pointer" value={fundSettings.currency} onChange={(e) => setFundSettings({ ...fundSettings, currency: e.target.value })}>
                                            {currencies.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                        <div className="absolute right-0.5 pointer-events-none text-sky-300"><Icon name="down" className="w-3 h-3" /></div>
                                    </div>
                                </div>
                            </div>
                            <div className="bg-white p-2 rounded-2xl border border-sky-100 shadow-sm"><p className="text-[8px] font-black text-slate-400 mb-1 uppercase">待收帳款</p><p className="text-[11px] font-black text-amber-500 italic">NT$ 0</p></div>
                            <div className="bg-white p-2 rounded-2xl border border-sky-100 shadow-sm"><p className="text-[8px] font-black text-slate-400 mb-1 uppercase">累積利潤</p><p className="text-[11px] font-black text-emerald-500 italic">NT$ 0</p></div>
                        </div>

                        <div className="flex">
                            {['purchase', 'order'].map(m => (
                                <button key={m} onClick={() => setViewMode(m)} className={`flex-1 pb-3 text-xs font-black transition-all relative ${viewMode === m ? 'text-sky-600' : 'text-slate-400'}`}>
                                    {m === 'purchase' ? '採購清單' : '訂單管理'}
                                    {viewMode === m && <div className="absolute bottom-0 left-0 right-0 h-1 bg-sky-500 rounded-t-full mx-8" />}
                                </button>
                            ))}
                        </div>
                    </header>

                    <div className="p-4 space-y-3">
                        {items.filter(i => i.stage === viewMode).map(item => (
                            <div key={item.id} className="bg-white rounded-[24px] p-5 shadow-sm border border-slate-50 relative overflow-hidden">
                                {item.payer && (
                                    <div className={`absolute top-0 right-0 px-4 py-1 text-[9px] font-black text-white rounded-bl-xl shadow-sm ${item.payer === '琳' ? 'bg-fuchsia-400' : 'bg-orange-400'}`}>
                                        {item.payer}
                                    </div>
                                )}

                                <div className="flex justify-between items-start">
                                    <div className="flex-1 pr-4">
                                        <h3 className="text-sm font-black text-slate-800">{item.customerName} <span className="text-sky-300">●</span></h3>
                                        <p className="text-xs text-slate-400 mt-1 mb-4 leading-relaxed line-clamp-2">{item.productName}</p>
                                        
                                        <div className="flex gap-2">
                                            <button onClick={() => openEdit(item)} className="bg-slate-50 text-slate-400 p-2.5 rounded-xl hover:text-sky-600 hover:bg-sky-100 transition-all active-scale"><Icon name="edit" /></button>
                                            <button onClick={() => deleteItem(item.id)} className="bg-slate-50 text-slate-400 p-2.5 rounded-xl hover:text-red-500 hover:bg-red-50 transition-all active-scale"><Icon name="trash" /></button>
                                        </div>
                                    </div>
                                    
                                    <div className="flex flex-col items-end gap-1">
                                        <div className="font-black text-sky-700 text-sm italic tracking-tight mb-1">NT$ {Number(item.price).toLocaleString()}</div>
                                        
                                        {/* 新增：外幣金額與利潤顯示 */}
                                        <div className="text-right space-y-0.5 mb-2">
                                            {item.foreignPrice && item.currency !== 'NTD' && (
                                                <p className="text-[9px] font-black text-slate-300 uppercase tracking-tighter">
                                                    {Number(item.foreignPrice).toLocaleString()} {item.currency}
                                                </p>
                                            )}
                                            {item.fee && (
                                                <p className="text-[10px] font-black text-emerald-500 italic">
                                                    + {Number(item.fee).toLocaleString()}
                                                </p>
                                            )}
                                        </div>

                                        {viewMode === 'purchase' ? (
                                            <button 
                                                onClick={() => markAsBought(item.id)}
                                                className="bg-sky-50 text-sky-600 text-[10px] font-black px-5 py-2.5 rounded-xl active-scale hover:bg-sky-600 hover:text-white transition-all border border-sky-100 shadow-sm"
                                            >
                                                已買到
                                            </button>
                                        ) : (
                                            <div className="text-[9px] font-black text-emerald-500 bg-emerald-50 px-3 py-1.5 rounded-xl border border-emerald-100">已採購</div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4">
                            <div className="bg-white w-full max-w-md rounded-[40px] p-8 shadow-2xl overflow-y-auto max-h-[90vh] text-left">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-xl font-black italic text-sky-900 leading-none">{isEditing ? '編輯項目' : '新增項目'}</h2>
                                    <button onClick={() => setShowModal(false)} className="text-slate-300 text-3xl leading-none">&times;</button>
                                </div>
                                <div className="space-y-6">
                                    <div>
                                        <p className="text-[10px] font-black text-slate-400 uppercase mb-3 ml-1">代墊人</p>
                                        <div className="flex gap-2">
                                            {['', '琳', '璇'].map(p => (
                                                <button key={p} onClick={() => setFormData({...formData, payer: p})} className={`flex-1 py-4 rounded-2xl text-xs font-black transition-all ${formData.payer === p ? 'bg-slate-800 text-white shadow-lg' : 'bg-slate-50 text-slate-300'}`}>{p || '無'}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input placeholder="客戶名稱" className="w-full bg-slate-50 p-4 rounded-2xl font-bold text-sm outline-none border border-transparent focus:border-sky-200" value={formData.customerName} onChange={e => setFormData({...formData, customerName: e.target.value})} />
                                        <input placeholder="商品名稱" className="w-full bg-slate-50 p-4 rounded-2xl font-bold text-sm outline-none border border-transparent focus:border-sky-200" value={formData.productName} onChange={e => setFormData({...formData, productName: e.target.value})} />
                                    </div>
                                    <div className="bg-amber-50/50 p-5 rounded-[32px] space-y-4 border border-amber-100/50">
                                        <div className="relative">
                                            <select className="w-full bg-white p-3.5 rounded-xl text-xs font-black text-amber-600 outline-none border border-amber-100 cursor-pointer appearance-none" value={formData.currency} onChange={(e) => setFormData({...formData, currency: e.target.value, foreignPrice: ''})}>
                                                {currencies.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                            <div className="absolute right-3 top-3.5 pointer-events-none text-amber-300"><Icon name="down" /></div>
                                        </div>
                                        {formData.currency !== 'NTD' && (
                                            <input type="number" placeholder="外幣金額" className="w-full bg-white py-4 px-4 rounded-2xl outline-none font-black text-sm text-amber-600 border border-amber-50" value={formData.foreignPrice} onChange={e => {
                                                const val = e.target.value;
                                                const twd = Math.round(Number(val) * exchangeRates[formData.currency]);
                                                setFormData({...formData, foreignPrice: val, price: twd.toString()});
                                            }} />
                                        )}
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="number" placeholder="台幣成本" className="w-full bg-sky-50 p-4 rounded-2xl font-black text-sm text-sky-600 outline-none" value={formData.price} onChange={e => setFormData({...formData, price: e.target.value})} />
                                        <input type="number" placeholder="預期利潤" className="w-full bg-emerald-50 p-4 rounded-2xl font-black text-sm text-emerald-600 outline-none" value={formData.fee} onChange={e => setFormData({...formData, fee: e.target.value})} />
                                    </div>
                                    <button onClick={saveItem} className="w-full bg-sky-600 text-white py-5 rounded-3xl font-black shadow-xl active-scale transition-all hover:bg-sky-700">
                                        {isEditing ? '儲存修改' : '確認新增'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
